<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline SVG Data URL Converter v1.6</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #16a34a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--primary); }
        .version { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }
        p { color: #64748b; margin-top: 5px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        h2 { font-size: 1.2rem; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }

        label { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; display: block; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 10px;
            white-space: pre;
            overflow-x: auto;
        }

        textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }

        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--bg); }

        .btn-copy { background: var(--success); color: white; margin-left: auto; }
        .btn-copy:hover { background: #15803d; }

        .preview-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: repeating-conic-gradient(#e2e8f0 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            border-radius: 6px;
            height: 60px;
            width: 100%;
            margin-top: 10px;
        }

        .preview-box img {
            max-width: 48px;
            max-height: 48px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 4px;
        }

        .error { color: #dc2626; font-size: 0.85rem; margin-top: 5px; display: none; }
        .debug { font-size: 0.7rem; color: #64748b; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SVG Data URL Converter</h1>
        <div class="version">Version 1.6 (Strict Newline Fix)</div>
        <p>Works 100% offline. Output is formatted with 2-space indentation. Newlines guaranteed.</p>
    </header>

    <div class="grid">
        <!-- Converter 1: SVG to Data URL -->
        <div class="card">
            <h2>SVG Code → Data URL</h2>
            <label for="inputSvg">Paste your SVG code here:</label>
            <textarea id="inputSvg" placeholder='<svg xmlns="..." ...>...</svg>'></textarea>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="svgToDataUrl()">Convert</button>
                <button class="btn-outline" onclick="clearInput('inputSvg')">Clear</button>
            </div>

            <label>Result:</label>
            <textarea id="outputDataUrl" readonly style="height: 80px;">Result will appear here...</textarea>
            <button class="btn-copy" onclick="copyToClipboard('outputDataUrl')">Copy Result</button>
            
            <div id="previewContainer1" class="preview-box">
                <img id="previewImg1" alt="Preview">
            </div>
            <div id="error1" class="error"></div>
        </div>

        <!-- Converter 2: Data URL to SVG (Formatted) -->
        <div class="card">
            <h2>Data URL → SVG (Formatted)</h2>
            <label for="inputDataUrl">Paste your data URL here:</label>
            <textarea id="inputDataUrl" placeholder="data:image/svg+xml;base64,..."></textarea>

            <div class="btn-group">
                <button class="btn-primary" onclick="dataUrlToSvg()">Convert</button>
                <button class="btn-outline" onclick="clearInput('inputDataUrl')">Clear</button>
            </div>

            <label>Result (2-space indent):</label>
            <textarea id="outputSvg" readonly style="height: 150px;">Result will appear here...</textarea>
            <button class="btn-copy" onclick="copyToClipboard('outputSvg')">Copy Result</button>

            <div id="previewContainer2" class="preview-box">
                <img id="previewImg2" alt="Preview">
            </div>
            <div id="error2" class="error"></div>
            <div id="debug2" class="debug"></div>
        </div>
    </div>
</div>

<script>
    function showError(id, message) {
        const el = document.getElementById(id);
        el.textContent = message;
        el.style.display = 'block';
    }

    function clearError(id) {
        const el = document.getElementById(id);
        el.style.display = 'none';
        el.textContent = '';
    }

    function clearInput(id) {
        document.getElementById(id).value = '';
        clearError(id === 'inputSvg' ? 'error1' : 'error2');
        const previewId = id === 'inputSvg' ? 'previewImg1' : 'previewImg2';
        document.getElementById(previewId).src = '';
        
        const outputId = id === 'inputSvg' ? 'outputDataUrl' : 'outputSvg';
        document.getElementById(outputId).value = 'Result will appear here...';
        const debugId = id === 'inputSvg' ? '' : 'debug2';
        if(debugId) document.getElementById(debugId).textContent = '';
    }

    function copyToClipboard(elementId) {
        const element = document.getElementById(elementId);
        const textToCopy = element.value;

        if (!textToCopy || textToCopy === 'Result will appear here...') {
            alert('Nothing to copy!');
            return;
        }

        // Debug: Check if newlines exist
        const hasNewlines = textToCopy.includes('\r') || textToCopy.includes('\n');
        const charCount = textToCopy.length;
        const lineCount = (textToCopy.match(/\n/g) || []).length + 1;
        
        // Focus and select the textarea to ensure the browser knows what to copy
        element.focus();
        element.select();
        element.setSelectionRange(0, 99999); // For mobile

        // Use the native execCommand for maximum compatibility with selection
        let successful = false;
        try {
            successful = document.execCommand('copy');
        } catch (err) {
            console.error('execCommand failed', err);
        }

        if (successful) {
            showCopyFeedback(elementId, `Copied! (${lineCount} lines, ${charCount} chars)`);
        } else {
            // Fallback to Clipboard API if execCommand fails
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showCopyFeedback(elementId, `Copied! (${lineCount} lines, ${charCount} chars)`);
                }).catch(() => {
                    alert('Failed to copy. Please manually select and copy.');
                });
            } else {
                alert('Failed to copy. Please manually select and copy.');
            }
        }

        // Show debug info
        if (elementId === 'outputSvg') {
            document.getElementById('debug2').textContent = `Debug: ${lineCount} lines, ${charCount} chars. Newlines: ${hasNewlines ? 'Yes' : 'No'}`;
        }
    }

    function showCopyFeedback(elementId, message) {
        const btn = document.querySelector(`button[onclick="copyToClipboard('${elementId}')"]`);
        const originalText = btn.textContent;
        btn.textContent = message;
        btn.style.background = '#059669';
        setTimeout(() => {
            btn.textContent = originalText;
            btn.style.background = '';
        }, 2000);
    }

    function svgToDataUrl() {
        clearError('error1');
        const svgCode = document.getElementById('inputSvg').value.trim();
        const outputArea = document.getElementById('outputDataUrl');
        const previewImg = document.getElementById('previewImg1');

        if (!svgCode) {
            showError('error1', 'Please enter SVG code.');
            return;
        }

        try {
            let compact = svgCode.replace(/\s+/g, ' ').trim();
            const encoded = encodeURIComponent(compact)
                .replace(/['()]/g, escape)
                .replace(/\*/g, '%2A');

            const dataUrl = `data:image/svg+xml,${encoded}`;

            outputArea.value = dataUrl;
            previewImg.src = dataUrl;
            
            previewImg.onerror = () => {
                showError('error1', 'Invalid SVG format. The preview failed to load.');
            };

        } catch (e) {
            showError('error1', 'Error processing SVG: ' + e.message);
        }
    }

    // Robust XML formatter with 2-space indentation
    function formatXML(xml) {
        // Step 1: Normalize all whitespace to single spaces, remove leading/trailing
        xml = xml.trim().replace(/\s+/g, ' ');
        
        // Step 2: Insert newlines after every '>' that is followed by '<'
        // This ensures each tag starts on a new line
        xml = xml.replace(/>(<)/g, '>\n$1');
        
        // Step 3: Handle self-closing tags and closing tags
        // We'll process line by line now
        let lines = xml.split('\n');
        let formatted = '';
        let pad = 0;
        const indentStr = '  '; // 2 spaces

        lines.forEach(function(line) {
            line = line.trim(); // Remove any accidental extra spaces
            if (!line) return; // Skip empty lines

            // Decrease indent before processing closing tags
            if (line.match(/^<\/\w/)) {
                if (pad > 0) pad -= 1;
            }

            // Add indentation
            let padding = '';
            for (let i = 0; i < pad; i++) {
                padding += indentStr;
            }
            formatted += padding + line + '\n';

            // Increase indent after opening tags (that are not self-closing)
            if (line.match(/^<\w[^>]*[^\/]>$/)) {
                pad += 1;
            }
        });

        return formatted.trim();
    }
    function dataUrlToSvg() {
        clearError('error2');
        const input = document.getElementById('inputDataUrl').value.trim();
        const outputArea = document.getElementById('outputSvg');
        const previewImg = document.getElementById('previewImg2');

        if (!input) {
            showError('error2', 'Please enter a Data URL.');
            return;
        }

        try {
            let svgContent = '';

            if (input.startsWith('data:image/svg+xml;base64,')) {
                const base64Data = input.substring('data:image/svg+xml;base64,'.length);
                svgContent = atob(base64Data);
            } else if (input.startsWith('data:image/svg+xml,')) {
                const encodedData = input.substring('data:image/svg+xml,'.length);
                svgContent = decodeURIComponent(encodedData);
            } else if (input.startsWith('data:')) {
                showError('error2', 'Unsupported Data URL type. Must be image/svg+xml.');
                return;
            } else {
                showError('error2', 'Invalid Data URL format. Must start with "data:image/svg+xml".');
                return;
            }

            // Parse the string to a DOM element to ensure validity and clean up
            const parser = new DOMParser();
            const doc = parser.parseFromString(svgContent, 'image/svg+xml');
            
            // Check for parse errors
            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                showError('error2', 'Invalid XML in SVG content.');
                return;
            }

            // Serialize back to string
            const serializer = new XMLSerializer();
            let rawString = serializer.serializeToString(doc);
            
            // Apply custom formatting
            const formattedString = formatXML(rawString);

            outputArea.value = formattedString;
                        previewImg.src = input;

            previewImg.onerror = () => {
                showError('error2', 'Invalid SVG content within the URL.');
            };

        } catch (e) {
            showError('error2', 'Error decoding: ' + e.message);
        }
    }

    window.onload = function() {
        const demoSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="#4CAF50" />
  <rect x="16" y="10" width="32" height="44" rx="4" fill="white" />
  <path d="M20 10h24v8H20z" fill="#333" />
  <rect x="22" y="10" width="2" height="8" fill="#333" />
  <rect x="40" y="10" width="2" height="8" fill="#333" />
  <rect x="22" y="20" width="20" height="2" fill="#ddd" />
  <rect x="22" y="26" width="20" height="2" fill="#ddd" />
  <rect x="22" y="32" width="20" height="2" fill="#ddd" />
  <path d="M24 40l6 6 10-12" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" />
</svg>`;
        document.getElementById('inputSvg').value = demoSvg;
        svgToDataUrl();
    };
</script>

</body>
</html>
