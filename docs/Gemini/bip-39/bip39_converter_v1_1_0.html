<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIP-39 Offline Converter</title>
    <style>
        /* 1. Minimal Global CSS for Standalone Operation */
        html, body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            transition: background-color 0.3s ease;
        }
        body:not(.theme-dark) { background-color: #f4f4f9; }
        body.theme-dark { background-color: #121212; }

        /* 2. Isolated App Container & Theme Variables */
        #bip39-app {
            --bg: #ffffff;
            --border: #dddddd;
            --text-main: #333333;
            --input-bg: #fafafa;
            --btn-bg: #007bff;
            --btn-text: #ffffff;
            --btn-hover: #0056b3;
            --error-text: #dc3545;
            --toast-bg: #333333;
            --toast-text: #ffffff;

            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* Dark Theme Override */
        #bip39-app.theme-dark {
            --bg: #1e1e1e;
            --border: #444444;
            --text-main: #eeeeee;
            --input-bg: #2d2d2d;
            --btn-bg: #3b82f6;
            --btn-text: #ffffff;
            --btn-hover: #2563eb;
            --error-text: #ff6b6b;
            --toast-bg: #dddddd;
            --toast-text: #111111;
        }

        #bip39-app * {
            box-sizing: border-box;
        }

        #bip39-app h2 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        #bip39-app .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            #bip39-app .grid-container {
                grid-template-columns: 1fr;
            }
        }

        #bip39-app .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #bip39-app label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        #bip39-app textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 4px;
            resize: vertical;
            font-family: monospace;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        #bip39-app textarea.is-invalid {
            border-color: var(--error-text);
        }

        #bip39-app .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        #bip39-app .error-msg {
            color: var(--error-text);
            font-weight: 600;
        }

        #bip39-app .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        #bip39-app button {
            padding: 8px 12px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s ease;
        }

        #bip39-app button:hover {
            background-color: var(--btn-hover);
        }

        #bip39-app .footer {
            margin-top: 20px;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-main);
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Toast Styles */
        #bip39-app .toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--toast-bg);
            color: var(--toast-text);
            padding: 10px 20px;
            border-radius: 4px;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            font-weight: bold;
        }

        #bip39-app .toast.show {
            bottom: 20px;
            opacity: 1;
        }

        #bip39-app .toast.failed {
            background-color: var(--error-text);
            color: white;
        }

        /* Test Toast Aggressive Override */
        #bip39-app .toast.test-toast {
            font-size: 1.5rem;
            padding: 20px 40px;
            bottom: 50%;
            transform: translate(-50%, 50%);
        }
    </style>
</head>
<body>

<div id="bip39-app">
    <h2>BIP-39 Converter</h2>
    
    <div class="grid-container">
        <!-- Hex Input Form -->
        <div class="form-group">
            <label for="hex-input">Raw Entropy (Hexadecimal)</label>
            <textarea id="hex-input" placeholder="Enter 32-64 hex characters..."></textarea>
            <div class="info-row">
                <span id="hex-count">0 / 32 chars minimum (0 bits)</span>
                <span id="hex-error" class="error-msg"></span>
            </div>
            <div class="btn-group">
                <button id="btn-generate-hex">Generate Random</button>
                <button id="btn-copy-hex">Copy Hex</button>
                <button id="btn-clear-hex">Clear</button>
            </div>
        </div>

        <!-- Mnemonic Input Form -->
        <div class="form-group">
            <label for="mnemonic-input">Mnemonic Seed Phrase</label>
            <textarea id="mnemonic-input" placeholder="Enter 12, 15, 18, 21, or 24 words..."></textarea>
            <div class="info-row">
                <span id="mnemonic-count">0 words</span>
                <span id="mnemonic-error" class="error-msg"></span>
            </div>
            <div class="btn-group">
                <button id="btn-copy-mnemonic">Copy Words</button>
                <button id="btn-clear-mnemonic">Clear</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <span id="theme-status">Theme: Auto</span>
        <span class="version">v1.1.0</span>
    </div>

    <div id="app-toast" class="toast"></div>
</div>

<script>
// Isolated Application Controller (IIFE)
(function() {
    // ============================================================================
    // 1. Theme Controller
    // ============================================================================
    const APP_THEME = 'auto'; // Configurable: 'auto', 'light', 'dark'
    const appContainer = document.getElementById('bip39-app');
    const themeStatus = document.getElementById('theme-status');
    
    function applyTheme(isDark) {
        if (isDark) {
            document.body.classList.add('theme-dark');
            appContainer.classList.add('theme-dark');
        } else {
            document.body.classList.remove('theme-dark');
            appContainer.classList.remove('theme-dark');
        }
    }

    if (APP_THEME === 'auto') {
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        applyTheme(mediaQuery.matches);
        mediaQuery.addEventListener('change', e => applyTheme(e.matches));
    } else {
        applyTheme(APP_THEME === 'dark');
        themeStatus.textContent = `Theme: ${APP_THEME}`;
    }

    // ============================================================================
    // 2. BIP-39 Cryptography Engine
    // ============================================================================
    
    // Standard 2048 English Wordlist (Placeholder)
    const WORDLIST_STR = "abandon ability able about ... zoo"; // PASTE YOUR 2048 SPACE-SEPARATED WORDS HERE
    let WORDLIST = WORDLIST_STR.trim().split(/\s+/);
    
    // Safety Fallback: If you haven't pasted the full list yet, generate a 2048 array so math doesn't break
    if (WORDLIST.length !== 2048) {
        WORDLIST = Array(2048).fill("").map((_, i) => "word" + i);
    }

    const hexInput = document.getElementById('hex-input');
    const hexCount = document.getElementById('hex-count');
    const hexError = document.getElementById('hex-error');
    
    const mnemonicInput = document.getElementById('mnemonic-input');
    const mnemonicCount = document.getElementById('mnemonic-count');
    const mnemonicError = document.getElementById('mnemonic-error');
    
    const btnGenerateHex = document.getElementById('btn-generate-hex');
    const btnClearHex = document.getElementById('btn-clear-hex');
    const btnCopyHex = document.getElementById('btn-copy-hex');
    const btnClearMnemonic = document.getElementById('btn-clear-mnemonic');
    const btnCopyMnemonic = document.getElementById('btn-copy-mnemonic');
    
    const toast = document.getElementById('app-toast');

    let debounceTimer = null;
    let isInternalUpdate = false;

    // --- Core 100% Offline Cryptography ---
    async function sha256(hexString) {
        const bytes = new Uint8Array(hexString.length / 2);
        for (let i = 0; i < bytes.length; i++) {
            bytes[i] = parseInt(hexString.substr(i * 2, 2), 16);
        }
        const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function hexToBin(hex) {
        return hex.split('').map(char => parseInt(char, 16).toString(2).padStart(4, '0')).join('');
    }

    function binToHex(bin) {
        let hex = '';
        for (let i = 0; i < bin.length; i += 4) {
            hex += parseInt(bin.substr(i, 4), 2).toString(16);
        }
        return hex;
    }

    async function encodeMnemonic(hex) {
        if (!/^[0-9a-fA-F]+$/.test(hex)) throw new Error("Invalid hex characters detected.");
        if (hex.length % 8 !== 0 || hex.length < 32 || hex.length > 64) {
            throw new Error("Invalid entropy. Must be 128-256 bits (32-64 hex chars).");
        }
        const hash = await sha256(hex);
        const binEntropy = hexToBin(hex);
        const csBits = (hex.length * 4) / 32;
        const checksum = hexToBin(hash).substring(0, csBits);
        const combined = binEntropy + checksum;
        
        const words = [];
        for (let i = 0; i < combined.length; i += 11) {
            const index = parseInt(combined.substr(i, 11), 2);
            words.push(WORDLIST[index] || `[W_${index}]`);
        }
        return words.join(' ');
    }

    async function decodeMnemonic(phrase) {
        const words = phrase.trim().toLowerCase().split(/\s+/).filter(w => w);
        if (![12, 15, 18, 21, 24].includes(words.length)) {
            throw new Error(`Invalid length: ${words.length} words. Must be 12, 15, 18, 21, or 24.`);
        }
        let bin = '';
        for (const word of words) {
            const index = WORDLIST.indexOf(word);
            if (index === -1) throw new Error(`Invalid dictionary word: "${word}"`);
            bin += index.toString(2).padStart(11, '0');
        }
        const entBits = (words.length / 3) * 32;
        const csBits = entBits / 32;
        
        const binEntropy = bin.substring(0, entBits);
        const binChecksum = bin.substring(entBits);
        const hexEntropy = binToHex(binEntropy);
        
        const hash = await sha256(hexEntropy);
        const expectedChecksum = hexToBin(hash).substring(0, csBits);
        
        if (binChecksum !== expectedChecksum) throw new Error("Checksum mismatch! Phrase is invalid/mistyped.");
        return hexEntropy;
    }

    // ============================================================================
    // 3. DOM & UI Handling
    // ============================================================================
    function showToast(msg, isError = false) {
        // Safe check: If unit tests are aggressively running, suppress normal internal toasts
        if (window.__TEST_API__ && window.__TEST_API__.isTesting) return; 
        toast.textContent = msg;
        toast.className = 'toast show' + (isError ? ' failed' : '');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updateCounts() {
        const hexLen = hexInput.value.replace(/\s/g, '').length;
        hexCount.textContent = `${hexLen} / 32 chars minimum (${hexLen * 4} bits)`;
        const words = mnemonicInput.value.trim().split(/\s+/).filter(w=>w).length;
        mnemonicCount.textContent = `${words} words`;
    }

    async function handleHexChange() {
        if (isInternalUpdate) return;
        hexError.textContent = '';
        mnemonicError.textContent = '';
        updateCounts();
        
        const hex = hexInput.value.replace(/\s/g, '');
        if (!hex) {
            isInternalUpdate = true;
            mnemonicInput.value = '';
            mnemonicInput.classList.remove('is-invalid');
            hexInput.classList.remove('is-invalid');
            isInternalUpdate = false;
            return;
        }
        
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            try {
                hexInput.classList.remove('is-invalid');
                const phrase = await encodeMnemonic(hex);
                isInternalUpdate = true;
                mnemonicInput.value = phrase;
                mnemonicInput.classList.remove('is-invalid');
                updateCounts();
                isInternalUpdate = false;
            } catch (err) {
                hexInput.classList.add('is-invalid');
                hexError.textContent = err.message;
            }
        }, 300);
    }

    async function handleMnemonicChange() {
        if (isInternalUpdate) return;
        hexError.textContent = '';
        mnemonicError.textContent = '';
        updateCounts();
        
        const phrase = mnemonicInput.value.trim();
        if (!phrase) {
            isInternalUpdate = true;
            hexInput.value = '';
            hexInput.classList.remove('is-invalid');
            mnemonicInput.classList.remove('is-invalid');
            isInternalUpdate = false;
            return;
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            try {
                mnemonicInput.classList.remove('is-invalid');
                const hex = await decodeMnemonic(phrase);
                isInternalUpdate = true;
                hexInput.value = hex;
                hexInput.classList.remove('is-invalid');
                updateCounts();
                isInternalUpdate = false;
            } catch (err) {
                mnemonicInput.classList.add('is-invalid');
                mnemonicError.textContent = err.message;
            }
        }, 300);
    }

    // --- Listeners ---
    hexInput.addEventListener('input', handleHexChange);
    mnemonicInput.addEventListener('input', handleMnemonicChange);

    btnGenerateHex.addEventListener('click', () => {
        const bytes = new Uint8Array(16); // 128 bits
        crypto.getRandomValues(bytes);
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        hexInput.value = hex;
        handleHexChange();
    });

    btnClearHex.addEventListener('click', () => { hexInput.value = ''; handleHexChange(); });
    btnClearMnemonic.addEventListener('click', () => { mnemonicInput.value = ''; handleMnemonicChange(); });

    btnCopyHex.addEventListener('click', () => {
        navigator.clipboard.writeText(hexInput.value).then(() => showToast("Hex copied!"));
    });
    btnCopyMnemonic.addEventListener('click', () => {
        navigator.clipboard.writeText(mnemonicInput.value).then(() => showToast("Mnemonic copied!"));
    });

    // ============================================================================
    // 4. MICRO UNIT TEST SYSTEM (Embedded)
    // ============================================================================
    if (window.location.search.includes('test=')) {
        window.__TEST_API__ = {
            isTesting: true,
            encodeMnemonic,
            decodeMnemonic,
            hexToBin,
            binToHex,
            hexInput,
            mnemonicInput,
            hexError,
            mnemonicError,
            setWordlist: (arr) => { WORDLIST = arr; }
        };
        
        // Execute suite slightly asynchronously to allow DOM parsing completion
        setTimeout(async () => {
            const API = window.__TEST_API__;
            console.log("=== BEGINNING BIP-39 CORE TESTS ===");
            let passed = 0;
            let failed = 0;

            function assert(condition, testName) {
                if (condition) {
                    console.log(`✅ PASS: ${testName}`);
                    passed++;
                } else {
                    console.error(`❌ FAIL: ${testName}`);
                    failed++;
                }
            }

            async function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

            try {
                // --- TEST 1: Binary / Hex Transcoding Math ---
                assert(API.hexToBin("f") === "1111", "hexToBin correctly converts 'f' and preserves 4-bit padding");
                assert(API.hexToBin("0") === "0000", "hexToBin correctly converts '0' and preserves 4-bit padding");
                assert(API.binToHex("11110000") === "f0", "binToHex correctly reconstructs hexadecimal chunks");

                // --- TEST 2: BIP-39 Dictionary Mathematical Encoding ---
                const testWords = Array(2048).fill("").map((_, i) => "word" + i);
                API.setWordlist(testWords);
                
                // 128 zeros + 0110 checksum = 132 bits = 12 words (Last word is `word6`)
                const encodedZeros = await API.encodeMnemonic("00000000000000000000000000000000");
                assert(encodedZeros === "word0 word0 word0 word0 word0 word0 word0 word0 word0 word0 word0 word6", 
                    "encodeMnemonic properly evaluates 128 bits of entropy and appends correct 4-bit checksum");

                // --- TEST 3: Validation and Checksum Rejection ---
                let threwError = false;
                try {
                    await API.decodeMnemonic("word0 word0 word0 word0 word0 word0 word0 word0 word0 word0 word0 word5");
                } catch (e) { threwError = e.message.includes("Checksum mismatch"); }
                assert(threwError, "decodeMnemonic aggressively catches and rejects invalid checksum modifications");

                let lengthError = false;
                try { await API.decodeMnemonic("word0 word0 word0"); } 
                catch(e) { lengthError = e.message.includes("Invalid length"); }
                assert(lengthError, "decodeMnemonic rejects invalid mnemonic lengths (< 12 words)");

                // --- TEST 4: DOM Input Debounce & Sync Pipeline ---
                API.hexInput.value = "ffffffffffffffffffffffffffffffff"; 
                API.hexInput.dispatchEvent(new Event('input'));
                await wait(350); // Wait for the 300ms UI debounce
                
                assert(API.mnemonicInput.value.includes("word2040"), "DOM seamlessly auto-generates mnemonic on hex input after debounce");

                document.getElementById('btn-clear-hex').click();
                assert(API.mnemonicInput.value === "", "DOM clearing safely resets both input buffers instantly");

            } catch (err) {
                console.error("Test execution aborted:", err);
                failed++;
            }

            // --- UI ENFORCER TOAST ---
            const t = document.getElementById('app-toast');
            const total = passed + failed;
            console.table({"Total Tests": total, "Passed": passed, "Failed": failed});
            
            t.textContent = `Tests Complete! Passed: ${passed}/${total}`;
            t.className = 'toast show test-toast' + (failed > 0 ? ' failed' : '');
            
            let enforcementTicks = 0;
            const enforcer = setInterval(() => {
                t.className = 'toast show test-toast' + (failed > 0 ? ' failed' : '');
                t.style.opacity = '1';
                t.style.transform = 'translateX(-50%) translateY(0)';
                enforcementTicks++;
                if (enforcementTicks > 14) { // 14 ticks * 500ms = 7 seconds
                    clearInterval(enforcer);
                    t.classList.remove('show');
                    API.isTesting = false; // Release the internal toast blocker
                }
            }, 500);
        }, 100);
    }
})();
</script>
</body>
</html>
