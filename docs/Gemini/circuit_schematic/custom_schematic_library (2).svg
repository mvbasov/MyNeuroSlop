<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs id="schematic-library" data-name="simple components" data-version="1.7.0">
    <symbol id="resistor" viewBox="0 0 100 100">
            <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <line x1="0" y1="50" x2="30" y2="50"></line>
              <rect x="30" y="40" width="40" height="20"></rect>
              <line x1="70" y1="50" x2="100" y2="50"></line>
            </g>
          </symbol>
    <symbol id="npn" viewBox="0 0 100 100">
            <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="40" cy="50" r="30" stroke-width="2"></circle>
              <line x1="0" y1="50" x2="35" y2="50"></line>
              <line x1="35" y1="35" x2="35" y2="65" stroke-width="4.5"></line>
              <path d="M 35 45 L 50 25 L 50 0"></path>
              <path d="M 35 55 L 50 75 L 50 100"></path>
              <!-- Arrow on Emitter pointing outwards -->
              <polygon points="49,72 41,67 46,63" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"></polygon>
            </g>
          </symbol>
  </defs>
  <defs id="analog-library" data-name="analog components" data-version="1.1.0">
    <symbol id="op-amp" viewBox="0 0 200 200">
            <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="50,25 50,175 150,100"></polygon>
              <line x1="0" y1="50" x2="50" y2="50"></line>
              <line x1="60" y1="50" x2="70" y2="50" stroke-width="2"></line>
              <line x1="65" y1="45" x2="65" y2="55" stroke-width="2"></line>
              <line x1="0" y1="150" x2="50" y2="150"></line>
              <line x1="60" y1="150" x2="70" y2="150" stroke-width="2"></line>
              <line x1="150" y1="100" x2="200" y2="100"></line>
              <line x1="100" y1="0" x2="100" y2="62.5"></line>
              <line x1="100" y1="200" x2="100" y2="137.5"></line>
            </g>
          </symbol>
  </defs>
  <defs id="digital-library" data-name="digital components" data-version="1.3.0">
    <symbol id="rs-flipflop" viewBox="0 0 200 200">
            <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <rect x="50" y="25" width="100" height="150" rx="4"></rect>
              <line x1="0" y1="50" x2="50" y2="50"></line>
              <line x1="0" y1="150" x2="50" y2="150"></line>
              <line x1="100" y1="0" x2="100" y2="12"></line>
              <circle cx="100" cy="18" r="5"></circle>
              <line x1="150" y1="50" x2="200" y2="50"></line>
              <circle cx="157" cy="150" r="5"></circle>
              <line x1="163" y1="150" x2="200" y2="150"></line>
              <text x="65" y="55" font-family="monospace" font-size="16" font-weight="bold" fill="currentColor" stroke="none" text-anchor="start" dominant-baseline="middle">R</text>
              <text x="65" y="155" font-family="monospace" font-size="16" font-weight="bold" fill="currentColor" stroke="none" text-anchor="start" dominant-baseline="middle">S</text>
              <text x="135" y="55" font-family="monospace" font-size="16" font-weight="bold" fill="currentColor" stroke="none" text-anchor="end" dominant-baseline="middle">Q</text>
              <text x="135" y="155" font-family="monospace" font-size="16" font-weight="bold" fill="currentColor" stroke="none" text-anchor="end" dominant-baseline="middle">Q̅</text>
              <text x="100" y="45" font-family="monospace" font-size="14" font-weight="bold" fill="currentColor" stroke="none" text-anchor="middle">R̅</text>
            </g>
          </symbol>
  </defs>
  <use href="npn" />
</svg>
