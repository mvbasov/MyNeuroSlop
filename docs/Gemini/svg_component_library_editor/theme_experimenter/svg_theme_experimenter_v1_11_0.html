<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Editor Theme Experimenter</title>
    <style>
        /* Standalone Baseline Styles */
        html, body {
            margin: 0;
            padding: 0;
            height: 100dvh;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- Theme Experimenter App Scoping --- */
        #color-schema-app {
            display: flex;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #color-schema-app * {
            box-sizing: border-box;
        }

        #color-schema-app .sidebar {
            width: 320px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
        }

        #color-schema-app .sidebar-header {
            margin-bottom: 20px;
        }

        #color-schema-app h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #eee;
        }

        #color-schema-app .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        #color-schema-app .preset-btn {
            flex: 1;
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        #color-schema-app .preset-btn:hover {
            background: #444;
        }

        #color-schema-app .controls-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        #color-schema-app .color-control {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #252526;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        #color-schema-app .color-control label {
            font-family: monospace;
            font-size: 0.8rem;
            color: #ccc;
            cursor: pointer;
        }

        #color-schema-app .color-control input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        #color-schema-app .color-control input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        #color-schema-app .color-control input[type="color"]::-webkit-color-swatch {
            border: 1px solid #555;
            border-radius: 4px;
        }

        #color-schema-app .output-section {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #color-schema-app textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            resize: none;
        }

        #color-schema-app .copy-btn {
            background: #2d5a88;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        #color-schema-app .copy-btn:hover {
            background: #3b76b3;
        }

        #color-schema-app .app-version {
            font-size: 0.7rem;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }

        #color-schema-app .workspace {
            flex: 1;
            padding: 20px;
            background-color: #0d0d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        #color-schema-app .mock-app-container {
            width: 100%;
            height: 100%;
            max-width: 1200px;
            border: 1px dashed #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            container-type: inline-size; /* Ensure mobile query works within workspace */
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.8); border-color: #3b82f6; background-color: #2a3a4a; }
            50% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); border-color: #3b82f6; background-color: #2a3a4a; }
            100% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0); border-color: #333; background-color: #252526; }
        }

        #color-schema-app .color-control.highlight-pulse {
            animation: pulseGlow 1.2s ease-out;
            border-color: #3b82f6;
        }

        /* Interactive Element Inspector Cursor */
        #mock-editor-app * {
            cursor: crosshair !important;
        }

        /* ================================================================= */
        /* EXACT CSS FROM SVG EDITOR (SCOPED TO #mock-editor-app)            */
        /* ================================================================= */

        #mock-editor-app {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #mock-editor-app *::before,
        #mock-editor-app *::after {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, stroke 0.3s ease, fill 0.3s ease;
        }

        #mock-editor-app .svg-editor-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header"
                "preview editor"
                "footer footer";
            width: 100%;
            height: 100%;
        }

        #mock-editor-app * { margin: 0; padding: 0; box-sizing: border-box; }

        #mock-editor-app header {
            grid-area: header;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        #mock-editor-app .badge {
            color: #ffffff;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 14px;
            font-weight: bold;
        }
        #mock-editor-app .badge.danger { background-color: var(--danger); }
        #mock-editor-app .badge.success { background-color: var(--success); color: #111; }

        #mock-editor-app .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--panel-bg);
            padding: 5px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        #mock-editor-app .toolbar-right { margin-left: auto; }

        #mock-editor-app .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        #mock-editor-app button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #mock-editor-app button:hover { background: var(--border); }
        #mock-editor-app button.primary { background: var(--primary); color: #ffffff; font-weight: 600; }
        #mock-editor-app button.primary:hover { background: var(--primary-hover); }
        #mock-editor-app button.danger { color: var(--danger); }
        #mock-editor-app button.danger:hover { background: rgba(255, 85, 85, 0.1); }

        #mock-editor-app .toolbar-select {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.2rem;
            outline: none;
            width: 45px;
            text-align: center;
            text-align-last: center;
        }

        #mock-editor-app .toolbar-select:hover { background: var(--border); }
        #mock-editor-app .toolbar-select option { background: var(--panel-bg); color: var(--text-color); text-align: left; }

        #mock-editor-app label.toggle {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        #mock-editor-app .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        #mock-editor-app .preview-panel {
            grid-area: preview;
            border-right: 1px solid var(--border);
        }

        #mock-editor-app .editor-panel { grid-area: editor; }

        #mock-editor-app footer {
            grid-area: footer;
            background-color: var(--toolbar-bg);
            border-top: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            color: var(--text-muted);
        }

        #mock-editor-app .footer-left { display: flex; align-items: center; gap: 15px; flex: 1; }
        #mock-editor-app .footer-center { display: flex; align-items: center; justify-content: center; gap: 10px; flex: 1; white-space: nowrap; }
        #mock-editor-app .footer-right { flex: 1; text-align: right; white-space: nowrap; }

        #mock-editor-app #preview-container {
            flex: 1;
            background-color: var(--preview-bg);
            color: var(--text-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #mock-editor-app #main-svg {
            width: 100%;
            height: 100%;
        }

        #mock-editor-app .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--panel-bg);
            overflow: hidden;
        }

        #mock-editor-app .mock-textarea, #mock-editor-app .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            box-sizing: border-box;
            white-space: pre;
        }

        #mock-editor-app .backdrop {
            z-index: 1;
            color: var(--text-color);
        }

        #mock-editor-app mark {
            background-color: rgba(59, 130, 246, 0.3);
            color: inherit;
            border-radius: 2px;
            outline: 1px solid rgba(59, 130, 246, 0.6);
        }

        #mock-editor-app mark.point-mark {
            background-color: rgba(255, 85, 85, 0.4);
            border-radius: 2px;
            outline: 1px solid rgba(255, 85, 85, 0.8);
        }

        @container (max-width: 700px) {
            #mock-editor-app .svg-editor-layout {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr auto;
                grid-template-areas: "preview" "header" "editor" "footer";
            }
            #mock-editor-app .preview-panel { border-right: none; }
            #mock-editor-app header {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
                padding: 6px 10px;
                gap: 6px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div id="color-schema-app">
        <!-- Sidebar Controls -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🎨 Theme Editor</h2>
                <div class="preset-buttons">

                <div class="app-version">v1.11.0</div>
            </div>
        </div>

        <!-- Workspace Preview -->
        <div class="workspace">
            <div class="mock-app-container">
                
                <!-- Exact Mock of SVG Editor UI -->
                <div id="mock-editor-app">
                    <div class="svg-editor-layout">

                        <div class="panel preview-panel">

                                <svg id="main-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                                    <defs>
                                        <pattern id="gridPattern" patternUnits="userSpaceOnUse" width="10" height="10">
                                            <rect width="100%" height="100%" fill="none" />

                                        </pattern>
                                    </defs>

                                    <rect x="0" y="0" width="100" height="100" fill="url(#gridPattern)" />

                        <div class="panel editor-panel">
                            <div class="editor-wrapper">
                                <div class="backdrop">
&lt;!-- Editor Mockup --&gt;
&lt;svg viewBox="0 0 100 100"&gt;
  &lt;<mark>circle cx="<mark class="point-mark">50</mark>" cy="50" r="30"</mark> /&gt;
&lt;/svg&gt;</div>
                            </div>
                        </div>

                        <footer>
                            <div class="footer-left">
                                <span class="badge danger" style="display:inline-block">Error</span>
                                <span class="badge success" style="display:inline-block">Saved</span>
                                <label class="toggle"><input type="checkbox" checked> Grid</label>
                                <span style="margin-left: 5px;">⌨️</span>

                            </div>

                                <input type="number" class="toolbar-select" value="1" style="font-size: 1rem; padding: 4px 8px; width: 60px;">
                            </div>
                            <div class="footer-right">v6.6.0 (Mock)</div>
                        </footer>
                    </div>
                </div>

            </div>
        </div>
    </div>

            const container = document.getElementById('variables-container');
            const mockApp = document.getElementById('mock-editor-app');
            const cssExport = document.getElementById('css-export');
            
            // Hold current active colors
            let currentTheme = { ...PRESETS.light };
            let inputsMap = {};

            function initControls() {
                container.innerHTML = '';
                
                Object.keys(currentTheme).forEach(key => {
                    const wrap = document.createElement('div');
                    wrap.className = 'color-control';
                    
                    const label = document.createElement('label');
                    label.textContent = key;
                    label.setAttribute('for', key);

                    const input = document.createElement('input');
                    input.type = 'color';
                    input.id = key;
                    input.value = currentTheme[key];
                    
                    input.addEventListener('input', (e) => {
                        currentTheme[key] = e.target.value;
                        applyToMock();
                        updateExport();
                    });

                    wrap.appendChild(label);
                    wrap.appendChild(input);
                    container.appendChild(wrap);

                    inputsMap[key] = input;
                });
            }

            function applyToMock() {
                Object.keys(currentTheme).forEach(key => {
                    mockApp.style.setProperty(key, currentTheme[key]);
                });
            }

            function updateExport() {
                let text = "/* Copy this directly into your App CSS */\n\n";
                Object.keys(currentTheme).forEach(key => {
                    text += `    ${key}: ${currentTheme[key]};\n`;
                });
                cssExport.value = text;
            }

            function loadPreset(themeName) {
                currentTheme = { ...PRESETS[themeName] };
                Object.keys(currentTheme).forEach(key => {
                    if(inputsMap[key]) {
                        inputsMap[key].value = currentTheme[key];
                    }
                });
                applyToMock();
                updateExport();
            }

            // Event Bindings
            document.getElementById('theme-selector').addEventListener('change', (e) => loadPreset(e.target.value));
            
            document.getElementById('btn-copy').addEventListener('click', () => {
                cssExport.select();
                document.execCommand('copy');
                const btn = document.getElementById('btn-copy');
                const orig = btn.innerHTML;
                btn.innerHTML = '✅ Copied!';
                setTimeout(() => btn.innerHTML = orig, 1500);
            });

            // --- Interactive Color Inspector ---
            mockApp.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                // Clear previous highlights
                document.querySelectorAll('.highlight-pulse').forEach(el => {
                    el.classList.remove('highlight-pulse');
                });

                let target = e.target;
                let varsToHighlight = new Set();

                // Walk up the DOM tree from the clicked target
                while (target && target !== mockApp.parentElement) {
                    const fill = target.getAttribute('fill') || '';
                    const stroke = target.getAttribute('stroke') || '';
                    const className = (typeof target.className === 'string') ? target.className : (target.className && target.className.baseVal) || '';
                    const tagName = target.tagName ? target.tagName.toLowerCase() : '';
                    const id = target.id || '';

                    // 1. Detect Explicit Inline SVG Variables
                    if (fill.includes('var(')) {
                        let m = fill.match(/var\((--[^)]+)\)/);
                        if (m) varsToHighlight.add(m[1]);
                    }
                    if (stroke.includes('var(')) {
                        let m = stroke.match(/var\((--[^)]+)\)/);
                        if (m) varsToHighlight.add(m[1]);
                    }
                    if (fill.includes('url(#gridPattern)')) varsToHighlight.add('--grid-line');

                    // 2. Detect Component/Class based mappings
                    if (tagName === 'header' || tagName === 'footer') {
                        varsToHighlight.add('--toolbar-bg');
                        varsToHighlight.add('--border');
                    }
                    if (className.includes('toolbar-group')) {
                        varsToHighlight.add('--panel-bg');
                        varsToHighlight.add('--border');
                    }
                    if (className.includes('primary')) {
                        varsToHighlight.add('--primary');
                        varsToHighlight.add('--primary-hover');
                    }
                    if (className.includes('danger')) {
                        varsToHighlight.add('--danger');
                    }
                    if (className.includes('success')) {
                        varsToHighlight.add('--success');
                    }
                    if (className.includes('badge') && !className.includes('danger') && !className.includes('success')) {
                        varsToHighlight.add('--danger');
                    }
                    if (className.includes('preview-panel')) varsToHighlight.add('--border');
                    if (className.includes('editor-wrapper')) varsToHighlight.add('--panel-bg');
                    
                    // 3. Editor Panel specific mapping
                    if (tagName === 'mark') {
                        if (className.includes('point-mark')) {
                            varsToHighlight.add('--danger');
                        } else {
                            varsToHighlight.add('--primary');
                        }
                    }
                    
                    if (className.includes('backdrop')) {
                        varsToHighlight.add('--text-color');
                        varsToHighlight.add('--panel-bg');
                    } else if (tagName === 'button' || tagName === 'select' || className.includes('toolbar-select') || tagName === 'path') {
                        if (!varsToHighlight.has('--primary') && !varsToHighlight.has('--danger')) {
                            varsToHighlight.add('--text-color');
                        }
                    }
                    if (className.includes('footer-left') || className.includes('footer-center') || className.includes('footer-right')) {
                        varsToHighlight.add('--text-muted');
                    }
                    if (id === 'preview-container') varsToHighlight.add('--preview-bg');
                    if (id === 'mock-editor-app') varsToHighlight.add('--bg-color');

                    // If we found variables matching this target layer, stop bubbling
                    if (varsToHighlight.size > 0) break; 
                    
                    target = target.parentElement;
                }

                // Ultimate fallback
                if (varsToHighlight.size === 0) varsToHighlight.add('--bg-color');

                // Trigger Highlight and Scroll on Sidebar Controls
                varsToHighlight.forEach(varName => {
                    const input = inputsMap[varName];
                    if (input) {
                        const controlDiv = input.closest('.color-control');
                        controlDiv.classList.remove('highlight-pulse');
                        void controlDiv.offsetWidth; // Force CSS reflow
                        controlDiv.classList.add('highlight-pulse');
                        controlDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });

            // Boot
            initControls();
            applyToMock();
            updateExport();
        })();
    </script>
</body>
</html>
