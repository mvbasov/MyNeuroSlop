<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joule Thief Circuit Schematic</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background-color: #f8fafc;
      font-family: sans-serif;
      gap: 2rem;
      box-sizing: border-box;
    }

    .circuit-diagram {
      color: #0f172a;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      width: 100%;
      max-width: 900px;
    }
    
    .component-label {
      font-size: 16px;
      font-family: monospace;
      font-weight: bold;
      fill: currentColor;
      stroke: none;
    }

    .small-label {
      font-size: 14px;
      font-family: monospace;
      font-weight: bold;
      fill: currentColor;
      stroke: none;
    }
  </style>
</head>
<body>

  <!-- ==========================================
       1. THE LIBRARY DEFS (Hidden)
       Name: mvb Schematic Component Library
       Version: 1.1.0
       ========================================== -->
  <svg id="schematic-library" data-name="mvb Schematic Component Library" data-version="1.1.0" xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
      <!-- NPN Transistor -->
      <symbol id="npn" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="50" cy="50" r="42" stroke-width="2" />
          <line x1="0" y1="50" x2="35" y2="50" />
          <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
          <path d="M 35 40 L 60 20 L 60 0" />
          <path d="M 35 60 L 60 80 L 60 100" />
          <polygon points="58,78 46,76 54,67" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
        </g>
      </symbol>

      <!-- PNP Transistor -->
      <symbol id="pnp" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="50" cy="50" r="42" stroke-width="2" />
          <line x1="0" y1="50" x2="35" y2="50" />
          <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
          <path d="M 35 40 L 60 20 L 60 0" />
          <path d="M 35 60 L 60 80 L 60 100" />
          <polygon points="43,66 55,68 47,77" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
        </g>
      </symbol>

      <!-- Resistor -->
      <symbol id="resistor" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="25" y2="50" />
          <rect x="25" y="35" width="50" height="30" />
          <line x1="75" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- Capacitor -->
      <symbol id="capacitor" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="40" y2="50" />
          <line x1="40" y1="20" x2="40" y2="80" stroke-width="4" />
          <line x1="60" y1="20" x2="60" y2="80" stroke-width="4" />
          <line x1="60" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- Polarized Capacitor -->
      <symbol id="capacitor-pol" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="35" y2="50" />
          <line x1="35" y1="20" x2="35" y2="80" stroke-width="4" />
          <line x1="15" y1="25" x2="25" y2="25" stroke-width="2"/>
          <line x1="20" y1="20" x2="20" y2="30" stroke-width="2"/>
          <path d="M 65 20 Q 50 50 65 80" stroke-width="4" />
          <line x1="57.5" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- Inductor -->
      <symbol id="inductor" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 0 50 L 20 50 Q 30 20 40 50 Q 50 20 60 50 Q 70 20 80 50 L 100 50" />
        </g>
      </symbol>

      <!-- Diode -->
      <symbol id="diode" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="35" y2="50" />
          <polygon points="35,25 35,75 65,50" />
          <line x1="65" y1="25" x2="65" y2="75" />
          <line x1="65" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- Zener Diode -->
      <symbol id="zener-diode" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="35" y2="50" />
          <polygon points="35,25 35,75 65,50" />
          <path d="M 75 25 L 65 25 L 65 75 L 55 75" />
          <line x1="65" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- N-MOSFET -->
      <symbol id="n-mosfet" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="50" cy="50" r="42" stroke-width="2" />
          <line x1="0" y1="50" x2="30" y2="50" />
          <line x1="30" y1="25" x2="30" y2="75" stroke-width="3" />
          <line x1="40" y1="25" x2="40" y2="40" stroke-width="3" />
          <line x1="40" y1="42.5" x2="40" y2="57.5" stroke-width="3" />
          <line x1="40" y1="60" x2="40" y2="75" stroke-width="3" />
          <path d="M 40 32.5 L 60 32.5 L 60 0" />
          <path d="M 40 67.5 L 60 67.5 L 60 100" />
          <line x1="40" y1="50" x2="60" y2="50" />
          <line x1="60" y1="50" x2="60" y2="67.5" />
          <polygon points="53,50 43,45 43,55" fill="currentColor" stroke-width="1.5"/>
        </g>
      </symbol>

      <!-- P-MOSFET -->
      <symbol id="p-mosfet" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="50" cy="50" r="42" stroke-width="2" />
          <line x1="0" y1="50" x2="30" y2="50" />
          <line x1="30" y1="25" x2="30" y2="75" stroke-width="3" />
          <line x1="40" y1="25" x2="40" y2="40" stroke-width="3" />
          <line x1="40" y1="42.5" x2="40" y2="57.5" stroke-width="3" />
          <line x1="40" y1="60" x2="40" y2="75" stroke-width="3" />
          <path d="M 40 32.5 L 60 32.5 L 60 0" />
          <path d="M 40 67.5 L 60 67.5 L 60 100" />
          <line x1="40" y1="50" x2="60" y2="50" />
          <line x1="60" y1="50" x2="60" y2="67.5" />
          <polygon points="47,50 57,45 57,55" fill="currentColor" stroke-width="1.5"/>
        </g>
      </symbol>

      <!-- LED -->
      <symbol id="led" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="35" y2="50" />
          <polygon points="35,25 35,75 65,50" />
          <line x1="65" y1="25" x2="65" y2="75" />
          <line x1="65" y1="50" x2="100" y2="50" />
          <line x1="42" y1="23" x2="50" y2="3" />
          <polygon points="50,3 44,6 52,9" fill="currentColor" stroke="none" />
          <line x1="52" y1="31.5" x2="60" y2="11" />
          <polygon points="60,11 54,14 62,17" fill="currentColor" stroke="none" />
        </g>
      </symbol>

      <!-- Terminal / Clemm Block -->
      <symbol id="terminal" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="25" width="50" height="50" rx="4" />
          <circle cx="25" cy="50" r="12" />
          <line x1="17" y1="58" x2="33" y2="42" />
          <line x1="50" y1="50" x2="100" y2="50" />
        </g>
      </symbol>

      <!-- Ground -->
      <symbol id="ground" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="50" y1="0" x2="50" y2="50" />
          <line x1="20" y1="50" x2="80" y2="50" stroke-width="3"/>
          <line x1="35" y1="65" x2="65" y2="65" stroke-width="3"/>
          <line x1="45" y1="80" x2="55" y2="80" stroke-width="3"/>
        </g>
      </symbol>

      <!-- Battery -->
      <symbol id="battery" viewBox="0 0 100 100">
        <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="0" y1="50" x2="40" y2="50" />
          <line x1="40" y1="20" x2="40" y2="80" stroke-width="2.5" />
          <line x1="60" y1="35" x2="60" y2="65" stroke-width="6" />
          <line x1="60" y1="50" x2="100" y2="50" />
          <!-- Plus symbol on positive terminal -->
          <line x1="20" y1="25" x2="30" y2="25" />
          <line x1="25" y1="20" x2="25" y2="30" />
        </g>
      </symbol>

    </defs>
  </svg>

  <!-- ==========================================
       2. JOULE THIEF SCHEMATIC
       ========================================== -->
  <svg class="circuit-diagram" viewBox="0 0 850 600" width="100%" height="600">
    
    <!-- === WIRING PATHS === -->
    <!-- Positive Rail (V+) -->
    <path d="M 150 205 L 150 70 L 480 70 L 480 200" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />
    
    <!-- Negative Rail (GND) with extended emitter wire -->
    <path d="M 150 305 L 150 510 L 600 510 L 600 425 M 480 450 L 480 510" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />
    
    <!-- Resistor to Left Coil Path -->
    <path d="M 300 170 L 300 200 L 410 200" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />

    <!-- Left Coil to Transistor Base Loop -->
    <path d="M 410 300 L 330 300 L 330 400 L 420 400" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />

    <!-- Right Coil to Collector Path -->
    <path d="M 480 300 L 480 350" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />

    <!-- Collector to LED Path -->
    <path d="M 480 325 L 600 325" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />


    <!-- === COMPONENTS === -->
    
    <!-- 1.5V Battery (Using Library Component) -->
    <use href="#battery" transform="translate(150, 255) rotate(90) translate(-50, -50)" width="100" height="100" />
    <text x="60" y="240" class="component-label">1,5V</text>
    <text x="50" y="260" class="component-label">Battery</text>
    <text x="20" y="540" class="small-label">Ubat=0.35...1.5V</text>

    <!-- 1K Ohm Resistor -->
    <use href="#resistor" transform="translate(300, 120) rotate(90) translate(-50, -50)" width="100" height="100" />
    <text x="230" y="100" class="component-label">R1</text>
    <text x="210" y="125" class="component-label">1K Ohm</text>

    <!-- Coils (Transformer on Ferrite Core) -->
    <!-- Left Coil (Opposite direction rotation) -->
    <use href="#inductor" transform="translate(410, 250) rotate(90) translate(-50, -50)" width="100" height="100" />
    <circle cx="400" cy="285" r="3" fill="currentColor" /> <!-- Dot for coil start at the bottom -->

    <!-- Right Coil (Mirrored via vertical axe) -->
    <use href="#inductor" transform="translate(480, 250) scale(-1, 1) rotate(90) translate(-50, -50)" width="100" height="100" />
    <circle cx="500" cy="215" r="3" fill="currentColor" /> <!-- Reference dot -->
    
    <!-- Ferrite Core lines (Shifted slightly to perfectly center between coils without overlap) -->
    <line x1="436" y1="200" x2="436" y2="300" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
    <line x1="444" y1="200" x2="444" y2="300" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
    
    <!-- NPN Transistor -->
    <use href="#npn" transform="translate(420, 350)" width="100" height="100" />
    <text x="450" y="540" class="component-label" text-anchor="middle">T1 BC547B</text>
    
    <!-- White LED -->
    <use href="#led" transform="translate(600, 375) rotate(90) translate(-50, -50)" width="100" height="100" />
    <text x="610" y="350" class="component-label">LED</text>


    <!-- === JUNCTION DOTS === -->
    <!-- V+ to Resistor -->
    <circle cx="300" cy="70" r="4" fill="currentColor" />
    <!-- Collector, Coil, and LED junction -->
    <circle cx="480" cy="325" r="4" fill="currentColor" />
    <!-- Emitter to GND rail -->
    <circle cx="480" cy="510" r="4" fill="currentColor" />

  </svg>

</body>
</html>
