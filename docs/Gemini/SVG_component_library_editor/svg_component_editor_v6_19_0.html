<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PRESERVE_BINARY_START -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg stroke='%233b82f6' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='50' cy='50' r='40' /%3E%3Cline x1='10' y1='50' x2='35' y2='50' /%3E%3Cline x1='35' y1='30' x2='35' y2='70' stroke-width='7' /%3E%3Cpath d='M 35 40 L 60 20 L 60 10' /%3E%3Cpath d='M 35 60 L 60 80 L 60 90' /%3E%3Cpolygon points='58,78 46,76 54,67' fill='%233b82f6' /%3E%3C/g%3E%3C/svg%3E">
    <!-- PRESERVE_BINARY_END -->
    <title>SVG Component Editor</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
          height: 100dvh;
          overflow: hidden;
          transition: background-color 0.3s ease, color 0.3s ease;
        }
        body:not(.theme-dark) {
          background-color: #f3f4f6;
        }
        body.theme-dark {
          background-color: #1e1e2e;
        }
        
        /* Embed-Safe Scoped CSS */
        #svg-editor-app {
            /* CSS Variables scoped only to the app - Default Light Theme */

	    /* Balanced light theme with darker editor background */
	    --bg-color: #E2DCD2;       /* Muted warm gray-beige for main app bg */
	    --panel-bg: #C9C0B2;       /* Darker, balanced panel bg (editor area) */
	    --text-color: #2C2A28;     /* Dark but soft black for text */
	    --text-muted: #6E665C;     /* Harmonized muted gray-brown */
	    --border: #B7AC9C;         /* Balanced, not too dark or light */
	    --toolbar-bg: #DCD4C8;     /* In-between toolbar bg */
	    --preview-bg: #DDD5C9;     /* Slightly lighter than editor for contrast */
	    --primary: #6B7F8E;        /* Muted slate blue, balanced */
	    --primary-hover: #7E92A2;  /* Softer on hover */
	    --grid-line: #C9BEAD;      /* Visible but subtle grid */
	    --danger: #C98686;         /* Muted rose, not harsh */
	    --success: #8FAA8A;        /* Soft sage green */
	    --font-mono: 'Courier New', Courier, monospace;

            /* Base App Styling */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            /* CSS Container Query */
            container-type: inline-size;
        }

	#svg-editor-app.theme-dark {
	    /* Softer dark theme — less shine, more comfortable */
	    --bg-color: #1e1e2e;          /* Keep deep background */
	    --panel-bg: #282a36;          /* Keep panel base */
	    --text-color: #b8b8b0;        /* Softer, less bright than #f8f8f2 */
	    --text-muted: #6e6e7a;        /* Muted, comfortable */
	    --primary: #6b8a9e;           /* Dusty blue instead of bright #3b82f6 */
	    --primary-hover: #7e9aae;     /* Softer hover */
	    --danger: #cc8888;            /* Muted red instead of #ff5555 */
	    --success: #88aa88;           /* Muted green instead of #50fa7b */
	    --border: #3d3f4f;            /* Slightly darker than #44475a for less contrast */
	    --toolbar-bg: #252530;        /* Slightly darker */
	    --preview-bg: #1a1a24;        /* Deeper preview background */
	    --grid-line: #3a3a45;         /* Softer grid lines */
	}

	#svg-editor-app *::before,
        #svg-editor-app *::after {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease, stroke 0.3s ease, fill 0.3s ease;
        }

        #svg-editor-app .svg-editor-layout {
            /* CSS Grid Layout */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header"
                "preview editor"
                "footer footer";
            width: 100%;
            height: 100%;
        }

        #svg-editor-app * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Header & Toolbar --- */
        #svg-editor-app header {
            grid-area: header;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        #svg-editor-app .badge {
            background-color: var(--danger);
            color: white;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
        }

        #svg-editor-app .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--panel-bg);
            padding: 5px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        #svg-editor-app .toolbar-right {
            margin-left: auto;
        }

        #svg-editor-app .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        #svg-editor-app button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        #svg-editor-app button:hover {
            background: var(--border);
        }

        #svg-editor-app button.primary {
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
        }

        #svg-editor-app button.primary:hover {
            background: var(--primary-hover);
        }

        #svg-editor-app button.danger {
            color: var(--danger);
        }
        #svg-editor-app button.danger:hover {
            background: rgba(255, 85, 85, 0.1);
        }

        #svg-editor-app .toolbar-select {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 32px;
            text-align: center;
            text-align-last: center;
        }

        #svg-editor-app .toolbar-select:hover {
            background: var(--border);
        }

        #svg-editor-app .toolbar-select option {
            background: var(--panel-bg);
            color: var(--text-color);
            text-align: left;
        }

        #svg-editor-app button:focus-visible, 
        #svg-editor-app .toolbar-select:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: -1px;
            border-radius: 4px;
        }

        #svg-editor-app label.toggle {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        /* --- Main Layout Panels --- */
        #svg-editor-app .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        #svg-editor-app .preview-panel {
            grid-area: preview;
            border-right: 1px solid var(--border);
        }

        #svg-editor-app .editor-panel {
            grid-area: editor;
        }

        /* --- Footer --- */
        #svg-editor-app footer {
            grid-area: footer;
            background-color: var(--toolbar-bg);
            border-top: 1px solid var(--border);
            padding: 4px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        #svg-editor-app .footer-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        #svg-editor-app .footer-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex: 1;
            white-space: nowrap;
        }

        #svg-editor-app .footer-right {
            flex: 1;
            text-align: right;
            white-space: nowrap;
        }

        /* --- Preview Area --- */
        #svg-editor-app #preview-container {
            flex: 1;
            background-color: var(--preview-bg);
            color: var(--text-color);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #svg-editor-app #main-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* --- Editor Area --- */
        #svg-editor-app .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--panel-bg);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        #svg-editor-app .editor-wrapper.drag-over {
            box-shadow: inset 0 0 0 2px var(--primary);
        }

        #svg-editor-app textarea, #svg-editor-app .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            white-space: pre;       
            overflow-wrap: normal;  
            box-sizing: border-box;
            tab-size: 2;
        }

        #svg-editor-app textarea {
            color: transparent;
            background: transparent;
            caret-color: var(--primary);
            z-index: 2;
            overflow: auto; 
        }

        #svg-editor-app .backdrop {
            z-index: 1;
            color: var(--text-color);
            overflow: auto; 
            pointer-events: none;
        }

        #svg-editor-app mark {
            background-color: rgba(59, 130, 246, 0.3);
            color: inherit;
            border-radius: 2px;
            outline: 1px solid rgba(59, 130, 246, 0.6);
        }

        #svg-editor-app mark.point-mark {
            background-color: rgba(255, 85, 85, 0.4);
            border-radius: 2px;
            outline: 1px solid rgba(255, 85, 85, 0.8);
        }

        /* Embed-Safe Mobile Layout Modifications via Container Queries */
        @container (max-width: 700px) {
            #svg-editor-app .svg-editor-layout {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr auto;
                grid-template-areas:
                    "preview"
                    "header"
                    "editor"
                    "footer";
            }
            #svg-editor-app .preview-panel {
                border-right: none;
            }
            #svg-editor-app header {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
                padding: 6px 10px;
                gap: 6px;
                justify-content: center;
            }
            #svg-editor-app .toolbar-group {
                padding: 3px;
                gap: 4px;
            }
            #svg-editor-app .toolbar-right {
                margin-left: 0;
            }
            #svg-editor-app button {
                padding: 4px 8px;
                font-size: 0.8rem;
            }
            #svg-editor-app .toolbar-select {
                padding: 2px;
                width: 28px;
            }
        }
    </style>
</head>
<body>

    <div id="svg-editor-app">
        <div class="svg-editor-layout">
            <header>
                <div class="toolbar-group">
                    <select class="toolbar-select" id="tool-insert" title="Add Element">
                        <option value="" disabled selected>➕</option>
                        <option value="circle">⭕ Circle</option>
                        <option value="line">📏 Line</option>
                        <option value="path">〰️ Path</option>
                        <option value="polygon">⬠ Polygon</option>
                        <option value="polyline">📈 Polyline</option>
                        <option value="rect">🟦 Rectangle</option>
                        <option value="text">🔤 Text</option>
                        <option value="comment_start">💬 &lt;!--</option>
                        <option value="comment_end">💬 --&gt;</option>
                    </select>
                </div>

                <div class="toolbar-group">
                    <button data-action="move" data-dx="0" data-dy="-1" title="Move Up (↑)">▲</button>
                    <button data-action="move" data-dx="0" data-dy="1" title="Move Down (↓)">▼</button>
                    <button data-action="move" data-dx="-1" data-dy="0" title="Move Left (←)">◀</button>
                    <button data-action="move" data-dx="1" data-dy="0" title="Move Right (→)">▶</button>
                </div>

                <div class="toolbar-group">
                    <select class="toolbar-select" id="tool-transform" title="Transform">
                        <option value="" disabled selected>↻</option>
                        <option value="rot_90">↻ 90°</option>
                        <option value="rot_-90">↺ -90°</option>
                        <option value="rot_180">↻ 180°</option>
                        <option value="rot_45">↻ 45°</option>
                        <option value="rot_-45">↺ -45°</option>
                        <option value="flip_h">↔ Flip H</option>
                        <option value="flip_v">↕ Flip V</option>
                    </select>
                    <div class="toolbar-divider"></div>
                    <button class="danger" id="tool-delete" title="Delete">🗑️</button>
                </div>

                <div class="toolbar-group toolbar-right">
                    <button id="tool-undo" title="Undo (Ctrl+Z)">↶</button>
                    <button id="tool-redo" title="Redo (Ctrl+Y)">↷</button>
                    <button class="primary" id="tool-load" title="Load File">📂</button>
                    <button class="primary" id="tool-copy" title="Copy Code">📋</button>
                    <button class="primary" id="tool-save" title="Save SVG">💾</button>
                    <input type="file" id="file-input" accept=".svg,.txt,.html,.xml" style="display: none;">
                </div>
            </header>

            <div class="panel preview-panel">
                <div id="preview-container">
                    <svg id="main-svg" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <pattern id="gridPattern" patternUnits="userSpaceOnUse" width="10" height="10">
                                <rect width="100%" height="100%" fill="none" />
                                <path id="gridPatternLine" d="M 10 0 L 0 0 0 10" fill="none" stroke="var(--grid-line)" stroke-width="0.5" />
                            </pattern>
                        </defs>
                        <g id="grid-group">
                            <rect id="grid-rect" fill="url(#gridPattern)" />
                            <g id="grid-labels"></g>
                        </g>
                        <svg id="user-svg-container"></svg>
                        <g id="overlay-group" style="pointer-events: none;"></g>
                    </svg>
                </div>
            </div>
            
            <div class="panel editor-panel">
                <div class="editor-wrapper" id="editor-wrapper">
                    <div class="backdrop" id="backdrop"></div>
                    <textarea id="code" spellcheck="false"></textarea>
                </div>
            </div>

            <footer>
                <div class="footer-left">
                    <span id="error-badge" class="badge">Syntax Error</span>
                    <label class="toggle" style="font-size: inherit;">
                        <input type="checkbox" id="toggle-grid" checked> Grid
                    </label>
                    <button id="toggle-keyboard" title="Toggle Virtual Keyboard" style="background: none; border: none; padding: 0; margin-left: 5px; color: inherit; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;">⌨️</button>
                    <button id="toggle-theme" title="Theme: Auto" style="background: none; border: none; padding: 0; margin-left: 10px; color: inherit; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;">🌗</button>
                </div>
                <div class="footer-center">
                    <label for="move-step">Step:</label>
                    <input type="number" id="move-step" class="toolbar-select" min="1" max="500" value="1" style="font-size: 0.75rem; padding: 2px 4px; width: 50px; height: auto;">
                </div>
                <div class="footer-right">v6.19.0</div>
            </footer>
        </div>
    </div>

    <script>
        // Completely encase application logic in IIFE to protect host environments
        (function() {
            // Theme Controller Implementation
            let APP_THEME = 'auto'; // Supports 'auto', 'dark', 'light'

            function applyTheme() {
                const body = document.body;
                const app = document.getElementById('svg-editor-app');
                const themeBtn = document.getElementById('toggle-theme');
                
                let isDark = false;
                if (APP_THEME === 'dark') {
                    isDark = true;
                } else if (APP_THEME === 'light') {
                    isDark = false;
                } else {
                    // 'auto' - system media preference
                    isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                }
                
                if (isDark) {
                    body.classList.add('theme-dark');
                    if (app) app.classList.add('theme-dark');
                } else {
                    body.classList.remove('theme-dark');
                    if (app) app.classList.remove('theme-dark');
                }

                if (themeBtn) {
                    const themeIcons = { 'auto': '🌗', 'dark': '🌙', 'light': '☀️' };
                    themeBtn.innerHTML = themeIcons[APP_THEME] || '🌗';
                    themeBtn.title = `Theme: ${APP_THEME.charAt(0).toUpperCase() + APP_THEME.slice(1)}`;
                }
            }

            // Execute theme evaluation immediately
            applyTheme();

            if (APP_THEME === 'auto') {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                if (mediaQuery.addEventListener) {
                    mediaQuery.addEventListener('change', applyTheme);
                } else {
                    mediaQuery.addListener(applyTheme);
                }
            }

            document.addEventListener('DOMContentLoaded', applyTheme);

            const defaultCode = `<!-- NPN Transistor -->
<symbol id="npn" viewBox="0 0 100 100">
  <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="50" r="42" stroke-width="2" />
    <line x1="0" y1="50" x2="35" y2="50" />
    <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
    <path d="M35,40 L60,20 L60,0" />
    <path d="M35,60 L60,80 L60,100" />
    <polygon points="58,78 46,76 54,67" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  </g>
</symbol>`;

            // DOM Elements
            const textarea = document.getElementById('code');
            const backdrop = document.getElementById('backdrop');
            const userSvgContainer = document.getElementById('user-svg-container');
            const overlayGroup = document.getElementById('overlay-group');
            const mainSvg = document.getElementById('main-svg');
            const gridGroup = document.getElementById('grid-group');
            const gridRect = document.getElementById('grid-rect');
            const gridPattern = document.getElementById('gridPattern');
            const gridPatternLine = document.getElementById('gridPatternLine');
            const gridLabels = document.getElementById('grid-labels');
            const errorBadge = document.getElementById('error-badge');
            const toggleGrid = document.getElementById('toggle-grid');
            const toggleKeyboardBtn = document.getElementById('toggle-keyboard');
            const editorWrapper = document.getElementById('editor-wrapper');
            const moveStepInput = document.getElementById('move-step');

            // State & Singletons
            const MAX_HISTORY = 50;
            let history = [];
            let historyIndex = -1;
            let lastValidRender = "";
            let activeTagInfo = null;
            let debounceTimeout;
            let selectionRafId = null;
            let scrollRafId = null;
            let keyboardDisabled = false;
            let overlayTimeoutId = null;
            
            // Track previously highlighted node to restore its state
            let previouslyHighlightedNode = { node: null, originalStroke: null, originalColor: null };
            
            const domParser = new DOMParser();

            // --- Matrix Squashing Mathematics ---
            const multiplyMatrix = (m1, m2) => ({
                a: m1.a * m2.a + m1.c * m2.b,
                b: m1.b * m2.a + m1.d * m2.b,
                c: m1.a * m2.c + m1.c * m2.d,
                d: m1.b * m2.c + m1.d * m2.d,
                e: m1.a * m2.e + m1.c * m2.f + m1.e,
                f: m1.b * m2.e + m1.d * m2.f + m1.f
            });

            const createIdentity = () => ({a: 1, b: 0, c: 0, d: 1, e: 0, f: 0});

            // --- Core Application Utilities ---
            const SVGUtils = {
                getLogicalCenter: (activeNode) => {
                    if (!activeNode) return { cx: 0, cy: 0 };
                    const tagName = activeNode.tagName.toLowerCase();
                    const safeF = (val, fallback = 0) => {
                        let v = parseFloat(val);
                        return Number.isFinite(v) ? v : fallback;
                    };
                    
                    if (tagName === 'use' || tagName === 'image') {
                        let useX = safeF(activeNode.getAttribute('x'));
                        let useY = safeF(activeNode.getAttribute('y'));
                        let useW = safeF(activeNode.getAttribute('width'), NaN);
                        let useH = safeF(activeNode.getAttribute('height'), NaN);
                        
                        if (Number.isFinite(useW) && Number.isFinite(useH) && useW > 0 && useH > 0) {
                            return { cx: useX + useW / 2, cy: useY + useH / 2 };
                        }
                        
                        const href = activeNode.getAttribute('href') || activeNode.getAttribute('xlink:href');
                        if (href && href.startsWith('#')) {
                            const refId = href.substring(1);
                            const refNode = document.getElementById(refId) || document.querySelector(`[id="${refId}"]`);
                            if (refNode) {
                                if (refNode.viewBox && refNode.viewBox.baseVal && refNode.viewBox.baseVal.width > 0) {
                                    return { cx: useX + refNode.viewBox.baseVal.width / 2, cy: useY + refNode.viewBox.baseVal.height / 2 };
                                } else if (refNode.hasAttribute('width') && refNode.hasAttribute('height')) {
                                    return { cx: useX + safeF(refNode.getAttribute('width')) / 2, cy: useY + safeF(refNode.getAttribute('height')) / 2 };
                                }
                            }
                        }
                    } else if (tagName === 'circle' || tagName === 'ellipse') {
                        return { cx: safeF(activeNode.getAttribute('cx')), cy: safeF(activeNode.getAttribute('cy')) };
                    } else if (tagName === 'rect') {
                        let x = safeF(activeNode.getAttribute('x'));
                        let y = safeF(activeNode.getAttribute('y'));
                        let w = safeF(activeNode.getAttribute('width'));
                        let h = safeF(activeNode.getAttribute('height'));
                        return { cx: x + w / 2, cy: y + h / 2 };
                    } else if (tagName === 'line') {
                        let x1 = safeF(activeNode.getAttribute('x1'));
                        let y1 = safeF(activeNode.getAttribute('y1'));
                        let x2 = safeF(activeNode.getAttribute('x2'));
                        let y2 = safeF(activeNode.getAttribute('y2'));
                        return { cx: (x1 + x2) / 2, cy: (y1 + y2) / 2 };
                    }

                    try {
                        let bbox = activeNode.getBBox();
                        if (bbox.width > 0 || bbox.height > 0) {
                            return { cx: safeF(bbox.x) + safeF(bbox.width) / 2, cy: safeF(bbox.y) + safeF(bbox.height) / 2 };
                        }
                    } catch (e) {}

                    return { cx: safeF(activeNode.getAttribute('x')), cy: safeF(activeNode.getAttribute('y')) };
                },

                getMatrix: (str) => {
                    if (!str) return createIdentity();
                    let m = createIdentity();
                    const cmdRegex = /(translate|rotate|scale|matrix|skewX|skewY)\s*\(([^)]+)\)/ig;
                    let match;
                    while ((match = cmdRegex.exec(str)) !== null) {
                        const type = match[1].toLowerCase();
                        const args = match[2].split(/[,\s]+/).map(parseFloat).filter(n => !isNaN(n));
                        let nextM = createIdentity();

                        if (type === 'translate') {
                            nextM.e = args[0] || 0;
                            nextM.f = args.length > 1 ? args[1] : 0;
