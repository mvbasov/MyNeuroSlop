                                                let absY = upper === 'V' ? (isRel ? currentStartY + val : val) : currentStartY;

                                                if (localRelPos >= pStart - 1 && pStart >= 0 && localRelPos <= pEnd + 1) {
                                                    foundSub = { start: valStart + pStart, end: valStart + pEnd, cx: absX, cy: absY };
                                                    break;
                                                }
                                                if (upper === 'H') currentStartX = absX;
                                                if (upper === 'V') currentStartY = absY;
                                            }
                                            if (foundSub) return foundSub;
                                        }

                                        let ret = {
                                            start: valStart + cMatch.index, end: valStart + cMatch.index + chunk.length,
                                            cx: endX, cy: endY
                                        };
                                        
                                        if (upper === 'Q') {
                                            ret.qData = { startX: qStartX, startY: qStartY, c1x: isRel ? qStartX + nums[0] : nums[0], c1y: isRel ? qStartY + nums[1] : nums[1], endX: isRel ? qStartX + nums[2] : nums[2], endY: isRel ? qStartY + nums[3] : nums[3], activePoint: 'both' };
                                        } else if (upper === 'C' && nums.length >= 6) {
                                            ret.cData = { startX: qStartX, startY: qStartY, c1x: isRel ? qStartX + nums[0] : nums[0], c1y: isRel ? qStartY + nums[1] : nums[1], c2x: isRel ? qStartX + nums[2] : nums[2], c2y: isRel ? qStartY + nums[3] : nums[3], endX: isRel ? qStartX + nums[4] : nums[4], endY: isRel ? qStartY + nums[5] : nums[5], activePoint: 'both' };
                                        }
                                        return ret;
                                    }
                                    currX = endX;
                                    currY = endY;
                                }
                            }
                        }
                        return null;
                    },
                    movePoint: (tagStr, relPos, dx, dy) => {
                        const dMatch = tagStr.match(/\bd=["']([^"']+)["']/i);
                        if (dMatch) {
                            const valStart = dMatch.index + dMatch[0].indexOf(dMatch[1]);
                            const valEnd = valStart + dMatch[1].length;
                            
                            if (relPos >= valStart && relPos <= valEnd) {
                                const localRelPos = relPos - valStart;
                                const cmdRegex = /([a-df-zA-DF-Z][^a-df-zA-DF-Z]*)/g;
                                let cMatch;
                                let newVal = dMatch[1];
                                
                                while ((cMatch = cmdRegex.exec(dMatch[1])) !== null) {
                                    if (localRelPos >= cMatch.index - 1 && localRelPos <= cMatch.index + cMatch[0].length + 1) {
                                        const chunk = cMatch[0];
                                        const letter = chunk.trim()[0];
                                        const upper = letter.toUpperCase();

                                        if (['Q', 'C', 'M', 'L', 'T', 'S'].includes(upper)) {
                                            const pairRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)(?:[,\s]+|(?=-))(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;
                                            let pMatch;
                                            let modifiedChunk = chunk;
                                            let pairMoved = false;

                                            while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                                if (localRelPos >= cMatch.index + pMatch.index - 1 && localRelPos <= cMatch.index + pMatch.index + pMatch[0].length + 1) {
                                                    const nx = parseFloat(pMatch[1]) + dx;
                                                    const ny = parseFloat(pMatch[2]) + dy;
                                                    modifiedChunk = modifiedChunk.substring(0, pMatch.index) + `${nx},${ny}` + modifiedChunk.substring(pMatch.index + pMatch[0].length);
                                                    pairMoved = true;
                                                    break;
                                                }
                                            }
                                            if (pairMoved) {
                                                newVal = newVal.substring(0, cMatch.index) + modifiedChunk + newVal.substring(cMatch.index + cMatch[0].length);
                                                newVal = SVGUtils.formatPathData(newVal);
                                                return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                            }
                                        } else if (upper === 'H' || upper === 'V') {
                                            const numRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;
                                            let nMatch;
                                            let modifiedChunk = chunk;
                                            let numMoved = false;

                                            while ((nMatch = numRegex.exec(chunk)) !== null) {
                                                if (localRelPos >= cMatch.index + nMatch.index - 1 && localRelPos <= cMatch.index + nMatch.index + nMatch[0].length + 1) {
                                                    const delta = upper === 'H' ? dx : dy;
                                                    const nn = parseFloat(nMatch[1]) + delta;
                                                    modifiedChunk = modifiedChunk.substring(0, nMatch.index) + nn + modifiedChunk.substring(nMatch.index + nMatch[0].length);
                                                    numMoved = true;
                                                    break;
                                                }
                                            }
                                            if (numMoved) {
                                                newVal = newVal.substring(0, cMatch.index) + modifiedChunk + newVal.substring(cMatch.index + cMatch[0].length);
                                                newVal = SVGUtils.formatPathData(newVal);
                                                return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                            }
                                        }

                                        const shiftedCmd = SVGUtils.shiftSinglePathCommand(cMatch[0], dx, dy);
                                        newVal = newVal.substring(0, cMatch.index) + shiftedCmd + newVal.substring(cMatch.index + cMatch[0].length);
                                        newVal = SVGUtils.formatPathData(newVal);
                                        return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                    }
                                }
                            }
                        }
                        return { modified: false };
                    },
                    moveElement: (tagStr, dx, dy) => {
                        return tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => `d="${SVGUtils.shiftPathD(val, dx, dy)}"`);
                    },
                    transformElement: (tagStr, action, transPoint) => {
                        const f = n => parseFloat(n.toFixed(3));
                        return tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => {
                            const commands = val.match(/[a-df-zA-Z][^a-df-zA-Z]*/g);
                            if (!commands) return match;

                            let currX = 0, currY = 0;
                            let startX = 0, startY = 0;

                            const processCommand = (cmdChunk) => {
                                const letter = cmdChunk.trim()[0];
                                const nums = (cmdChunk.substring(1).match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                                const upper = letter.toUpperCase();
                                const isRel = letter === letter.toLowerCase();

                                if (upper === 'Z') {
                                    currX = startX;
                                    currY = startY;
                                    return 'Z';
                                }

                                let out = [];
                                let isFlip = action === 'flip_h' || action === 'flip_v';

                                if (upper === 'H') {
                                    for (let n of nums) {
                                        currX = isRel ? currX + n : n;
                                        let [rx, ry] = transPoint(currX, currY);
                                        out.push(`L${f(rx)},${f(ry)}`);
                                    }
                                } else if (upper === 'V') {
                                    for (let n of nums) {
                                        currY = isRel ? currY + n : n;
                                        let [rx, ry] = transPoint(currX, currY);
                                        out.push(`L${f(rx)},${f(ry)}`);
                                    }
                                } else if (upper === 'M' || upper === 'L' || upper === 'T') {
                                    for (let i = 0; i < nums.length; i += 2) {
                                        currX = isRel ? currX + nums[i] : nums[i];
                                        currY = isRel ? currY + nums[i+1] : nums[i+1];
                                        if (upper === 'M' && i === 0) {
                                            startX = currX;
                                            startY = currY;
                                        }
                                        let [rx, ry] = transPoint(currX, currY);
                                        out.push(`${(upper === 'M' && i === 0) ? 'M' : (upper === 'M' ? 'L' : upper)}${f(rx)},${f(ry)}`);
                                    }
                                } else if (upper === 'Q' || upper === 'S') {
                                    for (let i = 0; i < nums.length; i += 4) {
                                        let c1x = isRel ? currX + nums[i] : nums[i];
                                        let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                        let endX = isRel ? currX + nums[i+2] : nums[i+2];
                                        let endY = isRel ? currY + nums[i+3] : nums[i+3];
                                        
                                        let [rc1x, rc1y] = transPoint(c1x, c1y);
                                        let [rendX, rendY] = transPoint(endX, endY);
                                        
                                        out.push(`${upper}${f(rc1x)},${f(rc1y)} ${f(rendX)},${f(rendY)}`);
                                        currX = endX;
                                        currY = endY;
                                    }
                                } else if (upper === 'C') {
                                    for (let i = 0; i < nums.length; i += 6) {
                                        let c1x = isRel ? currX + nums[i] : nums[i];
                                        let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                        let c2x = isRel ? currX + nums[i+2] : nums[i+2];
                                        let c2y = isRel ? currY + nums[i+3] : nums[i+3];
                                        let endX = isRel ? currX + nums[i+4] : nums[i+4];
                                        let endY = isRel ? currY + nums[i+5] : nums[i+5];
                                        
                                        let [rc1x, rc1y] = transPoint(c1x, c1y);
                                        let [rc2x, rc2y] = transPoint(c2x, c2y);
                                        let [rendX, rendY] = transPoint(endX, endY);
                                        
                                        out.push(`C${f(rc1x)},${f(rc1y)} ${f(rc2x)},${f(rc2y)} ${f(rendX)},${f(rendY)}`);
                                        currX = endX;
                                        currY = endY;
                                    }
                                } else if (upper === 'A') {
                                    for (let i = 0; i < nums.length; i += 7) {
                                        let rx_val = nums[i];
                                        let ry_val = nums[i+1];
                                        let xRot = nums[i+2];
                                        let largeArc = nums[i+3];
                                        let sweep = nums[i+4];
                                        let endX = isRel ? currX + nums[i+5] : nums[i+5];
                                        let endY = isRel ? currY + nums[i+6] : nums[i+6];
                                        
                                        if (action.startsWith('rot_')) {
                                            let angle = parseFloat(action.replace('rot_', ''));
                                            xRot = (xRot + angle) % 360;
                                        }

                                        if (isFlip) {
                                            sweep = sweep === 1 ? 0 : 1; 
                                            if (action === 'flip_h' || action === 'flip_v') xRot = -xRot;
                                        }

                                        let [rendX, rendY] = transPoint(endX, endY);
                                        
                                        out.push(`A${f(rx_val)},${f(ry_val)} ${f(xRot)} ${largeArc} ${sweep} ${f(rendX)},${f(rendY)}`);
                                        currX = endX;
                                        currY = endY;
                                    }
                                }
                                return out.join(' ');
                            };

                            let newD = commands.map(processCommand).join(' ').replace(/\s+/g, ' ').trim();
                            return `d="${newD}"`;
                        });
                    }
                },
                default: { moveElement: (tagStr, dx, dy) => tagStr }
            };
            
            // Link identical strategies
            ShapeRegistry.polyline = ShapeRegistry.polygon;
            ShapeRegistry.ellipse = ShapeRegistry.circle;
            ShapeRegistry.image = ShapeRegistry.use;

            // --- Initialization ---
            const initApp = () => {
                bindEvents();
                textarea.value = defaultCode;
                saveHistory(defaultCode);
                processInput(true);
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApp);
            } else {
                initApp();
            }

            function bindEvents() {
                // Programmatic listeners to prevent inline handler clashes
                document.getElementById('tool-insert').addEventListener('change', function() {
                    if(this.value) { insertShape(this.value); this.value=''; }
                });

                document.querySelectorAll('button[data-action="move"]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const dx = parseInt(btn.getAttribute('data-dx'), 10);
                        const dy = parseInt(btn.getAttribute('data-dy'), 10);
                        moveShape(dx, dy);
                    });
                });

                document.getElementById('tool-transform').addEventListener('change', function() {
                    if(this.value) { transformShape(this.value); this.value=''; }
                });

                document.getElementById('tool-delete').addEventListener('click', deleteActiveShape);
                document.getElementById('tool-undo').addEventListener('click', undo);
                document.getElementById('tool-redo').addEventListener('click', redo);
                document.getElementById('tool-load').addEventListener('click', () => document.getElementById('file-input').click());
                document.getElementById('tool-copy').addEventListener('click', copyToClipboard);
                document.getElementById('tool-save').addEventListener('click', downloadSVG);
                document.getElementById('file-input').addEventListener('change', loadFromFile);

                textarea.addEventListener('input', (e) => {
                    processInput(false);
                    clearTimeout(debounceTimeout);
                    debounceTimeout = setTimeout(() => saveHistory(e.target.value), 600);
                });

                const selectionEvents = ['keyup', 'click', 'focus', 'touchend'];
                selectionEvents.forEach(evt => textarea.addEventListener(evt, () => {
                    if (selectionRafId) cancelAnimationFrame(selectionRafId);
                    selectionRafId = requestAnimationFrame(updateSelection);
                }));

                textarea.addEventListener('scroll', () => {
                    if (scrollRafId) cancelAnimationFrame(scrollRafId);
                    scrollRafId = requestAnimationFrame(() => {
                        backdrop.scrollTop = textarea.scrollTop;
                        backdrop.scrollLeft = textarea.scrollLeft;
                    });
                });

                toggleGrid.addEventListener('change', () => {
                    gridGroup.style.display = toggleGrid.checked ? 'block' : 'none';
                });

                toggleKeyboardBtn.addEventListener('click', () => {
                    keyboardDisabled = !keyboardDisabled;
                    if (keyboardDisabled) {
                        textarea.setAttribute('inputmode', 'none');
                        toggleKeyboardBtn.style.opacity = '0.5';
                    } else {
                        textarea.removeAttribute('inputmode');
                        toggleKeyboardBtn.style.opacity = '1';
                    }
                });

                const toggleThemeBtn = document.getElementById('toggle-theme');
                if (toggleThemeBtn) {
                    toggleThemeBtn.addEventListener('click', () => {
                        if (APP_THEME === 'auto') APP_THEME = 'dark';
                        else if (APP_THEME === 'dark') APP_THEME = 'light';
                        else APP_THEME = 'auto';
                        applyTheme();
                    });
                }

                window.addEventListener('keydown', (e) => {
                    const app = document.getElementById('svg-editor-app');
                    if (!app.contains(document.activeElement) && document.activeElement !== document.body) return;

                    if (e.ctrlKey || e.metaKey) {
                        if (e.key === 'z') { e.preventDefault(); undo(); }
                        if (e.key === 'y' || (e.shiftKey && e.key === 'Z')) { e.preventDefault(); redo(); }
                    }
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                        if (selectionRafId) cancelAnimationFrame(selectionRafId);
                        selectionRafId = requestAnimationFrame(updateSelection);
                    }
                });

                if (editorWrapper) {
                    editorWrapper.addEventListener('dragover', (e) => { e.preventDefault(); editorWrapper.classList.add('drag-over'); });
                    editorWrapper.addEventListener('dragleave', (e) => { e.preventDefault(); editorWrapper.classList.remove('drag-over'); });
                    editorWrapper.addEventListener('drop', (e) => {
                        e.preventDefault();
                        editorWrapper.classList.remove('drag-over');
                        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                            const reader = new FileReader();
                            reader.onload = evt => { updateCode(evt.target.result, true); textarea.scrollTop = 0; textarea.scrollLeft = 0; };
                            reader.readAsText(e.dataTransfer.files[0]);
                        }
                    });
                }
            }

            // --- Core Processing ---
            function processInput(forceUpdate = false) {
                const code = textarea.value;
                const previewCode = code.replace(/<symbol/gi, '<svg').replace(/<\/symbol>/gi, '</svg>');
                const doc = domParser.parseFromString(`<svg xmlns="http://www.w3.org/2000/svg">${previewCode}</svg>`, "image/svg+xml");
                const isError = doc.querySelector("parsererror");

                if (isError) {
                    errorBadge.style.display = 'inline-block';
                    if (selectionRafId) cancelAnimationFrame(selectionRafId);
                    selectionRafId = requestAnimationFrame(updateSelection);
                    return;
                }
                
                errorBadge.style.display = 'none';
                lastValidRender = previewCode;
                userSvgContainer.innerHTML = previewCode;
                updateGrid(code);
                
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }

            // --- History System (Memory Optimized) ---
            function saveHistory(code) {
                if (historyIndex >= 0 && history[historyIndex] === code) return;
                history = history.slice(0, historyIndex + 1);
                history.push(code);
                
                // Truncate to prevent unbounded memory growth on long sessions
                if (history.length > MAX_HISTORY) {
                    history.shift();
                }
                historyIndex = history.length - 1;
            }

            function applyState() {
                const savedScrollTop = textarea.scrollTop;
                const savedScrollLeft = textarea.scrollLeft;
                
                textarea.value = history[historyIndex];
                textarea.scrollTop = savedScrollTop;
                textarea.scrollLeft = savedScrollLeft;
                
                processInput(true);
            }

            function undo() {
                if (historyIndex > 0) {
                    historyIndex--;
                    applyState();
                }
            }

            function redo() {
                if (historyIndex < history.length - 1) {
                    historyIndex++;
                    applyState();
                }
            }

            function updateCode(newCode, save = true) {
                textarea.value = newCode;
                processInput(true);
                if (save) saveHistory(newCode);
            }

            // --- Grid & Viewport Management ---
            function updateGrid(code) {
                let viewBoxMatch = code.replace(/<!--[\s\S]*?-->/g, '').match(/viewBox=["']([^"']+)["']/i);
                let vb = viewBoxMatch ? viewBoxMatch[1].trim().split(/[\s,]+/).map(Number) : [0, 0, 100, 100];
                
                if (vb.length < 4 || vb.some(isNaN) || vb[2] <= 0 || vb[3] <= 0) {
                    vb = [0, 0, 100, 100];
                }
                
                const vx = vb[0], vy = vb[1], vw = vb[2], vh = vb[3];
                const step = vw / 10;
                const pad = step * 2.5;

                mainSvg.setAttribute('viewBox', `${vx - pad} ${vy - pad} ${vw + 2*pad} ${vh + 2*pad}`);
                userSvgContainer.setAttribute('x', vx);
                userSvgContainer.setAttribute('y', vy);
                userSvgContainer.setAttribute('width', vw);
                userSvgContainer.setAttribute('height', vh);

                gridPattern.setAttribute('width', step);
                gridPattern.setAttribute('height', step);
                gridPatternLine.setAttribute('d', `M ${step} 0 L 0 0 0 ${step}`);
                
                gridRect.setAttribute('x', vx);
                gridRect.setAttribute('y', vy);
                gridRect.setAttribute('width', vw);
                gridRect.setAttribute('height', vh);

                let labelsArr = [];
                const maxStepsX = Math.min(Math.floor(vw / step), 500);
                const maxStepsY = Math.min(Math.floor(vh / step), 500);

                for (let i = 0; i <= maxStepsX; i++) {
                    if (i === 0 || i === maxStepsX || i % 2 === 0) {
                        let valX = vx + i * step;
                        let textX = parseFloat(valX.toFixed(2));
                        labelsArr.push(`<text x="${valX}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
                    }
                }
                
                if (vw - maxStepsX * step > 0.001 && maxStepsX < 500) {
                    let textX = parseFloat((vx + vw).toFixed(2));
                    labelsArr.push(`<text x="${vx + vw}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
                }

                for (let i = 0; i <= maxStepsY; i++) {
                    if (i === 0 || i === maxStepsY || i % 2 === 0) {
                        let valY = vy + i * step;
                        let textY = parseFloat(valY.toFixed(2));
                        labelsArr.push(`<text x="${vx - step*0.3}" y="${valY + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
                    }
                }
                
                if (vh - maxStepsY * step > 0.001 && maxStepsY < 500) {
                    let textY = parseFloat((vy + vh).toFixed(2));
                    labelsArr.push(`<text x="${vx - step*0.3}" y="${vy + vh + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
                }

                gridLabels.innerHTML = labelsArr.join('');
            }

            // --- State Machine Tokenizer (Robust HTML/XML Parsing) ---
            function getActiveTag(html, cursor) {
                let elements = [];
                let state = 'TEXT'; 
                let currentStart = -1;
                let domIndex = 0;
                let stack = [];

                for (let i = 0; i < html.length; i++) {
                    const char = html[i];
                    if (state === 'TEXT') {
                        if (char === '<') {
                            if (html.substring(i, i + 4) === '<!--') {
                                state = 'IN_COMMENT';
                                currentStart = i;
                                i += 3;
                            } else {
                                state = 'IN_TAG';
                                currentStart = i;
                            }
                        }
                    } else if (state === 'IN_COMMENT') {
                        if (char === '-' && html.substring(i, i + 3) === '-->') {
                            state = 'TEXT';
                            let el = {
                                domIndex: -1,
                                start: currentStart,
                                effectiveStart: currentStart,
                                tagEnd: i + 3,
                                fullEnd: i + 3,
                                closeStart: -1,
                                tagName: '!--'
                            };
                            elements.push(el);
                            i += 2;
                        }
                    } else if (state === 'IN_TAG') {
                        if (char === '"') state = 'IN_ATTR_DOUBLE';
                        else if (char === "'") state = 'IN_ATTR_SINGLE';
                        else if (char === '>') {
                            state = 'TEXT';
                            let tagStr = html.substring(currentStart, i + 1);
                            let isClose = tagStr.startsWith('</');
                            let isSelfClosing = /\/\s*>$/.test(tagStr);
                            let tagNameMatch = tagStr.match(/<\/?([a-z0-9:-]+)/i);
                            let tagName = tagNameMatch ? tagNameMatch[1] : '';

                            let effectiveStart = currentStart;
                            while (effectiveStart > 0 && (html[effectiveStart - 1] === ' ' || html[effectiveStart - 1] === '\t' || html[effectiveStart - 1] === '\n')) {
                                effectiveStart--;
                            }

                            let el = {
                                domIndex: isClose ? -1 : domIndex++,
                                start: currentStart,
                                effectiveStart: effectiveStart,
                                tagEnd: i + 1,
                                fullEnd: i + 1,
                                closeStart: isSelfClosing ? (i + 1) : -1,
                                tagName: tagName
                            };

                            if (isClose) {
                                if (stack.length > 0) {
                                    let top = stack.pop();
                                    top.fullEnd = i + 1;
                                    top.closeStart = currentStart;
                                }
                            } else {
                                if (tagName.toLowerCase() !== 'br' && tagName.toLowerCase() !== 'hr') {
                                    elements.push(el);
                                    if (!isSelfClosing) stack.push(el);
                                }
                            }
                        }
                    } else if (state === 'IN_ATTR_DOUBLE') {
                        if (char === '"') state = 'IN_TAG';
                    } else if (state === 'IN_ATTR_SINGLE') {
                        if (char === "'") state = 'IN_TAG';
                    }
                }

                // Close unclosed tags implicitly at end of document
                for (let s of stack) {
                    s.fullEnd = html.length;
                    s.closeStart = html.length;
                }
                if (state === 'IN_COMMENT') {
                    elements.push({
                        domIndex: -1,
                        start: currentStart,
                        effectiveStart: currentStart,
                        tagEnd: html.length,
                        fullEnd: html.length,
                        closeStart: -1,
                        tagName: '!--'
                    });
                }

                let active = null;
                let minSize = Infinity;
                for (let el of elements) {
                    if (cursor >= el.effectiveStart && cursor <= el.fullEnd) {
                        let size = el.fullEnd - el.start;
                        if (size < minSize) {
                            minSize = size;
                            active = el;
                        }
                    }
                }
                return active;
            }

            // --- Decoupled Tracking & Highlighting ---
            function updateSelection() {
                const code = textarea.value;
                const cursor = textarea.selectionStart;
                
                activeTagInfo = getActiveTag(code, cursor);
                
                let activeSub = null;
                let activeNode = null;
                
                // Clear previous formatting
                if (previouslyHighlightedNode.node) {
                    const { node, originalStroke, originalColor } = previouslyHighlightedNode;
                    if (originalStroke === null) node.removeAttribute('stroke');
                    else node.setAttribute('stroke', originalStroke);
                    if (originalColor === null) node.removeAttribute('color');
                    else node.setAttribute('color', originalColor);
                    previouslyHighlightedNode.node = null;
                }

                if (activeTagInfo && activeTagInfo.domIndex >= 0) {
                    const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
                    activeNode = liveElements[activeTagInfo.domIndex];
                    
                    if (activeNode) {
                        previouslyHighlightedNode.node = activeNode;
                        previouslyHighlightedNode.originalStroke = activeNode.getAttribute('stroke');
                        previouslyHighlightedNode.originalColor = activeNode.getAttribute('color');
                        
                        activeNode.setAttribute('stroke', '#3b82f6');
                        activeNode.setAttribute('color', '#3b82f6'); 
                        
                        const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                        const relPos = cursor - activeTagInfo.start;
                        activeSub = getActiveSubElement(tagStr, relPos, activeTagInfo.tagName.toLowerCase(), activeNode);
                    }
                }

                // 1. Instant Text Update
                updateBackdropText(code, activeSub);

                // 2. Debounced Visual Overlay (Prevents Thrashing during rapid movement)
                if (overlayTimeoutId) clearTimeout(overlayTimeoutId);
                overlayGroup.innerHTML = ''; 
                
                if (activeNode && activeSub) {
                    overlayTimeoutId = setTimeout(() => {
                        renderVisualOverlay(activeNode, activeSub);
                    }, 50);
                }
            }

            function updateBackdropText(code, activeSub) {
                let finalHTML = '';
                if (activeTagInfo) {
                    const before = escapeHTML(code.substring(0, activeTagInfo.start));
                    let highlight = '';
                    
                    if (activeSub) {
                        const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                        const ranges = activeSub.ranges || [{start: activeSub.start, end: activeSub.end}];
                        ranges.sort((a, b) => a.start - b.start);
                        
                        let hlResult = '';
                        let lastIdx = 0;
                        for (let r of ranges) {
                            hlResult += escapeHTML(tagStr.substring(lastIdx, r.start));
                            hlResult += `<mark class="point-mark">${escapeHTML(tagStr.substring(r.start, r.end))}</mark>`;
                            lastIdx = r.end;
                        }
                        hlResult += escapeHTML(tagStr.substring(lastIdx));
                        highlight = hlResult;
                    } else {
                        highlight = escapeHTML(code.substring(activeTagInfo.start, activeTagInfo.tagEnd));
                    }
                    
                    const after = escapeHTML(code.substring(activeTagInfo.tagEnd));
                    finalHTML = before + `<mark>${highlight}</mark>` + after;
                } else {
                    finalHTML = escapeHTML(code);
                }
                
                if (code.endsWith('\n')) finalHTML += ' ';
                backdrop.innerHTML = finalHTML;
            }

            function escapeHTML(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            function renderVisualOverlay(activeNode, activeSub) {
                if (!activeSub) return;
                
                const hasValidCenter = Number.isFinite(activeSub.cx) && Number.isFinite(activeSub.cy);
                if (!hasValidCenter && !activeSub.qData && !activeSub.cData) return;
                
                const vw = parseFloat(userSvgContainer.getAttribute('width') || 100);
                const r = vw * 0.02;
                
                const getMappedCoords = (x, y) => {
                    let tx = Number.isFinite(x) ? x : 0;
                    let ty = Number.isFinite(y) ? y : 0;
                    try {
                        const pt = mainSvg.createSVGPoint();
                        pt.x = tx;
                        pt.y = ty;
                        const ctm = activeNode.getScreenCTM();
                        const inv = mainSvg.getScreenCTM().inverse();
                        if (ctm && inv) {
                            const screenPt = pt.matrixTransform(ctm);
                            const overlayPt = screenPt.matrixTransform(inv);
                            tx = overlayPt.x;
                            ty = overlayPt.y;
                        }
                    } catch(e) {
                        console.error("CTM Transformation Error:", e);
                    }
                    return {tx, ty};
                };

                if (activeSub.cData) {
                    const pStart = getMappedCoords(activeSub.cData.startX, activeSub.cData.startY);
                    const pC1 = getMappedCoords(activeSub.cData.c1x, activeSub.cData.c1y);
                    const pC2 = getMappedCoords(activeSub.cData.c2x, activeSub.cData.c2y);
                    const pEnd = getMappedCoords(activeSub.cData.endX, activeSub.cData.endY);
                    
                    let c1Color = (activeSub.cData.activePoint === 'c1' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                    let c2Color = (activeSub.cData.activePoint === 'c2' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                    let endColor = (activeSub.cData.activePoint === 'end' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                    
                    overlayGroup.innerHTML = `
                        <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                        <line x1="${pC2.tx}" y1="${pC2.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                        <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                        <circle cx="${pC2.tx}" cy="${pC2.ty}" r="${r}" fill="${c2Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                        <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                    `;
                } else if (activeSub.qData) {
                    const pStart = getMappedCoords(activeSub.qData.startX, activeSub.qData.startY);
                    const pC1 = getMappedCoords(activeSub.qData.c1x, activeSub.qData.c1y);
                    const pEnd = getMappedCoords(activeSub.qData.endX, activeSub.qData.endY);
                    
                    let c1Color = activeSub.qData.activePoint === 'end' ? 'var(--primary)' : 'var(--danger)';
                    let endColor = activeSub.qData.activePoint === 'control' ? 'var(--primary)' : 'var(--danger)';
                    
                    overlayGroup.innerHTML = `
                        <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                        <line x1="${pC1.tx}" y1="${pC1.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                        <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                        <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                    `;
                } else {
                    const p = getMappedCoords(activeSub.cx, activeSub.cy);
                    overlayGroup.innerHTML = `<circle cx="${p.tx}" cy="${p.ty}" r="${r}" fill="var(--danger)" stroke="#fff" stroke-width="${r * 0.2}" />`;
                }
            }

            function getActiveSubElement(tagStr, relPos, tagName, activeNode) {
                let sub = UniversalAttributes.getSubElement(tagStr, relPos, activeNode);
                if (sub) return sub;

                const handler = ShapeRegistry[tagName];
                if (handler && handler.getSubElement) {
                    return handler.getSubElement(tagStr, relPos, activeNode);
                }
                return null;
            }

            // --- Tools (Move, Insert, Delete, Transform) ---
            function moveShape(dirX, dirY) {
                if (!activeTagInfo) return;
                const code = textarea.value;
                let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                const tagName = activeTagInfo.tagName.toLowerCase();
                const relPos = textarea.selectionStart - activeTagInfo.start;
                
                const step = parseFloat(moveStepInput.value) || 1;
                const dx = dirX * step;
                const dy = dirY * step;

                const handler = ShapeRegistry[tagName] || ShapeRegistry.default;
                let moveResult = null;

                if (handler.movePoint) moveResult = handler.movePoint(tagStr, relPos, dx, dy);
                if (!moveResult || !moveResult.modified) moveResult = UniversalAttributes.movePoint(tagStr, relPos, dx, dy);
                if (!moveResult || !moveResult.modified) {
                    if (handler.moveElement) {
                        const newTagStr = handler.moveElement(tagStr, dx, dy);
                        if (newTagStr !== tagStr) moveResult = { modified: true, tagStr: newTagStr };
                    }
                }

                if (!moveResult || !moveResult.modified) return;
                
                tagStr = moveResult.tagStr;
                const newCode = code.substring(0, activeTagInfo.start) + tagStr + code.substring(activeTagInfo.tagEnd);
                const offset = tagStr.length - (activeTagInfo.tagEnd - activeTagInfo.start);
                let newCursor = textarea.selectionStart;
                if (newCursor > activeTagInfo.start) newCursor += offset;

                const savedScrollTop = textarea.scrollTop;
                const savedScrollLeft = textarea.scrollLeft;

                updateCode(newCode, true);
                textarea.focus();
                textarea.setSelectionRange(newCursor, newCursor);
                textarea.scrollTop = savedScrollTop;
                textarea.scrollLeft = savedScrollLeft;
                
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }

            function transformShape(action) {
                if (!activeTagInfo) return;
                const code = textarea.value;
                const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
                const activeNode = liveElements[activeTagInfo.domIndex];
                
                if (!activeNode) return;

                const center = SVGUtils.getLogicalCenter(activeNode);
                const cx = center.cx;
                const cy = center.cy;

                let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                const tagName = activeTagInfo.tagName.toLowerCase();

                let transPoint;
                if (action.startsWith('rot_')) {
                    const angle = parseFloat(action.replace('rot_', ''));
                    const rad = angle * Math.PI / 180;
                    const cos = Math.cos(rad);
                    const sin = Math.sin(rad);
                    transPoint = (px, py) => {
                        const dx = px - cx;
                        const dy = py - cy;
                        return [cx + dx * cos - dy * sin, cy + dx * sin + dy * cos];
                    };
                } else if (action === 'flip_h') {
                    transPoint = (px, py) => [cx - (px - cx), py];
                } else if (action === 'flip_v') {
                    transPoint = (px, py) => [px, cy - (py - cy)];
                }

                const handler = ShapeRegistry[tagName] || ShapeRegistry.default;
                let modified = false;

                if (handler.transformElement) {
                    const newTagStr = handler.transformElement(tagStr, action, transPoint, activeNode, cx, cy);
                    if (newTagStr !== tagStr) {
                        tagStr = newTagStr;
                        modified = true;
                    }
                }

                if (!modified) return;

                const newCode = code.substring(0, activeTagInfo.start) + tagStr + code.substring(activeTagInfo.tagEnd);
                const offset = tagStr.length - (activeTagInfo.tagEnd - activeTagInfo.start);
                let newCursor = textarea.selectionStart;
                if (newCursor > activeTagInfo.start) newCursor += offset;

                const savedScrollTop = textarea.scrollTop;
                const savedScrollLeft = textarea.scrollLeft;

                updateCode(newCode, true);
                textarea.focus();
                textarea.setSelectionRange(newCursor, newCursor);
                textarea.scrollTop = savedScrollTop;
                textarea.scrollLeft = savedScrollLeft;
                
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }

            function insertShape(type) {
                let shapeMap = {
                    'circle': `<circle cx="50" cy="50" r="10" />`,
                    'line': `<line x1="10" y1="10" x2="90" y2="90" />`,
                    'path': `<path d="M20,20 L80,80" />`,
                    'polygon': `<polygon points="20,80 50,20 80,80" />`,
                    'polyline': `<polyline points="20,20 50,80 80,20" />`,
                    'rect': `<rect x="10" y="10" width="80" height="80" />`,
                    'text': `<text x="50" y="50" font-family="sans-serif" font-size="14" text-anchor="middle">Text</text>`,
                    'comment_start': `<!-- `,
                    'comment_end': ` -->`
                };
                
                let template = shapeMap[type] || '';
                const code = textarea.value;
                let insertPos = textarea.selectionStart;
                let indent = "\n  ";
                
                if (type === 'comment_start') {
                    let refPos = textarea.selectionStart;
                    if (activeTagInfo && activeTagInfo.tagName !== '!--') refPos = activeTagInfo.start;
                    const lineStart = code.lastIndexOf('\n', refPos - 1);
                    insertPos = lineStart === -1 ? 0 : lineStart + 1;
                    template = "<!--\n";
                    indent = "";
                } else if (type === 'comment_end') {
                    if (activeTagInfo && activeTagInfo.tagName !== '!--') {
                        insertPos = activeTagInfo.fullEnd;
                    } else {
                        const lineEnd = code.indexOf('\n', textarea.selectionStart);
                        insertPos = lineEnd === -1 ? code.length : lineEnd;
                    }
                    template = "\n-->";
                    indent = "";
                } else {
                    if (activeTagInfo) {
                        const nonContainers = ['circle', 'line', 'path', 'polygon', 'polyline', 'rect', 'text', 'tspan', 'ellipse', 'image', 'use'];
                        if (nonContainers.includes(activeTagInfo.tagName.toLowerCase())) {
                            if (insertPos > activeTagInfo.start && insertPos < activeTagInfo.fullEnd) insertPos = activeTagInfo.fullEnd;
                        } else {
                            if (insertPos > activeTagInfo.start && insertPos < activeTagInfo.tagEnd) {
                                insertPos = activeTagInfo.tagEnd;
                            } else if (activeTagInfo.closeStart !== undefined && activeTagInfo.closeStart !== -1 && insertPos > activeTagInfo.closeStart && insertPos < activeTagInfo.fullEnd) {
                                insertPos = activeTagInfo.fullEnd;
                            }
                        }
                    }
                    
                    const lineStart = code.lastIndexOf('\n', insertPos - 1);
                    if (lineStart !== -1) {
                        const spaces = code.substring(lineStart + 1).match(/^\s*/);
                        if (spaces) indent = "\n" + spaces[0];
                    }
                }

                const newCode = code.substring(0, insertPos) + indent + template + code.substring(insertPos);
                const savedScrollTop = textarea.scrollTop;
                const savedScrollLeft = textarea.scrollLeft;
                
                updateCode(newCode, true);
                
                const newPos = insertPos + indent.length + template.length;
                textarea.focus();
                textarea.setSelectionRange(newPos, newPos);
                textarea.scrollTop = savedScrollTop;
                textarea.scrollLeft = savedScrollLeft;
                
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }

            function deleteActiveShape() {
                if (!activeTagInfo) return;
                const code = textarea.value;
                let start = activeTagInfo.start;
                let end = activeTagInfo.fullEnd;

                while (start > 0 && (code[start-1] === ' ' || code[start-1] === '\t')) start--;
                if (start > 0 && code[start-1] === '\n') start--;

                const newCode = code.substring(0, start) + code.substring(end);
                const savedScrollTop = textarea.scrollTop;
                const savedScrollLeft = textarea.scrollLeft;
                
                updateCode(newCode, true);
                textarea.focus();
                textarea.setSelectionRange(start, start);
                textarea.scrollTop = savedScrollTop;
                textarea.scrollLeft = savedScrollLeft;
                
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }

            // --- Output & Utility ---
            function downloadSVG() {
                const code = textarea.value;
                let finalSVG = code;

                if (/<svg/i.test(code)) {
                    finalSVG = code;
                } else if (/<symbol/i.test(code)) {
                    let viewBoxMatch = code.replace(/<!--[\s\S]*?-->/g, '').match(/viewBox=["']([^"']+)["']/i);
                    let viewBox = viewBoxMatch ? viewBoxMatch[1] : "0 0 100 100";
                    let idMatch = code.match(/<symbol[^>]*id=["']([^"']+)["']/i);
                    let symbolId = idMatch ? idMatch[1] : "component";
                    let indentedCode = code.split('\n').map(line => '    ' + line).join('\n');

                    finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}">\n` +
                               `  <defs>\n${indentedCode}\n  </defs>\n` +
                               `  <use href="#${symbolId}" />\n` +
                               `</svg>`;
                } else {
                    let viewBoxMatch = code.replace(/<!--[\s\S]*?-->/g, '').match(/viewBox=["']([^"']+)["']/i);
                    let viewBox = viewBoxMatch ? viewBoxMatch[1] : "0 0 100 100";
                    let indentedCode = code.split('\n').map(line => '  ' + line).join('\n');
                    finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}">\n${indentedCode}\n</svg>`;
                }

                const blob = new Blob([finalSVG], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                let idMatch = code.match(/<symbol[^>]*id=["']([^"']+)["']/i);
                a.download = (idMatch ? idMatch[1] : 'component') + '.svg';
                
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }

            function copyToClipboard() {
                textarea.select();
                document.execCommand('copy');
                textarea.setSelectionRange(textarea.selectionStart, textarea.selectionStart);
                
                const btn = document.getElementById('tool-copy');
                const orig = btn.innerHTML;
                btn.innerHTML = '✅';
                setTimeout(() => btn.innerHTML = orig, 1500);
                textarea.focus();
            }

            function loadFromFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    updateCode(e.target.result, true);
                    textarea.scrollTop = 0;
                    textarea.scrollLeft = 0;
                };
                reader.readAsText(file);
                event.target.value = ''; 
            }

            // --- Micro Unit Test System Bridge ---
            // Only activates if ?test= is present in the URL
            if (window.location.search.includes('test=')) {
                window.TEST_API = {
                    textarea,
                    userSvgContainer,
                    errorBadge,
                    updateCode,
                    undo,
                    redo,
                    insertShape,
                    moveShape,
                    transformShape,
                    deleteActiveShape,
                    SVGUtils,
                    getActiveTag,
                    backdrop
                };
                
                const script = document.createElement('script');
                script.src = 'svg_component_editor_v6_19_0_tests.js';
                script.onerror = () => console.error("Test suite not found: svg_component_editor_v6_19_0_tests.js");
                document.body.appendChild(script);
            }
        })();
    </script>
