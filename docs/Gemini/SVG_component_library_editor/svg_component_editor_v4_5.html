<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg stroke='%233b82f6' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='50' cy='50' r='40' /%3E%3Cline x1='10' y1='50' x2='35' y2='50' /%3E%3Cline x1='35' y1='30' x2='35' y2='70' stroke-width='7' /%3E%3Cpath d='M 35 40 L 60 20 L 60 10' /%3E%3Cpath d='M 35 60 L 60 80 L 60 90' /%3E%3Cpolygon points='58,78 46,76 54,67' fill='%233b82f6' /%3E%3C/g%3E%3C/svg%3E">
    <title>SVG Component Editor</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --primary: #3b82f6;       /* True Blue */
            --primary-hover: #60a5fa; /* Lighter Blue for hover */
            --danger: #ff5555;
            --success: #50fa7b;
            --border: #44475a;
            --toolbar-bg: #21222c;
            --preview-bg: #f8f9fa;
            --grid-line: #dee2e6;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            background-color: var(--bg-color);
        }

        #svg-editor-app {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 100%;
            height: 100%;
            overflow: hidden;
            
            /* CSS Container Query for embed-safe responsiveness */
            container-type: inline-size;
            
            /* CSS Grid Layout for easy reordering */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header"
                "preview editor"
                "footer footer";
        }

        /* --- Header & Toolbar --- */
        header {
            grid-area: header;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 5px;
        }

        .badge {
            background-color: var(--danger);
            color: white;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            display: none; /* toggled to inline-block on error */
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--panel-bg);
            padding: 5px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .toolbar-right {
            margin-left: auto;
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--border);
        }

        button.primary {
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button.danger {
            color: var(--danger);
        }
        button.danger:hover {
            background: rgba(255, 85, 85, 0.1);
        }

        .toolbar-select {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 32px;
            text-align: center;
            text-align-last: center;
        }

        .toolbar-select:hover {
            background: var(--border);
        }

        .toolbar-select option {
            background: var(--panel-bg);
            color: var(--text-color);
            text-align: left;
        }

        label.toggle {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        /* --- Main Layout Panels --- */
        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        .preview-panel {
            grid-area: preview;
            border-right: 1px solid var(--border);
        }

        .editor-panel {
            grid-area: editor;
        }

        /* --- Footer --- */
        footer {
            grid-area: footer;
            background-color: var(--toolbar-bg);
            border-top: 1px solid var(--border);
            padding: 4px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #6272a4;
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .footer-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex: 1;
            white-space: nowrap;
        }

        .footer-right {
            flex: 1;
            text-align: right;
            white-space: nowrap;
        }

        /* --- Preview Area --- */
        #preview-container {
            flex: 1;
            background-color: var(--preview-bg);
            color: black;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #main-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* --- Editor Area --- */
        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--panel-bg);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .editor-wrapper.drag-over {
            box-shadow: inset 0 0 0 2px var(--primary);
        }

        textarea, .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            white-space: pre;       /* Prevents word-wrap synchronization bugs */
            overflow-wrap: normal;  
            box-sizing: border-box;
            tab-size: 2;
        }

        textarea {
            color: transparent;
            background: transparent;
            caret-color: var(--primary);
            z-index: 2;
            overflow: auto; /* Ensures scrollbar appears when needed */
        }

        .backdrop {
            z-index: 1;
            color: var(--text-color);
            overflow: auto; /* Matches textarea to perfectly sync clientHeight/clientWidth */
            pointer-events: none;
        }

        mark {
            background-color: rgba(59, 130, 246, 0.3);
            color: inherit;
            border-radius: 2px;
            outline: 1px solid rgba(59, 130, 246, 0.6);
        }

        /* Specialized highlight for individual coordinates/points */
        mark.point-mark {
            background-color: rgba(255, 85, 85, 0.4);
            border-radius: 2px;
            outline: 1px solid rgba(255, 85, 85, 0.8);
        }

        /* Embed-Safe Mobile Layout Modifications via Container Queries */
        @container (max-width: 800px) {
            #svg-editor-app {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr auto;
                grid-template-areas:
                    "preview"
                    "header"
                    "editor"
                    "footer";
            }
            .preview-panel {
                border-right: none;
            }
            header {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <div id="svg-editor-app">
        <header>
            <div class="toolbar-group">
                <select class="toolbar-select" onchange="if(this.value){ insertShape(this.value); this.value=''; }" title="Add Element">
                    <option value="" disabled selected>➕</option>
                    <option value="circle">⭕ Circle</option>
                    <option value="line">📏 Line</option>
                    <option value="path">〰️ Path</option>
                    <option value="polygon">⬠ Polygon</option>
                    <option value="polyline">📈 Polyline</option>
                    <option value="rect">🟦 Rectangle</option>
                    <option value="text">🔤 Text</option>
                </select>
            </div>

            <div class="toolbar-group">
                <button onclick="moveShape(0, -1)" title="Move Up (↑)">▲</button>
                <button onclick="moveShape(0, 1)" title="Move Down (↓)">▼</button>
                <button onclick="moveShape(-1, 0)" title="Move Left (←)">◀</button>
                <button onclick="moveShape(1, 0)" title="Move Right (→)">▶</button>
            </div>

            <div class="toolbar-group">
                <select class="toolbar-select" onchange="if(this.value){ rotateShape(Number(this.value)); this.value=''; }" title="Rotate">
                    <option value="" disabled selected>↻</option>
                    <option value="90">↻ 90°</option>
                    <option value="-90">↺ -90°</option>
                    <option value="180">↻ 180°</option>
                </select>
                <div class="toolbar-divider"></div>
                <button class="danger" onclick="deleteActiveShape()" title="Delete">🗑️</button>
            </div>

            <div class="toolbar-group toolbar-right">
                <button onclick="undo()" title="Undo (Ctrl+Z)">↶</button>
                <button onclick="redo()" title="Redo (Ctrl+Y)">↷</button>
                <button class="primary" onclick="document.getElementById('file-input').click()" title="Load File">📂</button>
                <button class="primary" id="copy-btn" onclick="copyToClipboard()" title="Copy Code">📋</button>
                <button class="primary" onclick="downloadSVG()" title="Save SVG">💾</button>
                <input type="file" id="file-input" accept=".svg,.txt,.html,.xml" style="display: none;" onchange="loadFromFile(event)">
            </div>
        </header>

        <div class="panel preview-panel">
            <div id="preview-container">
                <svg id="main-svg" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <pattern id="gridPattern" patternUnits="userSpaceOnUse" width="10" height="10">
                            <rect width="100%" height="100%" fill="none" />
                            <path id="gridPatternLine" d="M 10 0 L 0 0 0 10" fill="none" stroke="var(--grid-line)" stroke-width="0.5" />
                        </pattern>
                    </defs>
                    <g id="grid-group">
                        <rect id="grid-rect" fill="url(#gridPattern)" />
                        <g id="grid-labels"></g>
                    </g>
                    <svg id="user-svg-container"></svg>
                    <!-- Overlay group for pinpoint highlight rendering inside native main SVG space -->
                    <g id="overlay-group" style="pointer-events: none;"></g>
                </svg>
            </div>
        </div>
        
        <div class="panel editor-panel">
            <div class="editor-wrapper" id="editor-wrapper">
                <div class="backdrop" id="backdrop"></div>
                <textarea id="code" spellcheck="false"></textarea>
            </div>
        </div>

        <footer>
            <div class="footer-left">
                <span id="error-badge" class="badge">Syntax Error</span>
                <label class="toggle" style="font-size: inherit;">
                    <input type="checkbox" id="toggle-grid" checked> Grid
                </label>
            </div>
            <div class="footer-center">
                <label for="move-step">Step:</label>
                <input type="number" id="move-step" class="toolbar-select" min="1" max="500" value="1" style="font-size: 0.75rem; padding: 2px 4px; width: 50px; height: auto;">
            </div>
            <div class="footer-right">v4.5</div>
        </footer>
    </div>

    <script>
        const defaultCode = `<!-- NPN Transistor -->
<symbol id="npn" viewBox="0 0 100 100">
  <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="50" r="42" stroke-width="2" />
    <line x1="0" y1="50" x2="35" y2="50" />
    <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
    <path d="M35,40 L60,20 L60,0" />
    <path d="M35,60 L60,80 L60,100" />
    <polygon points="58,78 46,76 54,67" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  </g>
</symbol>`;

        // DOM Elements
        const textarea = document.getElementById('code');
        const backdrop = document.getElementById('backdrop');
        const userSvgContainer = document.getElementById('user-svg-container');
        const overlayGroup = document.getElementById('overlay-group');
        const mainSvg = document.getElementById('main-svg');
        const gridGroup = document.getElementById('grid-group');
        const gridRect = document.getElementById('grid-rect');
        const gridPattern = document.getElementById('gridPattern');
        const gridPatternLine = document.getElementById('gridPatternLine');
        const gridLabels = document.getElementById('grid-labels');
        const errorBadge = document.getElementById('error-badge');
        const toggleGrid = document.getElementById('toggle-grid');
        const editorWrapper = document.getElementById('editor-wrapper');

        // State & Singletons
        let history = [];
        let historyIndex = -1;
        let lastValidRender = "";
        let activeTagInfo = null;
        let debounceTimeout;
        let selectionRafId = null;
        let scrollRafId = null;
        
        // Track previously highlighted node to restore its state
        let previouslyHighlightedNode = { node: null, originalStroke: null, originalColor: null };
        
        // Reusable Parser Singleton (optimization)
        const domParser = new DOMParser();

        // --- Core Application Utilities ---
        const SVGUtils = {
            getAttrMatch: (tagStr, attr) => {
                const m = tagStr.match(new RegExp(`\\b${attr}=["'][^"']*["']`, 'i'));
                return m ? { start: m.index, end: m.index + m[0].length, val: m[0] } : null;
            },
            
            adjustAttr: (str, attr, delta) => {
                const regex = new RegExp(`\\b${attr}=["']([^"']+)["']`, 'i');
                return str.replace(regex, (match, val) => {
                    let num = parseFloat(val);
                    return isNaN(num) ? match : `${attr}="${num + delta}"`;
                });
            },
            
            setOrReplaceAttr: (str, attr, val) => {
                const regex = new RegExp(`\\b${attr}=["'][^"']*["']`, 'i');
                if (regex.test(str)) {
                    return str.replace(regex, `${attr}="${val}"`);
                } else {
                    return str.replace(/(<[a-zA-Z0-9:-]+)/, `$1 ${attr}="${val}"`);
                }
            },
            
            checkAndAdjustNearAttr: (tagStr, relPos, attrList, xDelta, yDelta, postFixFn = null) => {
                for (let attr of attrList) {
                    const match = SVGUtils.getAttrMatch(tagStr, attr);
                    if (match && relPos >= match.start && relPos <= match.end) {
                        let newStr = tagStr;
                        if (xDelta !== 0) newStr = SVGUtils.adjustAttr(newStr, attrList[0], xDelta);
                        if (yDelta !== 0 && attrList.length > 1) newStr = SVGUtils.adjustAttr(newStr, attrList[1], yDelta);
                        if (postFixFn) newStr = postFixFn(newStr);
                        return { modified: true, tagStr: newStr };
                    }
                }
                return { modified: false, tagStr: tagStr };
            },

            adjustPoints: (str, deltaX, deltaY) => {
                const regex = /\bpoints=["']([^"']+)["']/i;
                return str.replace(regex, (match, val) => {
                    const newVals = (val.match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                    let out = [];
                    for (let i = 0; i < newVals.length; i += 2) {
                        if (!isNaN(newVals[i]) && !isNaN(newVals[i+1])) {
                            out.push(`${newVals[i] + deltaX},${newVals[i+1] + deltaY}`);
                        }
                    }
                    return `points="${out.join(' ')}"`;
                });
            },

            formatPointsData: (pointsStr) => {
                const newVals = (pointsStr.match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                let out = [];
                for (let i = 0; i < newVals.length; i += 2) {
                    if (!isNaN(newVals[i]) && !isNaN(newVals[i+1])) {
                        out.push(`${newVals[i]},${newVals[i+1]}`);
                    }
                }
                return out.join(' ');
            },

            formatPathData: (dStr) => {
                const commands = dStr.match(/[a-df-zA-DF-Z][^a-df-zA-DF-Z]*/g);
                if (!commands) return dStr;
                return commands.map(cmdChunk => {
                    const letter = cmdChunk.trim()[0];
                    const nums = (cmdChunk.substring(1).match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                    const upper = letter.toUpperCase();
                    if (upper === 'Z') return letter;
                    let outNums = [];
                    if (upper === 'H' || upper === 'V') {
                        for(let n of nums) outNums.push(n);
                    } else if (upper === 'A') {
                        for (let i = 0; i < nums.length; i += 7) {
                            let part = `${nums[i]},${nums[i+1]} ${nums[i+2]} ${nums[i+3]} ${nums[i+4]}`;
                            if (i+5 < nums.length) part += ` ${nums[i+5]},${nums[i+6]}`;
                            outNums.push(part);
                        }
                    } else {
                        for (let i = 0; i < nums.length; i += 2) {
                            if (i+1 < nums.length) outNums.push(`${nums[i]},${nums[i+1]}`);
                            else outNums.push(nums[i]);
                        }
                    }
                    return letter + outNums.join(' ');
                }).join(' ');
            },

            shiftPathD: (dStr, deltaX, deltaY) => {
                const commands = dStr.match(/[a-df-zA-DF-Z][^a-df-zA-DF-Z]*/g);
                if (!commands) return dStr;
                let firstCmd = true;
                const res = commands.map(cmdChunk => {
                    const letter = cmdChunk.trim()[0];
                    const nums = (cmdChunk.substring(1).match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                    const upper = letter.toUpperCase();
                    const isRel = letter === letter.toLowerCase();

                    if (upper === 'Z') return letter;

                    let applyX = deltaX;
                    let applyY = deltaY;
                    if (isRel && !(firstCmd && letter === 'm')) {
                        applyX = 0;
                        applyY = 0;
                    }
                    firstCmd = false;

                    let outNums = [];
                    if (upper === 'H') {
                        for(let n of nums) outNums.push(n + applyX);
                    } else if (upper === 'V') {
                        for(let n of nums) outNums.push(n + applyY);
                    } else if (upper === 'A') {
                        for (let i = 0; i < nums.length; i += 7) {
                            let part = `${nums[i]},${nums[i+1]} ${nums[i+2]} ${nums[i+3]} ${nums[i+4]}`;
                            if (i+5 < nums.length) part += ` ${nums[i+5] + applyX},${nums[i+6] + applyY}`;
                            outNums.push(part);
                        }
                    } else {
                        for (let i = 0; i < nums.length; i += 2) {
                            if (i+1 < nums.length) outNums.push(`${nums[i] + applyX},${nums[i+1] + applyY}`);
                            else outNums.push(nums[i] + applyX);
                        }
                    }
                    return letter + outNums.join(' ');
                });
                return res.join(' ');
            },

            shiftSinglePathCommand: (cmdChunk, deltaX, deltaY) => {
                const letter = cmdChunk.trim()[0];
                const nums = (cmdChunk.substring(1).match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                const upper = letter.toUpperCase();

                if (upper === 'Z') return letter;

                let outNums = [];
                if (upper === 'H') {
                    for(let n of nums) outNums.push(n + deltaX);
                } else if (upper === 'V') {
                    for(let n of nums) outNums.push(n + deltaY);
                } else if (upper === 'A') {
                    for (let i = 0; i < nums.length; i += 7) {
                        let part = `${nums[i]},${nums[i+1]} ${nums[i+2]} ${nums[i+3]} ${nums[i+4]}`;
                        if (i+5 < nums.length) part += ` ${nums[i+5] + deltaX},${nums[i+6] + deltaY}`;
                        outNums.push(part);
                    }
                } else {
                    for (let i = 0; i < nums.length; i += 2) {
                        if (i+1 < nums.length) outNums.push(`${nums[i] + deltaX},${nums[i+1] + deltaY}`);
                        else outNums.push(nums[i] + deltaX);
                    }
                }
                
                return letter + outNums.join(' ');
            }
        };

        // --- Refactored Strategy Pattern Handlers ---

        const UniversalAttributes = {
            getSubElement: (tagStr, relPos, activeNode) => {
                // Check Transform
                const transformMatch = SVGUtils.getAttrMatch(tagStr, 'transform');
                if (transformMatch && relPos >= transformMatch.start && relPos <= transformMatch.end) {
                    const matchVal = tagStr.match(/\btransform=["']([^"']+)["']/i);
                    if (matchVal) {
                        const vStart = matchVal.index + matchVal[0].indexOf(matchVal[1]);
                        const localRelPos = relPos - vStart;
                        const cmdRegex = /(translate|rotate|scale|skewX|skewY)\s*\(([^)]+)\)/ig;
                        let m;
                        while ((m = cmdRegex.exec(matchVal[1])) !== null) {
                            if (localRelPos >= m.index - 1 && localRelPos <= m.index + m[0].length + 1) {
                                let cxVal = 0, cyVal = 0;
                                if (activeNode) {
                                    try {
                                        const bbox = activeNode.getBBox();
                                        if (bbox.width || bbox.height) {
                                            cxVal = bbox.x + bbox.width / 2;
                                            cyVal = bbox.y + bbox.height / 2;
                                        } else {
                                            cxVal = parseFloat(activeNode.getAttribute('x') || 0);
                                            cyVal = parseFloat(activeNode.getAttribute('y') || 0);
                                        }
                                    } catch(e) {
                                        cxVal = parseFloat(activeNode.getAttribute('x') || 0);
                                        cyVal = parseFloat(activeNode.getAttribute('y') || 0);
                                    }
                                }
                                return {
                                    start: vStart + m.index,
                                    end: vStart + m.index + m[0].length,
                                    cx: cxVal,
                                    cy: cyVal
                                };
                            }
                        }
                    }
                }

                // Check Stroke Width
                const swMatch = SVGUtils.getAttrMatch(tagStr, 'stroke-width');
                if (swMatch && relPos >= swMatch.start && relPos <= swMatch.end) {
                    return { start: swMatch.start, end: swMatch.end };
                }

                // Check Font Size
                const fsMatch = SVGUtils.getAttrMatch(tagStr, 'font-size');
                if (fsMatch && relPos >= fsMatch.start && relPos <= fsMatch.end) {
                    let ret = { start: fsMatch.start, end: fsMatch.end };
                    if (activeNode && activeNode.hasAttribute('x') && activeNode.hasAttribute('y')) {
                        ret.cx = parseFloat(activeNode.getAttribute('x'));
                        ret.cy = parseFloat(activeNode.getAttribute('y'));
                    }
                    return ret;
                }

                // Check Text Anchor
                const taMatch = SVGUtils.getAttrMatch(tagStr, 'text-anchor');
                if (taMatch && relPos >= taMatch.start && relPos <= taMatch.end) {
                    let ret = { start: taMatch.start, end: taMatch.end };
                    if (activeNode && activeNode.hasAttribute('x') && activeNode.hasAttribute('y')) {
                        ret.cx = parseFloat(activeNode.getAttribute('x'));
                        ret.cy = parseFloat(activeNode.getAttribute('y'));
                    }
                    return ret;
                }

                                                segmentData = {
                                                    startX: currentStartX, startY: currentStartY,
                                                    c1x: isRel ? currentStartX + nums[baseIdx] : nums[baseIdx],
                                                    c1y: isRel ? currentStartY + nums[baseIdx+1] : nums[baseIdx+1],
                                                    c2x: isRel ? currentStartX + nums[baseIdx+2] : nums[baseIdx+2],
                                                    c2y: isRel ? currentStartY + nums[baseIdx+3] : nums[baseIdx+3],
                                                    endX: isRel ? currentStartX + nums[baseIdx+4] : nums[baseIdx+4],
                                                    endY: isRel ? currentStartY + nums[baseIdx+5] : nums[baseIdx+5],
                                                    activePoint: pointType === 0 ? 'c1' : (pointType === 1 ? 'c2' : 'end')
                                                };
                                            }

                                            if (localRelPos >= pStart - 1 && localRelPos <= pEnd + 1) {
                                                foundSub = {
                                                    start: valStart + pStart, end: valStart + pEnd, cx: absX, cy: absY,
                                                    cData: segmentData || { startX: currentStartX, startY: currentStartY, c1x: absX, c1y: absY, c2x: absX, c2y: absY, endX: absX, endY: absY, activePoint: pointType === 0 ? 'c1' : (pointType === 1 ? 'c2' : 'end') }
                                                };
                                                break;
                                            }

                                            if (pointType === 2) {
                                                currentStartX = absX;
                                                currentStartY = absY;
                                            }
                                            pairIndex++;
                                        }
                                        if (foundSub) return foundSub;
                                    }

                                    if (['M', 'L', 'T', 'S'].includes(upper)) {
                                        let currentStartX = qStartX;
                                        let currentStartY = qStartY;
                                        let foundSub = null;
                                        let pMatch;
                                        const pairRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)(?:[,\s]+|(?=-))(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;

                                        while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                            const pStart = cMatch.index + pMatch.index;
                                            const pEnd = cMatch.index + pMatch.index + pMatch[0].length;

                                            let absX = isRel ? currentStartX + parseFloat(pMatch[1]) : parseFloat(pMatch[1]);
                                            let absY = isRel ? currentStartY + parseFloat(pMatch[2]) : parseFloat(pMatch[2]);

                                            if (localRelPos >= pStart - 1 && localRelPos <= pEnd + 1) {
                                                foundSub = { start: valStart + pStart, end: valStart + pEnd, cx: absX, cy: absY };
                                                break;
                                            }
                                            currentStartX = absX;
                                            currentStartY = absY;
                                        }
                                        if (foundSub) return foundSub;
                                    }

                                    if (upper === 'H' || upper === 'V') {
                                        let currentStartX = qStartX;
                                        let currentStartY = qStartY;
                                        let foundSub = null;
                                        let nMatch;
                                        const numRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;

                                        while ((nMatch = numRegex.exec(chunk)) !== null) {
                                            const pStart = cMatch.index + nMatch.index;
                                            const pEnd = cMatch.index + nMatch.index + nMatch[0].length;

                                            let val = parseFloat(nMatch[1]);
                                            let absX = upper === 'H' ? (isRel ? currentStartX + val : val) : currentStartX;
                                            let absY = upper === 'V' ? (isRel ? currentStartY + val : val) : currentStartY;

                                            if (localRelPos >= pStart - 1 && localRelPos <= pEnd + 1) {
                                                foundSub = { start: valStart + pStart, end: valStart + pEnd, cx: absX, cy: absY };
                                                break;
                                            }
                                            if (upper === 'H') currentStartX = absX;
                                            if (upper === 'V') currentStartY = absY;
                                        }
                                        if (foundSub) return foundSub;
                                    }

                                    let ret = {
                                        start: valStart + cMatch.index, end: valStart + cMatch.index + chunk.length,
                                        cx: endX, cy: endY
                                    };
                                    
                                    if (upper === 'Q') {
                                        ret.qData = { startX: qStartX, startY: qStartY, c1x: isRel ? qStartX + nums[0] : nums[0], c1y: isRel ? qStartY + nums[1] : nums[1], endX: isRel ? qStartX + nums[2] : nums[2], endY: isRel ? qStartY + nums[3] : nums[3], activePoint: 'both' };
                                    } else if (upper === 'C' && nums.length >= 6) {
                                        ret.cData = { startX: qStartX, startY: qStartY, c1x: isRel ? qStartX + nums[0] : nums[0], c1y: isRel ? qStartY + nums[1] : nums[1], c2x: isRel ? qStartX + nums[2] : nums[2], c2y: isRel ? qStartY + nums[3] : nums[3], endX: isRel ? qStartX + nums[4] : nums[4], endY: isRel ? qStartY + nums[5] : nums[5], activePoint: 'both' };
                                    }
                                    return ret;
                                }
                                currX = endX;
                                currY = endY;
                            }
                        }
                    }
                    return null;
                },
                movePoint: (tagStr, relPos, dx, dy) => {
                    const dMatch = tagStr.match(/\bd=["']([^"']+)["']/i);
                    if (dMatch) {
                        const valStart = dMatch.index + dMatch[0].indexOf(dMatch[1]);
                        const valEnd = valStart + dMatch[1].length;
                        
                        if (relPos >= valStart && relPos <= valEnd) {
                            const localRelPos = relPos - valStart;
                            const cmdRegex = /([a-df-zA-DF-Z][^a-df-zA-DF-Z]*)/g;
                            let cMatch;
                            let newVal = dMatch[1];
                            
                            while ((cMatch = cmdRegex.exec(dMatch[1])) !== null) {
                                if (localRelPos >= cMatch.index - 1 && localRelPos <= cMatch.index + cMatch[0].length + 1) {
                                    const chunk = cMatch[0];
                                    const letter = chunk.trim()[0];
                                    const upper = letter.toUpperCase();

                                    if (['Q', 'C', 'M', 'L', 'T', 'S'].includes(upper)) {
                                        const pairRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)(?:[,\s]+|(?=-))(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;
                                        let pMatch;
                                        let modifiedChunk = chunk;
                                        let pairMoved = false;

                                        while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                            if (localRelPos >= cMatch.index + pMatch.index - 1 && localRelPos <= cMatch.index + pMatch.index + pMatch[0].length + 1) {
                                                const nx = parseFloat(pMatch[1]) + dx;
                                                const ny = parseFloat(pMatch[2]) + dy;
                                                modifiedChunk = modifiedChunk.substring(0, pMatch.index) + `${nx},${ny}` + modifiedChunk.substring(pMatch.index + pMatch[0].length);
                                                pairMoved = true;
                                                break;
                                            }
                                        }
                                        if (pairMoved) {
                                            newVal = newVal.substring(0, cMatch.index) + modifiedChunk + newVal.substring(cMatch.index + cMatch[0].length);
                                            newVal = SVGUtils.formatPathData(newVal);
                                            return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                        }
                                    } else if (upper === 'H' || upper === 'V') {
                                        const numRegex = /(-?\d+(?:\.\d+)?(?:e[-+]?\d+)?)/ig;
                                        let nMatch;
                                        let modifiedChunk = chunk;
                                        let numMoved = false;

                                        while ((nMatch = numRegex.exec(chunk)) !== null) {
                                            if (localRelPos >= cMatch.index + nMatch.index - 1 && localRelPos <= cMatch.index + nMatch.index + nMatch[0].length + 1) {
                                                const delta = upper === 'H' ? dx : dy;
                                                const nn = parseFloat(nMatch[1]) + delta;
                                                modifiedChunk = modifiedChunk.substring(0, nMatch.index) + nn + modifiedChunk.substring(nMatch.index + nMatch[0].length);
                                                numMoved = true;
                                                break;
                                            }
                                        }
                                        if (numMoved) {
                                            newVal = newVal.substring(0, cMatch.index) + modifiedChunk + newVal.substring(cMatch.index + cMatch[0].length);
                                            newVal = SVGUtils.formatPathData(newVal);
                                            return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                        }
                                    }

                                    const shiftedCmd = SVGUtils.shiftSinglePathCommand(cMatch[0], dx, dy);
                                    newVal = newVal.substring(0, cMatch.index) + shiftedCmd + newVal.substring(cMatch.index + cMatch[0].length);
                                    newVal = SVGUtils.formatPathData(newVal);
                                    return { modified: true, tagStr: tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd) };
                                }
                            }
                        }
                    }
                    return { modified: false };
                },
                moveElement: (tagStr, dx, dy) => {
                    return tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => `d="${SVGUtils.shiftPathD(val, dx, dy)}"`);
                },
                rotateElement: (tagStr, angle, rotPoint) => {
                    const f = n => parseFloat(n.toFixed(3));
                    return tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => {
                        const commands = val.match(/[a-df-zA-Z][^a-df-zA-Z]*/g);
                        if (!commands) return match;

                        let currX = 0, currY = 0;
                        let startX = 0, startY = 0;

                        const processCommand = (cmdChunk) => {
                            const letter = cmdChunk.trim()[0];
                            const nums = (cmdChunk.substring(1).match(/-?\d+(?:\.\d+)?(?:e[-+]?\d+)?/gi) || []).map(Number);
                            const upper = letter.toUpperCase();
                            const isRel = letter === letter.toLowerCase();

                            if (upper === 'Z') {
                                currX = startX;
                                currY = startY;
                                return 'Z';
                            }

                            let out = [];

                            if (upper === 'H') {
                                for (let n of nums) {
                                    currX = isRel ? currX + n : n;
                                    let [rx, ry] = rotPoint(currX, currY);
                                    out.push(`L${f(rx)},${f(ry)}`);
                                }
                            } else if (upper === 'V') {
                                for (let n of nums) {
                                    currY = isRel ? currY + n : n;
                                    let [rx, ry] = rotPoint(currX, currY);
                                    out.push(`L${f(rx)},${f(ry)}`);
                                }
                            } else if (upper === 'M' || upper === 'L' || upper === 'T') {
                                for (let i = 0; i < nums.length; i += 2) {
                                    currX = isRel ? currX + nums[i] : nums[i];
                                    currY = isRel ? currY + nums[i+1] : nums[i+1];
                                    if (upper === 'M' && i === 0) {
                                        startX = currX;
                                        startY = currY;
                                    }
                                    let [rx, ry] = rotPoint(currX, currY);
                                    out.push(`${(upper === 'M' && i === 0) ? 'M' : (upper === 'M' ? 'L' : upper)}${f(rx)},${f(ry)}`);
                                }
                            } else if (upper === 'Q' || upper === 'S') {
                                for (let i = 0; i < nums.length; i += 4) {
                                    let c1x = isRel ? currX + nums[i] : nums[i];
                                    let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                    let endX = isRel ? currX + nums[i+2] : nums[i+2];
                                    let endY = isRel ? currY + nums[i+3] : nums[i+3];
                                    
                                    let [rc1x, rc1y] = rotPoint(c1x, c1y);
                                    let [rendX, rendY] = rotPoint(endX, endY);
                                    
                                    out.push(`${upper}${f(rc1x)},${f(rc1y)} ${f(rendX)},${f(rendY)}`);
                                    currX = endX;
                                    currY = endY;
                                }
                            } else if (upper === 'C') {
                                for (let i = 0; i < nums.length; i += 6) {
                                    let c1x = isRel ? currX + nums[i] : nums[i];
                                    let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                    let c2x = isRel ? currX + nums[i+2] : nums[i+2];
                                    let c2y = isRel ? currY + nums[i+3] : nums[i+3];
                                    let endX = isRel ? currX + nums[i+4] : nums[i+4];
                                    let endY = isRel ? currY + nums[i+5] : nums[i+5];
                                    
                                    let [rc1x, rc1y] = rotPoint(c1x, c1y);
                                    let [rc2x, rc2y] = rotPoint(c2x, c2y);
                                    let [rendX, rendY] = rotPoint(endX, endY);
                                    
                                    out.push(`C${f(rc1x)},${f(rc1y)} ${f(rc2x)},${f(rc2y)} ${f(rendX)},${f(rendY)}`);
                                    currX = endX;
                                    currY = endY;
                                }
                            } else if (upper === 'A') {
                                for (let i = 0; i < nums.length; i += 7) {
                                    let rx_val = nums[i];
                                    let ry_val = nums[i+1];
                                    let xRot = nums[i+2];
                                    let largeArc = nums[i+3];
                                    let sweep = nums[i+4];
                                    let endX = isRel ? currX + nums[i+5] : nums[i+5];
                                    let endY = isRel ? currY + nums[i+6] : nums[i+6];
                                    
                                    if (angle === 90 || angle === -90) {
                                        let tmp = rx_val;
                                        rx_val = ry_val;
                                        ry_val = tmp;
                                        xRot = (xRot + 90) % 360;
                                    }

                                    let [rendX, rendY] = rotPoint(endX, endY);
                                    
                                    out.push(`A${f(rx_val)},${f(ry_val)} ${f(xRot)} ${largeArc} ${sweep} ${f(rendX)},${f(rendY)}`);
                                    currX = endX;
                                    currY = endY;
                                }
                            }
                            return out.join(' ');
                        };

                        let newD = commands.map(processCommand).join(' ').replace(/\s+/g, ' ').trim();
                        return `d="${newD}"`;
                    });
                }
            },
            default: { moveElement: (tagStr, dx, dy) => tagStr }
        };
        
        // Link identical strategies
        ShapeRegistry.polyline = ShapeRegistry.polygon;
        ShapeRegistry.ellipse = ShapeRegistry.circle;
        ShapeRegistry.use = ShapeRegistry.text;
        ShapeRegistry.image = ShapeRegistry.text;

        // Initialization
        window.onload = () => {
            textarea.value = defaultCode;
            saveHistory(defaultCode);
            processInput(true);
        };

        // --- Event Listeners ---
        textarea.addEventListener('input', (e) => {
            processInput(false);
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => saveHistory(e.target.value), 600);
        });

        const selectionEvents = ['keyup', 'click', 'focus', 'touchend'];
        selectionEvents.forEach(evt => textarea.addEventListener(evt, () => {
            // Debounce selection updates to animation frame to prevent layout thrashing
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }));

        textarea.addEventListener('scroll', () => {
            if (scrollRafId) cancelAnimationFrame(scrollRafId);
            scrollRafId = requestAnimationFrame(() => {
                backdrop.scrollTop = textarea.scrollTop;
                backdrop.scrollLeft = textarea.scrollLeft;
            });
        });

        toggleGrid.addEventListener('change', () => {
            gridGroup.style.display = toggleGrid.checked ? 'block' : 'none';
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') { e.preventDefault(); undo(); }
                if (e.key === 'y' || (e.shiftKey && e.key === 'Z')) { e.preventDefault(); redo(); }
            }
            // Add fast arrow movement throttling natively
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }
        });

        // --- Core Processing ---
        function processInput(forceUpdate = false) {
            const code = textarea.value;
            
            // Check for parsing errors by converting symbol to svg
            const previewCode = code.replace(/<symbol/gi, '<svg').replace(/<\/symbol>/gi, '</svg>');
            const doc = domParser.parseFromString(`<svg xmlns="http://www.w3.org/2000/svg">${previewCode}</svg>`, "image/svg+xml");
            const isError = doc.querySelector("parsererror");

            if (isError) {
                errorBadge.style.display = 'inline-block';
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
                return;
            }
            
            errorBadge.style.display = 'none';
            lastValidRender = previewCode;
            userSvgContainer.innerHTML = previewCode;
            
            updateGrid(code);
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        // --- History System ---
        function saveHistory(code) {
            if (historyIndex >= 0 && history[historyIndex] === code) return;
            history = history.slice(0, historyIndex + 1);
            history.push(code);
            historyIndex++;
        }

        function applyState() {
            const savedScrollTop = textarea.scrollTop;
            const savedScrollLeft = textarea.scrollLeft;
            
            textarea.value = history[historyIndex];
            
            textarea.scrollTop = savedScrollTop;
            textarea.scrollLeft = savedScrollLeft;
            
            processInput(true);
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                applyState();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                applyState();
            }
        }

        function updateCode(newCode, save = true) {
            textarea.value = newCode;
            processInput(true);
            if (save) saveHistory(newCode);
        }

        // --- Grid & Viewport Management ---
        function updateGrid(code) {
            let viewBoxMatch = code.match(/viewBox=["']([^"']+)["']/i);
            let vb = viewBoxMatch ? viewBoxMatch[1].trim().split(/[\s,]+/).map(Number) : [0, 0, 100, 100];
            
            if (vb.length < 4 || vb.some(isNaN) || vb[2] <= 0 || vb[3] <= 0) {
                vb = [0, 0, 100, 100];
            }
            
            const vx = vb[0], vy = vb[1], vw = vb[2], vh = vb[3];
            const step = vw / 10;
            const pad = step * 2.5;

            mainSvg.setAttribute('viewBox', `${vx - pad} ${vy - pad} ${vw + 2*pad} ${vh + 2*pad}`);
            userSvgContainer.setAttribute('x', vx);
            userSvgContainer.setAttribute('y', vy);
            userSvgContainer.setAttribute('width', vw);
            userSvgContainer.setAttribute('height', vh);

            gridPattern.setAttribute('width', step);
            gridPattern.setAttribute('height', step);
            gridPatternLine.setAttribute('d', `M ${step} 0 L 0 0 0 ${step}`);
            
            gridRect.setAttribute('x', vx);
            gridRect.setAttribute('y', vy);
            gridRect.setAttribute('width', vw);
            gridRect.setAttribute('height', vh);

            let labelsArr = [];
            const maxStepsX = Math.min(Math.floor(vw / step), 500);
            const maxStepsY = Math.min(Math.floor(vh / step), 500);

            for (let i = 0; i <= maxStepsX; i++) {
                if (i === 0 || i === maxStepsX || i % 2 === 0) {
                    let valX = vx + i * step;
                    let textX = parseFloat(valX.toFixed(2));
                    labelsArr.push(`<text x="${valX}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
                }
            }
            
            if (vw - maxStepsX * step > 0.001 && maxStepsX < 500) {
                let textX = parseFloat((vx + vw).toFixed(2));
                labelsArr.push(`<text x="${vx + vw}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
            }

            for (let i = 0; i <= maxStepsY; i++) {
                if (i === 0 || i === maxStepsY || i % 2 === 0) {
                    let valY = vy + i * step;
                    let textY = parseFloat(valY.toFixed(2));
                    labelsArr.push(`<text x="${vx - step*0.3}" y="${valY + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
                }
            }
            
            if (vh - maxStepsY * step > 0.001 && maxStepsY < 500) {
                let textY = parseFloat((vy + vh).toFixed(2));
                labelsArr.push(`<text x="${vx - step*0.3}" y="${vy + vh + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
            }

            gridLabels.innerHTML = labelsArr.join('');
        }

        function getActiveTag(html, cursor) {
            const regex = /(<!--[\s\S]*?-->|<\/?([a-z0-9:-]+)[^>]*>)/gi;
            let match;
            let stack = [];
            let domIndex = 0;
            let elements = [];

            while ((match = regex.exec(html)) !== null) {
                const text = match[0];
                const start = match.index;
                const end = start + text.length;

                if (text.startsWith('<!--')) continue;

                if (text.startsWith('</')) {
                    if (stack.length > 0) {
                        let top = stack.pop();
                        top.fullEnd = end;
                        top.closeStart = start;
                    }
                    continue;
                }

                const isSelfClosing = text.endsWith('/>');
                const tagNameMatch = text.match(/<([a-z0-9:-]+)/i);
                const tagName = tagNameMatch ? tagNameMatch[1] : '';

                let effectiveStart = start;
                while (effectiveStart > 0 && (html[effectiveStart - 1] === ' ' || html[effectiveStart - 1] === '\t')) {
                    effectiveStart--;
                }

                const el = { 
                    domIndex: domIndex++, 
                    start: start, 
                    effectiveStart: effectiveStart, 
                    tagEnd: end, 
                    fullEnd: end, 
                    closeStart: isSelfClosing ? end : -1, 
                    tagName: tagName 
                };
                elements.push(el);

                if (!isSelfClosing && tagName.toLowerCase() !== 'br' && tagName.toLowerCase() !== 'hr') {
                    stack.push(el);
                }
            }

            for (let s of stack) {
                s.fullEnd = html.length;
                s.closeStart = html.length;
            }

            let active = null;
            let minSize = Infinity;
            for (let el of elements) {
                if (cursor >= el.effectiveStart && cursor <= el.fullEnd) {
                    let size = el.fullEnd - el.start;
                    if (size < minSize) {
                        minSize = size;
                        active = el;
                    }
                }
            }
            return active;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // --- Tracking & Highlighting ---
        function updateSelection() {
            const code = textarea.value;
            const cursor = textarea.selectionStart;
            
            activeTagInfo = getActiveTag(code, cursor);
            if (overlayGroup) overlayGroup.innerHTML = '';
            
            let activeSub = null;
            let activeNode = null;
            
            if (previouslyHighlightedNode.node) {
                const { node, originalStroke, originalColor } = previouslyHighlightedNode;
                
                if (originalStroke === null) {
                    node.removeAttribute('stroke');
                } else {
                    node.setAttribute('stroke', originalStroke);
                }
                
                if (originalColor === null) {
                    node.removeAttribute('color');
                } else {
                    node.setAttribute('color', originalColor);
                }
                
                previouslyHighlightedNode.node = null;
                previouslyHighlightedNode.originalStroke = null;
                previouslyHighlightedNode.originalColor = null;
            }

            if (activeTagInfo && activeTagInfo.domIndex >= 0) {
                const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
                activeNode = liveElements[activeTagInfo.domIndex];
                
                if (activeNode) {
                    previouslyHighlightedNode.node = activeNode;
                    previouslyHighlightedNode.originalStroke = activeNode.getAttribute('stroke');
                    previouslyHighlightedNode.originalColor = activeNode.getAttribute('color');
                    
                    activeNode.setAttribute('stroke', '#3b82f6');
                    
                    // Most <use> tags inside components inherit "currentColor", 
                    // setting the color attribute solves cases where 'stroke' is hardcoded as 'currentColor' inside the referenced symbol.
                    activeNode.setAttribute('color', '#3b82f6'); 
                    
                    const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                    const relPos = cursor - activeTagInfo.start;
                    activeSub = getActiveSubElement(tagStr, relPos, activeTagInfo.tagName.toLowerCase(), activeNode);
                    
                    if (activeSub && (activeSub.cx !== undefined && activeSub.cy !== undefined || activeSub.qData || activeSub.cData)) {
                        const vw = parseFloat(userSvgContainer.getAttribute('width') || 100);
                        const r = vw * 0.02;
                        
                        const getMappedCoords = (x, y) => {
                            let tx = x, ty = y;
                            try {
                                const pt = mainSvg.createSVGPoint();
                                pt.x = x;
                                pt.y = y;
                                const ctm = activeNode.getScreenCTM();
                                const inv = mainSvg.getScreenCTM().inverse();
                                if (ctm && inv) {
                                    const screenPt = pt.matrixTransform(ctm);
                                    const overlayPt = screenPt.matrixTransform(inv);
                                    tx = overlayPt.x;
                                    ty = overlayPt.y;
                                }
                            } catch(e) {
                                console.error("CTM Transformation Error:", e);
                            }
                            return {tx, ty};
                        };

                        if (activeSub.cData) {
                            const pStart = getMappedCoords(activeSub.cData.startX, activeSub.cData.startY);
                            const pC1 = getMappedCoords(activeSub.cData.c1x, activeSub.cData.c1y);
                            const pC2 = getMappedCoords(activeSub.cData.c2x, activeSub.cData.c2y);
                            const pEnd = getMappedCoords(activeSub.cData.endX, activeSub.cData.endY);
                            
                            let c1Color = (activeSub.cData.activePoint === 'c1' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            let c2Color = (activeSub.cData.activePoint === 'c2' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            let endColor = (activeSub.cData.activePoint === 'end' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            
                            overlayGroup.innerHTML = `
                                <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <line x1="${pC2.tx}" y1="${pC2.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pC2.tx}" cy="${pC2.ty}" r="${r}" fill="${c2Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                            `;
                        } else if (activeSub.qData) {
                            const pStart = getMappedCoords(activeSub.qData.startX, activeSub.qData.startY);
                            const pC1 = getMappedCoords(activeSub.qData.c1x, activeSub.qData.c1y);
                            const pEnd = getMappedCoords(activeSub.qData.endX, activeSub.qData.endY);
                            
                            let c1Color = activeSub.qData.activePoint === 'end' ? 'var(--primary)' : 'var(--danger)';
                            let endColor = activeSub.qData.activePoint === 'control' ? 'var(--primary)' : 'var(--danger)';
                            
                            overlayGroup.innerHTML = `
                                <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <line x1="${pC1.tx}" y1="${pC1.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                            `;
                        } else {
                            const p = getMappedCoords(activeSub.cx, activeSub.cy);
                            overlayGroup.innerHTML = `<circle cx="${p.tx}" cy="${p.ty}" r="${r}" fill="var(--danger)" stroke="#fff" stroke-width="${r * 0.2}" />`;
                        }
                    }
                }
            }
            
            let finalHTML = '';
            if (activeTagInfo) {
                const before = escapeHTML(code.substring(0, activeTagInfo.start));
                let highlight = '';
                
                if (activeSub) {
                    const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                    const ranges = activeSub.ranges || [{start: activeSub.start, end: activeSub.end}];
                    ranges.sort((a, b) => a.start - b.start);
                    
                    let hlResult = '';
                    let lastIdx = 0;
                    for (let r of ranges) {
                        hlResult += escapeHTML(tagStr.substring(lastIdx, r.start));
                        hlResult += `<mark class="point-mark">${escapeHTML(tagStr.substring(r.start, r.end))}</mark>`;
                        lastIdx = r.end;
                    }
                    hlResult += escapeHTML(tagStr.substring(lastIdx));
                    highlight = hlResult;
                } else {
                    highlight = escapeHTML(code.substring(activeTagInfo.start, activeTagInfo.tagEnd));
                }
                
                const after = escapeHTML(code.substring(activeTagInfo.tagEnd));
                finalHTML = before + `<mark>${highlight}</mark>` + after;
            } else {
                finalHTML = escapeHTML(code);
            }
            
            if (code.endsWith('\n')) {
                finalHTML += ' ';
            }
            
            backdrop.innerHTML = finalHTML;
        }

        // Delegated to Strategy Registry
        function getActiveSubElement(tagStr, relPos, tagName, activeNode) {
            let sub = UniversalAttributes.getSubElement(tagStr, relPos, activeNode);
            if (sub) return sub;

            const handler = ShapeRegistry[tagName];
            if (handler && handler.getSubElement) {
                return handler.getSubElement(tagStr, relPos, activeNode);
            }
            return null;
        }

        // --- Tools (Move, Insert, Delete) ---
        // Refactored moveShape using the Strategy Pattern
        function moveShape(dirX, dirY) {
            if (!activeTagInfo) return;
            const code = textarea.value;
            let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
            const tagName = activeTagInfo.tagName.toLowerCase();
            const relPos = textarea.selectionStart - activeTagInfo.start;
            
            const step = parseFloat(document.getElementById('move-step').value) || 1;
            const dx = dirX * step;
            const dy = dirY * step;

            const handler = ShapeRegistry[tagName] || ShapeRegistry.default;
            let moveResult = null;

            // 1. Point Move Logic (Context-Aware based on cursor)
            if (handler.movePoint) {
                moveResult = handler.movePoint(tagStr, relPos, dx, dy);
            }

            // 2. Universal Attributes Logic
            if (!moveResult || !moveResult.modified) {
                moveResult = UniversalAttributes.movePoint(tagStr, relPos, dx, dy);
            }

            // 3. Element Move Logic (Fallback if cursor is not on a specific point)
            if (!moveResult || !moveResult.modified) {
                if (handler.moveElement) {
                    const newTagStr = handler.moveElement(tagStr, dx, dy);
                    if (newTagStr !== tagStr) {
                        moveResult = { modified: true, tagStr: newTagStr };
                    }
                }
            }

            if (!moveResult || !moveResult.modified) return;
            
            tagStr = moveResult.tagStr;
            const newCode = code.substring(0, activeTagInfo.start) + tagStr + code.substring(activeTagInfo.tagEnd);
            
            const offset = tagStr.length - (activeTagInfo.tagEnd - activeTagInfo.start);
            let newCursor = textarea.selectionStart;
            if (newCursor > activeTagInfo.start) {
                newCursor += offset;
            }

            const savedScrollTop = textarea.scrollTop;
            const savedScrollLeft = textarea.scrollLeft;

            updateCode(newCode, true);
            textarea.focus();
            textarea.setSelectionRange(newCursor, newCursor);
            
            textarea.scrollTop = savedScrollTop;
            textarea.scrollLeft = savedScrollLeft;
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        function rotateShape(angle) {
            if (!activeTagInfo) return;
            const code = textarea.value;
            const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
            const activeNode = liveElements[activeTagInfo.domIndex];
            
            if (!activeNode) return;

            let bbox;
            try {
                bbox = activeNode.getBBox();
                if (bbox.width === 0 && bbox.height === 0 && bbox.x === 0 && bbox.y === 0) return;
            } catch (e) {
                return;
            }

            const cx = bbox.x + bbox.width / 2;
            const cy = bbox.y + bbox.height / 2;

            let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
            const tagName = activeTagInfo.tagName.toLowerCase();

            const rotPoint = (px, py) => {
                if (angle === 90) return [cx - (py - cy), cy + (px - cx)];
                if (angle === -90) return [cx + (py - cy), cy - (px - cx)];
                if (angle === 180) return [cx - (px - cx), cy - (py - cy)];
                return [px, py];
            };

            const handler = ShapeRegistry[tagName] || ShapeRegistry.default;
            let modified = false;

            if (handler.rotateElement) {
                const newTagStr = handler.rotateElement(tagStr, angle, rotPoint, activeNode, cx, cy);
                if (newTagStr !== tagStr) {
                    tagStr = newTagStr;
                    modified = true;
                }
            }

            if (!modified) return;

            const newCode = code.substring(0, activeTagInfo.start) + tagStr + code.substring(activeTagInfo.tagEnd);
            
            const offset = tagStr.length - (activeTagInfo.tagEnd - activeTagInfo.start);
            let newCursor = textarea.selectionStart;
            if (newCursor > activeTagInfo.start) newCursor += offset;

            const savedScrollTop = textarea.scrollTop;
            const savedScrollLeft = textarea.scrollLeft;

            updateCode(newCode, true);
            
            textarea.focus();
            textarea.setSelectionRange(newCursor, newCursor);
            
            textarea.scrollTop = savedScrollTop;
            textarea.scrollLeft = savedScrollLeft;
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        function insertShape(type) {
            let shapeMap = {
                'circle': `<circle cx="50" cy="50" r="10" />`,
                'line': `<line x1="10" y1="10" x2="90" y2="90" />`,
                'path': `<path d="M20,20 L80,80" />`,
                'polygon': `<polygon points="20,80 50,20 80,80" />`,
                'polyline': `<polyline points="20,20 50,80 80,20" />`,
                'rect': `<rect x="10" y="10" width="80" height="80" />`,
                'text': `<text x="50" y="50" font-family="sans-serif" font-size="14" text-anchor="middle">Text</text>`
            };
            
            let template = shapeMap[type] || '';
            const code = textarea.value;
            let insertPos = textarea.selectionStart;
            
            if (activeTagInfo) {
                const nonContainers = ['circle', 'line', 'path', 'polygon', 'polyline', 'rect', 'text', 'tspan', 'ellipse', 'image', 'use'];
                if (nonContainers.includes(activeTagInfo.tagName.toLowerCase())) {
                    if (insertPos > activeTagInfo.start && insertPos < activeTagInfo.fullEnd) {
                        insertPos = activeTagInfo.fullEnd;
                    }
                } else {
                    if (insertPos > activeTagInfo.start && insertPos < activeTagInfo.tagEnd) {
                        insertPos = activeTagInfo.tagEnd;
                    } else if (activeTagInfo.closeStart !== undefined && activeTagInfo.closeStart !== -1 && insertPos > activeTagInfo.closeStart && insertPos < activeTagInfo.fullEnd) {
                        insertPos = activeTagInfo.fullEnd;
                    }
                }
            }
            
            const lineStart = code.lastIndexOf('\n', insertPos - 1);
            let indent = "\n  ";
            if (lineStart !== -1) {
                const spaces = code.substring(lineStart + 1).match(/^\s*/);
                if (spaces) indent = "\n" + spaces[0];
            }

            const newCode = code.substring(0, insertPos) + indent + template + code.substring(insertPos);
            
            const savedScrollTop = textarea.scrollTop;
            const savedScrollLeft = textarea.scrollLeft;
            
            updateCode(newCode, true);
            
            const newPos = insertPos + indent.length + template.length;
            textarea.focus();
            textarea.setSelectionRange(newPos, newPos);
            
            textarea.scrollTop = savedScrollTop;
            textarea.scrollLeft = savedScrollLeft;
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        function deleteActiveShape() {
            if (!activeTagInfo) return;
            const code = textarea.value;
            let start = activeTagInfo.start;
            let end = activeTagInfo.fullEnd;

            while (start > 0 && (code[start-1] === ' ' || code[start-1] === '\t')) {
                start--;
            }
            if (start > 0 && code[start-1] === '\n') start--;

            const newCode = code.substring(0, start) + code.substring(end);
            
            const savedScrollTop = textarea.scrollTop;
            const savedScrollLeft = textarea.scrollLeft;
            
            updateCode(newCode, true);
            
            textarea.focus();
            textarea.setSelectionRange(start, start);
            
            textarea.scrollTop = savedScrollTop;
            textarea.scrollLeft = savedScrollLeft;
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        // --- Output ---
        function downloadSVG() {
            const code = textarea.value;
            let finalSVG = code;

            if (/<svg/i.test(code)) {
                finalSVG = code;
            } else if (/<symbol/i.test(code)) {
                let viewBoxMatch = code.match(/viewBox=["']([^"']+)["']/i);
                let viewBox = viewBoxMatch ? viewBoxMatch[1] : "0 0 100 100";
                
                let idMatch = code.match(/<symbol[^>]*id=["']([^"']+)["']/i);
                let symbolId = idMatch ? idMatch[1] : "component";

                let indentedCode = code.split('\n').map(line => '    ' + line).join('\n');

                finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}">\n` +
                           `  <defs>\n${indentedCode}\n  </defs>\n` +
                           `  <use href="#${symbolId}" />\n` +
                           `</svg>`;
            } else {
                let viewBoxMatch = code.match(/viewBox=["']([^"']+)["']/i);
                let viewBox = viewBoxMatch ? viewBoxMatch[1] : "0 0 100 100";
                let indentedCode = code.split('\n').map(line => '  ' + line).join('\n');
                
                finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}">\n${indentedCode}\n</svg>`;
            }

            const blob = new Blob([finalSVG], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            let idMatch = code.match(/<symbol[^>]*id=["']([^"']+)["']/i);
            a.download = (idMatch ? idMatch[1] : 'component') + '.svg';
            
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function copyToClipboard() {
            textarea.select();
            document.execCommand('copy');
            textarea.setSelectionRange(textarea.selectionStart, textarea.selectionStart);
            
            const btn = document.getElementById('copy-btn');
            const orig = btn.innerHTML;
            btn.innerHTML = '✅';
            setTimeout(() => btn.innerHTML = orig, 1500);
            
            textarea.focus();
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                updateCode(e.target.result, true);
                textarea.scrollTop = 0;
                textarea.scrollLeft = 0;
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        // Drag and Drop Support
        if (editorWrapper) {
            editorWrapper.addEventListener('dragover', (e) => {
                e.preventDefault();
                editorWrapper.classList.add('drag-over');
            });
            editorWrapper.addEventListener('dragleave', (e) => {
                e.preventDefault();
                editorWrapper.classList.remove('drag-over');
            });
            editorWrapper.addEventListener('drop', (e) => {
                e.preventDefault();
                editorWrapper.classList.remove('drag-over');
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    const file = e.dataTransfer.files[0];
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        updateCode(evt.target.result, true);
                        textarea.scrollTop = 0;
                        textarea.scrollLeft = 0;
                    };
                    reader.readAsText(file);
                }
            });
        }

    </script>
</body>
