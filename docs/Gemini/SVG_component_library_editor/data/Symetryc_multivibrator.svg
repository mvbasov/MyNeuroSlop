<svg class="circuit-diagram" viewBox="0 0 850 650" width="100%" height="650">
<!-- Background rectangle -->
  <rect width="100%" height="100%" fill="aliceblue" />
<defs id="schematic-library" data-name="simple components" data-version="1.8.0">
  <symbol id="npn" viewBox="0 0 100 100">
          <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main Connection Pins -->
            <line x1="0" y1="50" x2="25" y2="50"></line>
            <polyline points="50,0 50,20 25,40"></polyline>
            <polyline points="50,100 50,80 25,60"></polyline>
            <!-- Base Plate -->
            <line x1="25" y1="35" x2="25" y2="65"></line>
            <!-- Outer Envelope -->
            <circle cx="40" cy="50" r="33"></circle>
            <!-- NPN Emitter Arrow (Outward) -->
            <polygon points="40,72 33,71 37,65" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"></polygon>
          </g>
        </symbol>
  <symbol id="resistor" viewBox="0 0 100 100">
          <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="0" y1="50" x2="30" y2="50"></line>
            <rect x="30" y="40" width="40" height="20"></rect>
            <line x1="70" y1="50" x2="100" y2="50"></line>
          </g>
        </symbol>
  <symbol id="capacitor-pol" viewBox="0 0 100 100">
          <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="0" y1="50" x2="40" y2="50"></line>
            <line x1="42" y1="30" x2="42" y2="70" stroke-width="4"></line>
            <line x1="20" y1="35" x2="30" y2="35" stroke-width="2"></line>
            <line x1="25" y1="30" x2="25" y2="40" stroke-width="2"></line>
            <path d="M 56 30 Q 41 50 56 70" stroke-width="4"></path>
            <line x1="50" y1="50" x2="100" y2="50"></line>
          </g>
        </symbol>
  <symbol id="led" viewBox="0 0 100 100">
          <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <!-- Main Connection Pins -->
            <line x1="0" y1="50" x2="35" y2="50"></line>
            <line x1="65" y1="50" x2="100" y2="50"></line>
            <!-- Cathode Bar -->
            <line x1="65" y1="30" x2="65" y2="70"></line>
            <!-- Diode Body (Filled Anode Triangle) -->
            <polygon points="35,30 35,70 65,50" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"></polygon>
            <!-- Light Emission Rays -->
            <line x1="42" y1="26" x2="54" y2="14"></line>
            <line x1="54" y1="34" x2="66" y2="22"></line>
            <!-- Light Emission Arrowheads (Filled) -->
            <polygon points="50,10 58,10 58,18" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"></polygon>
            <polygon points="62,18 70,18 70,26" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"></polygon>
          </g>
        </symbol>
  <symbol id="terminal" viewBox="0 0 100 100">
          <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="50" cy="50" r="14"></circle>
            <line x1="35" y1="65" x2="65" y2="35"></line>
            <line x1="64" y1="50" x2="100" y2="50"></line>
          </g>
        </symbol>
</defs>
        <!-- === POWER RAILS === -->
        <use href="#terminal" x="150" y="30" width="100" height="100" />
        <text x="200" y="45" class="component-label" text-anchor="middle">VCC IN</text>
        <line x1="250" y1="80" x2="650" y2="80" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        
        <use href="#terminal" x="150" y="500" width="100" height="100" />
        <text x="200" y="525" class="component-label" text-anchor="middle">GND</text>
        <line x1="250" y1="550" x2="650" y2="550" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />

        <!-- Right Side Ground Component -->
        <use href="#ground" x="550" y="550" width="100" height="100" />


        <!-- === LEFT HALF (Q1 - Flipped) === -->
        <!-- Collector Resistor (R1) -->
        <use href="#resistor" transform="translate(250, 150) rotate(90) translate(-50, -50)" width="100" height="100" />
        <text x="230" y="155" class="component-label" text-anchor="end">R1 (1k)</text>

        <!-- Base Resistor (R2) -->
        <use href="#resistor" transform="translate(350, 150) rotate(90) translate(-50, -50)" width="100" height="100" />
        <text x="370" y="155" class="component-label" text-anchor="start">R2 (47k)</text>

        <!-- LED (D1) -->
        <use href="#led" transform="translate(250, 250) rotate(90) translate(-50, -50)" width="100" height="100" />
        <text x="200" y="255" class="component-label" text-anchor="end">D1</text>

        <!-- Transistor (Q1) -->
        <use href="#npn" transform="translate(300, 400) scale(-1, 1)" width="100" height="100" />
        <text x="250" y="460" class="component-label" text-anchor="end">Q1</text>

        <!-- Wires for Left Half -->
        <line x1="250" y1="80" x2="250" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="350" y1="80" x2="350" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <path d="M350,200 L350,450 h-50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <line x1="250" y1="300" x2="250" y2="400" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="250" y1="500" x2="250" y2="550" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />

        <!-- === RIGHT HALF (Q2 - Normal) === -->
        <!-- Base Resistor (R3) -->
        <use href="#resistor" transform="translate(550, 150) rotate(90) translate(-50, -50)" width="100" height="100" />
        <text x="530" y="155" class="component-label" text-anchor="end">R3 (47k)</text>

        <!-- Collector Resistor (R4) -->
        <use href="#resistor" transform="translate(700, 100) rotate(90)" width="100" height="100" />
        <text x="670" y="155" class="component-label" text-anchor="start">R4 (1k)</text>

        <!-- LED (D2) -->
        <use href="#led" transform="translate(700, 200) rotate(90)" width="100" height="100" />
        <text x="650" y="255" class="component-label" text-anchor="start">D2</text>

        <!-- Transistor (Q2) -->
        <use href="#npn" transform="translate(600, 400)" width="100" height="100" />
        <text x="700" y="460" class="component-label" text-anchor="start">Q2</text>

        <!-- Wires for Right Half -->
        <line x1="550" y1="80" x2="550" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="650" y1="80" x2="650" y2="100" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <path d="M550,200 L550,450 h50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <line x1="650" y1="300" x2="650" y2="400" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="650" y1="500" x2="650" y2="550" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />


        <!-- === CROSS COUPLING CAPACITORS === -->
        <use href="#capacitor-pol" x="375" y="270" width="100" height="100" />
        <text x="425" y="280" class="component-label" text-anchor="middle">C1 (10µF)</text>
        <line x1="250" y1="320" x2="375" y2="320" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="475" y1="320" x2="550" y2="320" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />

        <use href="#capacitor-pol" transform="translate(475, 360) rotate(180) translate(-50, -50)" width="100" height="100" />
        <text x="475" y="415" class="component-label" text-anchor="middle">C2 (10µF)</text>
        <line x1="350" y1="360" x2="425" y2="360" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="525" y1="360" x2="650" y2="360" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />


        <!-- === JUNCTION DOTS === -->
        <circle cx="250" cy="80" r="4" fill="currentColor" />
        <circle cx="350" cy="80" r="4" fill="currentColor" />
        <circle cx="550" cy="80" r="4" fill="currentColor" />
        
        <circle cx="250" cy="550" r="4" fill="currentColor" />
        <!--<circle cx="650" cy="550" r="4" fill="currentColor" />-->
        
        <circle cx="250" cy="320" r="4" fill="currentColor" />
        <circle cx="550" cy="320" r="4" fill="currentColor" />
        <circle cx="350" cy="360" r="4" fill="currentColor" />
        <circle cx="650" cy="360" r="4" fill="currentColor" />
      </svg>
