<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cg stroke='%233b82f6' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='50' cy='50' r='40' /%3E%3Cline x1='10' y1='50' x2='35' y2='50' /%3E%3Cline x1='35' y1='30' x2='35' y2='70' stroke-width='7' /%3E%3Cpath d='M 35 40 L 60 20 L 60 10' /%3E%3Cpath d='M 35 60 L 60 80 L 60 90' /%3E%3Cpolygon points='58,78 46,76 54,67' fill='%233b82f6' /%3E%3C/g%3E%3C/svg%3E">
    <title>SVG Component Editor</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --panel-bg: #282a36;
            --text-color: #f8f8f2;
            --primary: #3b82f6;       /* True Blue */
            --primary-hover: #60a5fa; /* Lighter Blue for hover */
            --danger: #ff5555;
            --success: #50fa7b;
            --border: #44475a;
            --toolbar-bg: #21222c;
            --preview-bg: #f8f9fa;
            --grid-line: #dee2e6;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            
            /* CSS Grid Layout for easy reordering */
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "header header"
                "preview editor"
                "footer footer";
        }

        /* --- Header & Toolbar --- */
        header {
            grid-area: header;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            background-color: var(--danger);
            color: white;
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            display: none; /* toggled to inline-block on error */
        }

        .toolbar-group {
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--panel-bg);
            padding: 5px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .toolbar-right {
            margin-left: auto;
        }

        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        button {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--border);
        }

        button.primary {
            background: var(--primary);
            color: #ffffff;
            font-weight: 600;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        button.danger {
            color: var(--danger);
        }
        button.danger:hover {
            background: rgba(255, 85, 85, 0.1);
        }

        .toolbar-select {
            background: transparent;
            color: var(--text-color);
            border: 1px solid transparent;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 32px;
            text-align: center;
            text-align-last: center;
        }

        .toolbar-select:hover {
            background: var(--border);
        }

        .toolbar-select.wide {
            width: auto;
            text-align: left;
            text-align-last: left;
            padding-left: 8px;
            padding-right: 24px;
            background-image: url("data:image/svg+xml,%3Csvg fill='%23f8f8f2' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M7 10l5 5 5-5z'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 2px center;
            background-size: 18px;
        }

        .toolbar-select option {
            background: var(--panel-bg);
            color: var(--text-color);
        }

        label.toggle {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
        }

        /* --- Main Layout Panels --- */
        .panel {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
        }

        .preview-panel {
            grid-area: preview;
            border-right: 1px solid var(--border);
        }

        .editor-panel {
            grid-area: editor;
        }

        /* --- Footer --- */
        footer {
            grid-area: footer;
            background-color: var(--toolbar-bg);
            border-top: 1px solid var(--border);
            padding: 4px 15px;
            text-align: right;
            font-size: 0.75rem;
            color: #6272a4;
        }

        /* --- Preview Area --- */
        #preview-container {
            flex: 1;
            background-color: var(--preview-bg);
            color: black;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #main-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
        }

        /* --- Editor Area --- */
        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--panel-bg);
            overflow: hidden;
        }

        textarea, .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 15px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.5;
            border: none;
            outline: none;
            resize: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            box-sizing: border-box;
            tab-size: 2;
        }

        textarea {
            color: transparent;
            background: transparent;
            caret-color: var(--primary);
            z-index: 2;
        }

        .backdrop {
            z-index: 1;
            color: var(--text-color);
            overflow: hidden;
            pointer-events: none;
        }

        mark {
            background-color: rgba(59, 130, 246, 0.3);
            color: inherit;
            border-radius: 2px;
            outline: 1px solid rgba(59, 130, 246, 0.6);
        }

        /* Specialized highlight for individual coordinates/points */
        mark.point-mark {
            background-color: rgba(255, 85, 85, 0.4);
            border-radius: 2px;
            outline: 1px solid rgba(255, 85, 85, 0.8);
        }

        /* Mobile Layout Modifications */
        @media (max-width: 800px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr auto 1fr auto;
                grid-template-areas:
                    "preview"
                    "header"
                    "editor"
                    "footer";
            }
            .preview-panel {
                border-right: none;
            }
            header {
                border-top: 1px solid var(--border);
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="toolbar-group">
            <select class="toolbar-select wide" onchange="if(this.value){ insertShape(this.value); this.value=''; }" title="Add Element">
                <option value="" disabled selected>➕ Add Element</option>
                <option value="circle">⭕ Circle</option>
                <option value="line">📏 Line</option>
                <option value="path">〰️ Path</option>
                <option value="polygon">⬠ Polygon</option>
                <option value="polyline">📈 Polyline</option>
                <option value="rect">🟦 Rectangle</option>
                <option value="text">🔤 Text</option>
            </select>
        </div>

        <div class="toolbar-group">
            <span id="error-badge" class="badge">Syntax Error</span>
            <label class="toggle">
                <input type="checkbox" id="toggle-grid" checked> Grid
            </label>
        </div>

        <div class="toolbar-group">
            <button onclick="moveShape(0, -1)" title="Move Up (↑)">▲</button>
            <button onclick="moveShape(0, 1)" title="Move Down (↓)">▼</button>
            <button onclick="moveShape(-1, 0)" title="Move Left (←)">◀</button>
            <button onclick="moveShape(1, 0)" title="Move Right (→)">▶</button>
        </div>

        <div class="toolbar-group">
            <select class="toolbar-select" onchange="if(this.value){ rotateShape(Number(this.value)); this.value=''; }" title="Rotate">
                <option value="" disabled selected>↻</option>
                <option value="90">↻ 90°</option>
                <option value="-90">↺ -90°</option>
                <option value="180">↻ 180°</option>
            </select>
            <div class="toolbar-divider"></div>
            <button class="danger" onclick="deleteActiveShape()" title="Delete">🗑️</button>
        </div>

        <div class="toolbar-group toolbar-right">
            <button onclick="undo()" title="Undo (Ctrl+Z)">↶</button>
            <button onclick="redo()" title="Redo (Ctrl+Y)">↷</button>
            <button class="primary" id="copy-btn" onclick="copyToClipboard()" title="Copy Code">📋</button>
            <button class="primary" onclick="downloadSVG()" title="Save SVG">💾</button>
        </div>
    </header>

    <div class="panel preview-panel">
        <div id="preview-container">
            <svg id="main-svg" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="gridPattern" patternUnits="userSpaceOnUse" width="10" height="10">
                        <rect width="100%" height="100%" fill="none" />
                        <path id="gridPatternLine" d="M 10 0 L 0 0 0 10" fill="none" stroke="var(--grid-line)" stroke-width="0.5" />
                    </pattern>
                </defs>
                <g id="grid-group">
                    <rect id="grid-rect" fill="url(#gridPattern)" />
                    <g id="grid-labels"></g>
                </g>
                <svg id="user-svg-container"></svg>
                <!-- Overlay group for pinpoint highlight rendering inside native main SVG space -->
                <g id="overlay-group" style="pointer-events: none;"></g>
            </svg>
        </div>
    </div>
    
    <div class="panel editor-panel">
        <div class="editor-wrapper">
            <div class="backdrop" id="backdrop"></div>
            <textarea id="code" spellcheck="false"></textarea>
        </div>
    </div>

    <footer>v3.2</footer>

    <script>
        const defaultCode = `<!-- NPN Transistor -->
<symbol id="npn" viewBox="0 0 100 100">
  <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="50" r="42" stroke-width="2" />
    <line x1="0" y1="50" x2="35" y2="50" />
    <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
    <path d="M 35,40 L 60,20 L 60,0" />
    <path d="M 35,60 L 60,80 L 60,100" />
    <polygon points="58,78 46,76 54,67" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  </g>
</symbol>`;

        // DOM Elements
        const textarea = document.getElementById('code');
        const backdrop = document.getElementById('backdrop');
        const userSvgContainer = document.getElementById('user-svg-container');
        const overlayGroup = document.getElementById('overlay-group');
        const mainSvg = document.getElementById('main-svg');
        const gridGroup = document.getElementById('grid-group');
        const gridRect = document.getElementById('grid-rect');
        const gridPattern = document.getElementById('gridPattern');
        const gridPatternLine = document.getElementById('gridPatternLine');
        const gridLabels = document.getElementById('grid-labels');
        const errorBadge = document.getElementById('error-badge');
        const toggleGrid = document.getElementById('toggle-grid');

        // State & Singletons
        let history = [];
        let historyIndex = -1;
        let lastValidRender = "";
        let activeTagInfo = null;
        let debounceTimeout;
        let selectionRafId = null;
        let scrollRafId = null;
        
        // Track previously highlighted node to restore its state
        let previouslyHighlightedNode = { node: null, originalStroke: null };
        
        // Reusable Parser Singleton (optimization)
        const domParser = new DOMParser();

        // Initialization
        window.onload = () => {
            textarea.value = defaultCode;
            saveHistory(defaultCode);
            processInput(true);
        };

        // --- Event Listeners ---
        textarea.addEventListener('input', (e) => {
            processInput(false);
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => saveHistory(e.target.value), 600);
        });

        const selectionEvents = ['keyup', 'click', 'focus', 'touchend'];
        selectionEvents.forEach(evt => textarea.addEventListener(evt, () => {
            // Debounce selection updates to animation frame to prevent layout thrashing
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }));

        textarea.addEventListener('scroll', () => {
            if (scrollRafId) cancelAnimationFrame(scrollRafId);
            scrollRafId = requestAnimationFrame(() => {
                backdrop.scrollTop = textarea.scrollTop;
                backdrop.scrollLeft = textarea.scrollLeft;
            });
        });

        toggleGrid.addEventListener('change', () => {
            gridGroup.style.display = toggleGrid.checked ? 'block' : 'none';
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') { e.preventDefault(); undo(); }
                if (e.key === 'y' || (e.shiftKey && e.key === 'Z')) { e.preventDefault(); redo(); }
            }
            // Add fast arrow movement throttling natively
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
            }
        });

        // --- Core Processing ---
        function processInput(forceUpdate = false) {
            const code = textarea.value;
            
            // Check for parsing errors by converting symbol to svg
            const previewCode = code.replace(/<symbol/gi, '<svg').replace(/<\/symbol>/gi, '</svg>');
            const doc = domParser.parseFromString(`<svg xmlns="http://www.w3.org/2000/svg">${previewCode}</svg>`, "image/svg+xml");
            const isError = doc.querySelector("parsererror");

            if (isError) {
                errorBadge.style.display = 'inline-block';
                if (selectionRafId) cancelAnimationFrame(selectionRafId);
                selectionRafId = requestAnimationFrame(updateSelection);
                return;
            }
            
            errorBadge.style.display = 'none';
            lastValidRender = previewCode;
            userSvgContainer.innerHTML = previewCode;
            
            updateGrid(code);
            
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        // --- History System ---
        function saveHistory(code) {
            if (historyIndex >= 0 && history[historyIndex] === code) return;
            history = history.slice(0, historyIndex + 1);
            history.push(code);
            historyIndex++;
        }

        function applyState() {
            textarea.value = history[historyIndex];
            processInput(true);
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                applyState();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                applyState();
            }
        }

        function updateCode(newCode, save = true) {
            textarea.value = newCode;
            processInput(true);
            if (save) saveHistory(newCode);
        }

        // --- Grid & Viewport Management ---
        function updateGrid(code) {
            let viewBoxMatch = code.match(/viewBox=["']([^"']+)["']/i);
            let vb = viewBoxMatch ? viewBoxMatch[1].trim().split(/[\s,]+/).map(Number) : [0, 0, 100, 100];
            
            if (vb.length < 4 || vb.some(isNaN) || vb[2] <= 0 || vb[3] <= 0) {
                vb = [0, 0, 100, 100];
            }
            
            const vx = vb[0], vy = vb[1], vw = vb[2], vh = vb[3];
            const step = vw / 10;
            const pad = step * 2.5;

            mainSvg.setAttribute('viewBox', `${vx - pad} ${vy - pad} ${vw + 2*pad} ${vh + 2*pad}`);
            userSvgContainer.setAttribute('x', vx);
            userSvgContainer.setAttribute('y', vy);
            userSvgContainer.setAttribute('width', vw);
            userSvgContainer.setAttribute('height', vh);

            gridPattern.setAttribute('width', step);
            gridPattern.setAttribute('height', step);
            gridPatternLine.setAttribute('d', `M ${step} 0 L 0 0 0 ${step}`);
            
            gridRect.setAttribute('x', vx);
            gridRect.setAttribute('y', vy);
            gridRect.setAttribute('width', vw);
            gridRect.setAttribute('height', vh);

            let labelsArr = [];
            const maxStepsX = Math.min(Math.floor(vw / step), 500);
            const maxStepsY = Math.min(Math.floor(vh / step), 500);

            for (let i = 0; i <= maxStepsX; i++) {
                if (i === 0 || i === maxStepsX || i % 2 === 0) {
                    let valX = vx + i * step;
                    let textX = parseFloat(valX.toFixed(2));
                    labelsArr.push(`<text x="${valX}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
                }
            }
            
            if (vw - maxStepsX * step > 0.001 && maxStepsX < 500) {
                let textX = parseFloat((vx + vw).toFixed(2));
                labelsArr.push(`<text x="${vx + vw}" y="${vy - step*0.3}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="middle" font-family="var(--font-mono)">${textX}</text>`);
            }

            for (let i = 0; i <= maxStepsY; i++) {
                if (i === 0 || i === maxStepsY || i % 2 === 0) {
                    let valY = vy + i * step;
                    let textY = parseFloat(valY.toFixed(2));
                    labelsArr.push(`<text x="${vx - step*0.3}" y="${valY + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
                }
            }
            
            if (vh - maxStepsY * step > 0.001 && maxStepsY < 500) {
                let textY = parseFloat((vy + vh).toFixed(2));
                labelsArr.push(`<text x="${vx - step*0.3}" y="${vy + vh + step*0.15}" font-size="${step*0.4}" fill="var(--grid-line)" text-anchor="end" font-family="var(--font-mono)">${textY}</text>`);
            }

            gridLabels.innerHTML = labelsArr.join('');
        }

        // Custom HTML/XML parser to map cursor positions to DOM hierarchy
        function getActiveTag(html, cursor) {
            const regex = /(<!--[\s\S]*?-->|<\/?([a-z0-9:-]+)[^>]*>)/gi;
            let match;
            let stack = [];
            let domIndex = 0;
            let elements = [];

            while ((match = regex.exec(html)) !== null) {
                const text = match[0];
                const start = match.index;
                const end = start + text.length;

                if (text.startsWith('<!--')) continue;

                if (text.startsWith('</')) {
                    if (stack.length > 0) {
                        let top = stack.pop();
                        top.fullEnd = end;
                        top.closeStart = start;
                    }
                    continue;
                }

                const isSelfClosing = text.endsWith('/>');
                const tagNameMatch = text.match(/<([a-z0-9:-]+)/i);
                const tagName = tagNameMatch ? tagNameMatch[1] : '';

                const el = { domIndex: domIndex++, start: start, tagEnd: end, fullEnd: end, closeStart: isSelfClosing ? end : -1, tagName: tagName };
                elements.push(el);

                if (!isSelfClosing && tagName.toLowerCase() !== 'br' && tagName.toLowerCase() !== 'hr') {
                    stack.push(el);
                }
            }

            for (let s of stack) {
                s.fullEnd = html.length;
                s.closeStart = html.length;
            }

            let active = null;
            let minSize = Infinity;
            for (let el of elements) {
                // Determine if cursor is enclosed by the full tag scope
                if (cursor >= el.start && cursor <= el.fullEnd) {
                    let size = el.fullEnd - el.start;
                    if (size < minSize) {
                        minSize = size;
                        active = el;
                    }
                }
            }
            return active;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // --- Tracking & Highlighting ---
        function updateSelection() {
            const code = textarea.value;
            const cursor = textarea.selectionStart;
            
            activeTagInfo = getActiveTag(code, cursor);
            if (overlayGroup) overlayGroup.innerHTML = '';
            
            let activeSub = null;
            let activeNode = null;
            
            // 2. Update visual preview highlight
            
            // First, restore the previously highlighted node if it exists
            if (previouslyHighlightedNode.node) {
                const { node, originalStroke } = previouslyHighlightedNode;
                if (originalStroke === null) {
                    node.removeAttribute('stroke');
                } else {
                    node.setAttribute('stroke', originalStroke);
                }
                previouslyHighlightedNode.node = null;
                previouslyHighlightedNode.originalStroke = null;
            }

            if (activeTagInfo && activeTagInfo.domIndex >= 0) {
                // Find element in live DOM. First child is our injected wrapper, so search inside it.
                const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
                activeNode = liveElements[activeTagInfo.domIndex];
                
                if (activeNode) {
                    // Save current state and apply highlight stroke
                    previouslyHighlightedNode.node = activeNode;
                    previouslyHighlightedNode.originalStroke = activeNode.getAttribute('stroke');
                    activeNode.setAttribute('stroke', '#3b82f6');
                    
                    // Check if we are hovering over a specific point / command
                    const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                    const relPos = cursor - activeTagInfo.start;
                    activeSub = getActiveSubElement(tagStr, relPos, activeTagInfo.tagName.toLowerCase(), activeNode);
                    
                    // If a specific movable point is detected, draw an overlay dot
                    if (activeSub && (activeSub.cx !== undefined && activeSub.cy !== undefined || activeSub.qData || activeSub.cData)) {
                        const vw = parseFloat(userSvgContainer.getAttribute('width') || 100);
                        const r = vw * 0.02; // Dynamic radius based on viewport
                        
                        // Handle mapping accurately using screen matrices to bypass nested scales/viewboxes
                        const getMappedCoords = (x, y) => {
                            let tx = x, ty = y;
                            try {
                                const pt = mainSvg.createSVGPoint();
                                pt.x = x;
                                pt.y = y;
                                const ctm = activeNode.getScreenCTM();
                                const inv = mainSvg.getScreenCTM().inverse();
                                if (ctm && inv) {
                                    const screenPt = pt.matrixTransform(ctm);
                                    const overlayPt = screenPt.matrixTransform(inv);
                                    tx = overlayPt.x;
                                    ty = overlayPt.y;
                                }
                            } catch(e) {
                                console.error("CTM Transformation Error:", e);
                            }
                            return {tx, ty};
                        };

                        if (activeSub.cData) {
                            const pStart = getMappedCoords(activeSub.cData.startX, activeSub.cData.startY);
                            const pC1 = getMappedCoords(activeSub.cData.c1x, activeSub.cData.c1y);
                            const pC2 = getMappedCoords(activeSub.cData.c2x, activeSub.cData.c2y);
                            const pEnd = getMappedCoords(activeSub.cData.endX, activeSub.cData.endY);
                            
                            let c1Color = (activeSub.cData.activePoint === 'c1' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            let c2Color = (activeSub.cData.activePoint === 'c2' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            let endColor = (activeSub.cData.activePoint === 'end' || activeSub.cData.activePoint === 'both') ? 'var(--danger)' : 'var(--primary)';
                            
                            overlayGroup.innerHTML = `
                                <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <line x1="${pC2.tx}" y1="${pC2.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pC2.tx}" cy="${pC2.ty}" r="${r}" fill="${c2Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                            `;
                        } else if (activeSub.qData) {
                            const pStart = getMappedCoords(activeSub.qData.startX, activeSub.qData.startY);
                            const pC1 = getMappedCoords(activeSub.qData.c1x, activeSub.qData.c1y);
                            const pEnd = getMappedCoords(activeSub.qData.endX, activeSub.qData.endY);
                            
                            let c1Color = activeSub.qData.activePoint === 'end' ? 'var(--primary)' : 'var(--danger)';
                            let endColor = activeSub.qData.activePoint === 'control' ? 'var(--primary)' : 'var(--danger)';
                            
                            overlayGroup.innerHTML = `
                                <line x1="${pStart.tx}" y1="${pStart.ty}" x2="${pC1.tx}" y2="${pC1.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <line x1="${pC1.tx}" y1="${pC1.ty}" x2="${pEnd.tx}" y2="${pEnd.ty}" stroke="var(--primary)" stroke-width="1.5" stroke-dasharray="2,2" />
                                <circle cx="${pC1.tx}" cy="${pC1.ty}" r="${r}" fill="${c1Color}" stroke="#fff" stroke-width="${r * 0.2}" />
                                <circle cx="${pEnd.tx}" cy="${pEnd.ty}" r="${r}" fill="${endColor}" stroke="#fff" stroke-width="${r * 0.2}" />
                            `;
                        } else {
                            const p = getMappedCoords(activeSub.cx, activeSub.cy);
                            overlayGroup.innerHTML = `<circle cx="${p.tx}" cy="${p.ty}" r="${r}" fill="var(--danger)" stroke="#fff" stroke-width="${r * 0.2}" />`;
                        }
                    }
                }
            }
            
            // 1. Update text backdrop
            if (activeTagInfo) {
                const before = escapeHTML(code.substring(0, activeTagInfo.start));
                let highlight = '';
                
                if (activeSub) {
                    const tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
                    // Use multi-range if provided, fallback to standard start/end
                    const ranges = activeSub.ranges || [{start: activeSub.start, end: activeSub.end}];
                    ranges.sort((a, b) => a.start - b.start);
                    
                    let hlResult = '';
                    let lastIdx = 0;
                    for (let r of ranges) {
                        hlResult += escapeHTML(tagStr.substring(lastIdx, r.start));
                        hlResult += `<mark class="point-mark">${escapeHTML(tagStr.substring(r.start, r.end))}</mark>`;
                        lastIdx = r.end;
                    }
                    hlResult += escapeHTML(tagStr.substring(lastIdx));
                    highlight = hlResult;
                } else {
                    highlight = escapeHTML(code.substring(activeTagInfo.start, activeTagInfo.tagEnd));
                }
                
                const after = escapeHTML(code.substring(activeTagInfo.tagEnd));
                backdrop.innerHTML = before + `<mark>${highlight}</mark>` + after;
            } else {
                backdrop.innerHTML = escapeHTML(code);
            }
        }

        // Identify specific point or path command near cursor for secondary highlight
        function getActiveSubElement(tagStr, relPos, tagName, activeNode) {
            // Helper function to find attribute boundaries
            const getAttrMatch = (attr) => {
                const m = tagStr.match(new RegExp(`\\b${attr}=["'][^"']*["']`, 'i'));
                return m ? { start: m.index, end: m.index + m[0].length } : null;
            };

            // Universal attribute checks
            const swMatch = getAttrMatch('stroke-width');
            if (swMatch && relPos >= swMatch.start && relPos <= swMatch.end) {
                return {
                    start: swMatch.start,
                    end: swMatch.end
                };
            }

            if (['polygon', 'polyline'].includes(tagName)) {
                const pointsMatch = tagStr.match(/\bpoints=["']([^"']+)["']/i);
                if (pointsMatch) {
                    const valStart = pointsMatch.index + pointsMatch[0].indexOf(pointsMatch[1]);
                    const valEnd = valStart + pointsMatch[1].length;
                    if (relPos >= valStart && relPos <= valEnd) {
                        const localRelPos = relPos - valStart;
                        const pairRegex = /(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/g;
                        let pMatch;
                        while ((pMatch = pairRegex.exec(pointsMatch[1])) !== null) {
                            if (localRelPos >= pMatch.index - 1 && localRelPos <= pMatch.index + pMatch[0].length + 1) {
                                return {
                                    start: valStart + pMatch.index,
                                    end: valStart + pMatch.index + pMatch[0].length,
                                    cx: parseFloat(pMatch[1]),
                                    cy: parseFloat(pMatch[2])
                                };
                            }
                        }
                    }
                }
            }

            if (tagName === 'line') {
                const checkPair = (a1, a2) => {
                    const m1 = getAttrMatch(a1);
                    const m2 = getAttrMatch(a2);
                    if ((m1 && relPos >= m1.start && relPos <= m1.end) || 
                        (m2 && relPos >= m2.start && relPos <= m2.end)) {
                        return { m1, m2 };
                    }
                    return null;
                };

                let pair1 = checkPair('x1', 'y1');
                if (pair1) {
                    let ranges = [];
                    if (pair1.m1) ranges.push(pair1.m1);
                    if (pair1.m2) ranges.push(pair1.m2);
                    return {
                        ranges: ranges,
                        cx: parseFloat(activeNode.getAttribute('x1') || 0),
                        cy: parseFloat(activeNode.getAttribute('y1') || 0)
                    };
                }
                
                let pair2 = checkPair('x2', 'y2');
                if (pair2) {
                    let ranges = [];
                    if (pair2.m1) ranges.push(pair2.m1);
                    if (pair2.m2) ranges.push(pair2.m2);
                    return {
                        ranges: ranges,
                        cx: parseFloat(activeNode.getAttribute('x2') || 0),
                        cy: parseFloat(activeNode.getAttribute('y2') || 0)
                    };
                }
            }

            if (tagName === 'rect') {
                const checkPair = (a1, a2) => {
                    const m1 = getAttrMatch(a1);
                    const m2 = getAttrMatch(a2);
                    if ((m1 && relPos >= m1.start && relPos <= m1.end) || 
                        (m2 && relPos >= m2.start && relPos <= m2.end)) {
                        return { m1, m2 };
                    }
                    return null;
                };

                let xVal = parseFloat(activeNode.getAttribute('x') || 0);
                let yVal = parseFloat(activeNode.getAttribute('y') || 0);
                let wVal = parseFloat(activeNode.getAttribute('width') || 0);
                let hVal = parseFloat(activeNode.getAttribute('height') || 0);

                let basePair = checkPair('x', 'y');
                if (basePair) {
                    let ranges = [];
                    if (basePair.m1) ranges.push(basePair.m1);
                    if (basePair.m2) ranges.push(basePair.m2);
                    return {
                        ranges: ranges,
                        cx: xVal,
                        cy: yVal
                    };
                }

                let wMatch = getAttrMatch('width');
                if (wMatch && relPos >= wMatch.start && relPos <= wMatch.end) {
                    return {
                        start: wMatch.start,
                        end: wMatch.end,
                        cx: xVal + wVal,
                        cy: yVal + hVal / 2
                    };
                }

                let hMatch = getAttrMatch('height');
                if (hMatch && relPos >= hMatch.start && relPos <= hMatch.end) {
                    return {
                        start: hMatch.start,
                        end: hMatch.end,
                        cx: xVal + wVal / 2,
                        cy: yVal // top center for height control
                    };
                }

                let rxMatch = getAttrMatch('rx');
                if (rxMatch && relPos >= rxMatch.start && relPos <= rxMatch.end) {
                    return {
                        start: rxMatch.start,
                        end: rxMatch.end,
                        cx: xVal + parseFloat(activeNode.getAttribute('rx') || 0),
                        cy: yVal // top edge, moving horizontally
                    };
                }

                let ryMatch = getAttrMatch('ry');
                if (ryMatch && relPos >= ryMatch.start && relPos <= ryMatch.end) {
                    return {
                        start: ryMatch.start,
                        end: ryMatch.end,
                        cx: xVal, // left edge, moving vertically
                        cy: yVal + parseFloat(activeNode.getAttribute('ry') || 0)
                    };
                }
            }

            if (tagName === 'circle') {
                const checkPair = (a1, a2) => {
                    const m1 = getAttrMatch(a1);
                    const m2 = getAttrMatch(a2);
                    if ((m1 && relPos >= m1.start && relPos <= m1.end) || 
                        (m2 && relPos >= m2.start && relPos <= m2.end)) {
                        return { m1, m2 };
                    }
                    return null;
                };

                let cxVal = parseFloat(activeNode.getAttribute('cx') || 0);
                let cyVal = parseFloat(activeNode.getAttribute('cy') || 0);
                let rVal = parseFloat(activeNode.getAttribute('r') || 0);

                let centerPair = checkPair('cx', 'cy');
                if (centerPair) {
                    let ranges = [];
                    if (centerPair.m1) ranges.push(centerPair.m1);
                    if (centerPair.m2) ranges.push(centerPair.m2);
                    return {
                        ranges: ranges,
                        cx: cxVal,
                        cy: cyVal
                    };
                }

                let rMatch = getAttrMatch('r');
                if (rMatch && relPos >= rMatch.start && relPos <= rMatch.end) {
                    return {
                        start: rMatch.start,
                        end: rMatch.end,
                        cx: cxVal,
                        cy: cyVal - rVal
                    };
                }
            }

            if (tagName === 'text') {
                const getAttrMatch = (attr) => {
                    const m = tagStr.match(new RegExp(`\\b${attr}=["'][^"']*["']`, 'i'));
                    return m ? { start: m.index, end: m.index + m[0].length } : null;
                };

                let xVal = parseFloat(activeNode.getAttribute('x') || 0);
                let yVal = parseFloat(activeNode.getAttribute('y') || 0);

                let xMatch = getAttrMatch('x');
                let yMatch = getAttrMatch('y');

                if ((xMatch && relPos >= xMatch.start && relPos <= xMatch.end) || 
                    (yMatch && relPos >= yMatch.start && relPos <= yMatch.end)) {
                    let ranges = [];
                    if (xMatch) ranges.push(xMatch);
                    if (yMatch) ranges.push(yMatch);
                    return {
                        ranges: ranges,
                        cx: xVal,
                        cy: yVal
                    };
                }
            }

            if (tagName === 'path') {
                const dMatch = tagStr.match(/\bd=["']([^"']+)["']/i);
                if (dMatch) {
                    const valStart = dMatch.index + dMatch[0].indexOf(dMatch[1]);
                    const valEnd = valStart + dMatch[1].length;
                    if (relPos >= valStart && relPos <= valEnd) {
                        const localRelPos = relPos - valStart;
                        const cmdRegex = /([a-df-zA-DF-Z][^a-df-zA-DF-Z]*)/g;
                        let cMatch;
                        let currX = 0, currY = 0, startX = 0, startY = 0;
                        
                        while ((cMatch = cmdRegex.exec(dMatch[1])) !== null) {
                            const chunk = cMatch[0];
                            const letter = chunk.trim()[0];
                            const nums = chunk.substring(1).trim().split(/[\s,]+/).filter(n => n !== "").map(Number);
                            const upper = letter.toUpperCase();
                            const isRel = letter === letter.toLowerCase();

                            let endX = currX;
                            let endY = currY;
                            let qStartX = currX;
                            let qStartY = currY;

                            if (upper === 'Z') {
                                endX = startX;
                                endY = startY;
                            } else if (upper === 'H') {
                                for (let n of nums) endX = isRel ? endX + n : n;
                            } else if (upper === 'V') {
                                for (let n of nums) endY = isRel ? endY + n : n;
                            } else if (upper === 'M' || upper === 'L' || upper === 'T') {
                                for (let i = 0; i < nums.length; i += 2) {
                                    endX = isRel ? endX + nums[i] : nums[i];
                                    endY = isRel ? endY + nums[i+1] : nums[i+1];
                                    if (upper === 'M' && i === 0) { startX = endX; startY = endY; }
                                }
                            } else if (upper === 'C') {
                                for (let i = 0; i < nums.length; i += 6) {
                                    endX = isRel ? endX + nums[i+4] : nums[i+4];
                                    endY = isRel ? endY + nums[i+5] : nums[i+5];
                                }
                            } else if (upper === 'Q' || upper === 'S') {
                                for (let i = 0; i < nums.length; i += 4) {
                                    endX = isRel ? endX + nums[i+2] : nums[i+2];
                                    endY = isRel ? endY + nums[i+3] : nums[i+3];
                                }
                            } else if (upper === 'A') {
                                for (let i = 0; i < nums.length; i += 7) {
                                    endX = isRel ? endX + nums[i+5] : nums[i+5];
                                    endY = isRel ? endY + nums[i+6] : nums[i+6];
                                }
                            }

                            if (localRelPos >= cMatch.index - 1 && localRelPos <= cMatch.index + chunk.length + 1) {
                                if (upper === 'Q') {
                                    let currentStartX = qStartX;
                                    let currentStartY = qStartY;
                                    let foundSub = null;
                                    let pMatch;
                                    const pairRegex = /(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/g;
                                    let pairIndex = 0;

                                    while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                        const pStart = cMatch.index + pMatch.index;
                                        const pEnd = cMatch.index + pMatch.index + pMatch[0].length;

                                        let isControl = (pairIndex % 2 === 0);
                                        let absX = isRel ? currentStartX + parseFloat(pMatch[1]) : parseFloat(pMatch[1]);
                                        let absY = isRel ? currentStartY + parseFloat(pMatch[2]) : parseFloat(pMatch[2]);

                                        let numIdx = pairIndex * 2;
                                        let segmentData = null;
                                        
                                        if (isControl && numIdx + 3 < nums.length) {
                                            segmentData = {
                                                startX: currentStartX,
                                                startY: currentStartY,
                                                c1x: absX,
                                                c1y: absY,
                                                endX: isRel ? currentStartX + nums[numIdx+2] : nums[numIdx+2],
                                                endY: isRel ? currentStartY + nums[numIdx+3] : nums[numIdx+3],
                                                activePoint: 'control'
                                            };
                                        } else if (!isControl && numIdx - 1 < nums.length && numIdx - 2 >= 0) {
                                            segmentData = {
                                                startX: currentStartX,
                                                startY: currentStartY,
                                                c1x: isRel ? currentStartX + nums[numIdx-2] : nums[numIdx-2],
                                                c1y: isRel ? currentStartY + nums[numIdx-1] : nums[numIdx-1],
                                                endX: absX,
                                                endY: absY,
                                                activePoint: 'end'
                                            };
                                        }

                                        if (localRelPos >= pStart - 1 && localRelPos <= pEnd + 1) {
                                            foundSub = {
                                                start: valStart + pStart,
                                                end: valStart + pEnd,
                                                cx: absX,
                                                cy: absY,
                                                qData: segmentData || {
                                                    startX: currentStartX, startY: currentStartY,
                                                    c1x: absX, c1y: absY, endX: absX, endY: absY,
                                                    activePoint: isControl ? 'control' : 'end'
                                                }
                                            };
                                            break;
                                        }

                                        if (!isControl) {
                                            currentStartX = absX;
                                            currentStartY = absY;
                                        }
                                        pairIndex++;
                                    }
                                    if (foundSub) return foundSub;
                                }

                                if (upper === 'C') {
                                    let currentStartX = qStartX;
                                    let currentStartY = qStartY;
                                    let foundSub = null;
                                    let pMatch;
                                    const pairRegex = /(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/g;
                                    let pairIndex = 0;

                                    while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                        const pStart = cMatch.index + pMatch.index;
                                        const pEnd = cMatch.index + pMatch.index + pMatch[0].length;

                                        let pointType = pairIndex % 3; // 0: c1, 1: c2, 2: end
                                        let absX = isRel ? currentStartX + parseFloat(pMatch[1]) : parseFloat(pMatch[1]);
                                        let absY = isRel ? currentStartY + parseFloat(pMatch[2]) : parseFloat(pMatch[2]);

                                        let numIdx = pairIndex * 2;
                                        let segmentData = null;
                                        
                                        let baseIdx = Math.floor(pairIndex / 3) * 6;
                                        if (baseIdx + 5 < nums.length) {
                                            segmentData = {
                                                startX: currentStartX,
                                                startY: currentStartY,
                                                c1x: isRel ? currentStartX + nums[baseIdx] : nums[baseIdx],
                                                c1y: isRel ? currentStartY + nums[baseIdx+1] : nums[baseIdx+1],
                                                c2x: isRel ? currentStartX + nums[baseIdx+2] : nums[baseIdx+2],
                                                c2y: isRel ? currentStartY + nums[baseIdx+3] : nums[baseIdx+3],
                                                endX: isRel ? currentStartX + nums[baseIdx+4] : nums[baseIdx+4],
                                                endY: isRel ? currentStartY + nums[baseIdx+5] : nums[baseIdx+5],
                                                activePoint: pointType === 0 ? 'c1' : (pointType === 1 ? 'c2' : 'end')
                                            };
                                        }

                                        if (localRelPos >= pStart - 1 && localRelPos <= pEnd + 1) {
                                            foundSub = {
                                                start: valStart + pStart,
                                                end: valStart + pEnd,
                                                cx: absX,
                                                cy: absY,
                                                cData: segmentData || {
                                                    startX: currentStartX, startY: currentStartY,
                                                    c1x: absX, c1y: absY, c2x: absX, c2y: absY, endX: absX, endY: absY,
                                                    activePoint: pointType === 0 ? 'c1' : (pointType === 1 ? 'c2' : 'end')
                                                }
                                            };
                                            break;
                                        }

                                        if (pointType === 2) {
                                            currentStartX = absX;
                                            currentStartY = absY;
                                        }
                                        pairIndex++;
                                    }
                                    if (foundSub) return foundSub;
                                }

                                let ret = {
                                    start: valStart + cMatch.index,
                                    end: valStart + cMatch.index + chunk.length,
                                    cx: endX,
                                    cy: endY
                                };
                                
                                // Extra visual feedback for Bezier Curves
                                if (upper === 'Q') {
                                    ret.qData = {
                                        startX: qStartX,
                                        startY: qStartY,
                                        c1x: isRel ? qStartX + nums[0] : nums[0],
                                        c1y: isRel ? qStartY + nums[1] : nums[1],
                                        endX: isRel ? qStartX + nums[2] : nums[2],
                                        endY: isRel ? qStartY + nums[3] : nums[3],
                                        activePoint: 'both'
                                    };
                                } else if (upper === 'C' && nums.length >= 6) {
                                    ret.cData = {
                                        startX: qStartX,
                                        startY: qStartY,
                                        c1x: isRel ? qStartX + nums[0] : nums[0],
                                        c1y: isRel ? qStartY + nums[1] : nums[1],
                                        c2x: isRel ? qStartX + nums[2] : nums[2],
                                        c2y: isRel ? qStartY + nums[3] : nums[3],
                                        endX: isRel ? qStartX + nums[4] : nums[4],
                                        endY: isRel ? qStartY + nums[5] : nums[5],
                                        activePoint: 'both'
                                    };
                                }
                                return ret;
                            }

                            currX = endX;
                            currY = endY;
                        }
                    }
                }
            }
            return null;
        }

        // --- Tools (Move, Insert, Delete) ---
        function moveShape(dx, dy) {
            if (!activeTagInfo) return;
            const code = textarea.value;
            let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
            const tagName = activeTagInfo.tagName.toLowerCase();
            const relPos = textarea.selectionStart - activeTagInfo.start;
            let pointMoved = false;

            // Util: Adjust standard attributes safely
            function adjustAttr(str, attr, delta) {
                const regex = new RegExp(`\\b${attr}=["']([^"']+)["']`, 'i');
                return str.replace(regex, (match, val) => {
                    let num = parseFloat(val);
                    return isNaN(num) ? match : `${attr}="${num + delta}"`;
                });
            }

            // Util: Adjust all points in a polygon/polyline
            function adjustPoints(str, deltaX, deltaY) {
                const regex = /\bpoints=["']([^"']+)["']/i;
                return str.replace(regex, (match, val) => {
                    const newVals = val.split(/[\s,]+/).map(Number);
                    let out = [];
                    for (let i = 0; i < newVals.length; i += 2) {
                        if (!isNaN(newVals[i]) && !isNaN(newVals[i+1])) {
                            out.push(`${newVals[i] + deltaX},${newVals[i+1] + deltaY}`);
                        }
                    }
                    return `points="${out.join(' ')}"`;
                });
            }

            // Util: Shift all coordinates in a full path d string
            function shiftPathD(dStr, deltaX, deltaY) {
                const commands = dStr.match(/[a-df-zA-DF-Z][^a-df-zA-DF-Z]*/g);
                if (!commands) return dStr;
                let firstCmd = true;
                const res = commands.map(cmdChunk => {
                    const letter = cmdChunk.trim()[0];
                    const nums = cmdChunk.substring(1).trim().split(/[\s,]+/).filter(n => n !== "").map(Number);
                    const upper = letter.toUpperCase();
                    const isRel = letter === letter.toLowerCase();

                    if (upper === 'Z') return cmdChunk;

                    if (isRel && !(firstCmd && letter === 'm')) {
                        firstCmd = false;
                        return cmdChunk; 
                    }

                    firstCmd = false;
                    let outNums = [];
                    if (upper === 'H') {
                        for(let n of nums) outNums.push(n + deltaX);
                    } else if (upper === 'V') {
                        for(let n of nums) outNums.push(n + deltaY);
                    } else if (upper === 'A') {
                        for (let i = 0; i < nums.length; i += 7) {
                            let part = `${nums[i]},${nums[i+1]} ${nums[i+2]} ${nums[i+3]} ${nums[i+4]}`;
                            if (i+5 < nums.length) part += ` ${nums[i+5] + deltaX},${nums[i+6] + deltaY}`;
                            outNums.push(part);
                        }
                    } else {
                        for (let i = 0; i < nums.length; i += 2) {
                            if (i+1 < nums.length) outNums.push(`${nums[i] + deltaX},${nums[i+1] + deltaY}`);
                            else outNums.push(nums[i] + deltaX);
                        }
                    }
                    return letter + ' ' + outNums.join(' ');
                });
                return res.join(' ');
            }

            // Util: Shift a specific command block directly mapped by point move
            function shiftSinglePathCommand(cmdChunk, deltaX, deltaY) {
                const letter = cmdChunk.trim()[0];
                const nums = cmdChunk.substring(1).trim().split(/[\s,]+/).filter(n => n !== "").map(Number);
                const upper = letter.toUpperCase();

                if (upper === 'Z') return cmdChunk;

                // Preserve trailing whitespace
                const trailingMatch = cmdChunk.match(/[\s,]*$/);
                const trailingStr = trailingMatch ? trailingMatch[0] : '';

                let outNums = [];
                // Apply the delta to all relevant coordinates. For relative coordinates, 
                // pushing the instruction by dx/dy will also literally push the resulting point by dx/dy!
                if (upper === 'H') {
                    for(let n of nums) outNums.push(n + deltaX);
                } else if (upper === 'V') {
                    for(let n of nums) outNums.push(n + deltaY);
                } else if (upper === 'A') {
                    for (let i = 0; i < nums.length; i += 7) {
                        let part = `${nums[i]},${nums[i+1]} ${nums[i+2]} ${nums[i+3]} ${nums[i+4]}`;
                        if (i+5 < nums.length) part += ` ${nums[i+5] + deltaX},${nums[i+6] + deltaY}`;
                        outNums.push(part);
                    }
                } else {
                    for (let i = 0; i < nums.length; i += 2) {
                        if (i+1 < nums.length) outNums.push(`${nums[i] + deltaX},${nums[i+1] + deltaY}`);
                        else outNums.push(nums[i] + deltaX);
                    }
                }
                
                return letter + (outNums.length ? ' ' : '') + outNums.join(' ') + trailingStr;
            }

            // --- 1. Point Move Logic (Context-Aware based on cursor) ---
            
            // A. Check inside points="..." for polygon and polyline
            if (['polygon', 'polyline'].includes(tagName)) {
                const pointsMatch = tagStr.match(/\bpoints=["']([^"']+)["']/i);
                if (pointsMatch) {
                    const valStart = pointsMatch.index + pointsMatch[0].indexOf(pointsMatch[1]);
                    const valEnd = valStart + pointsMatch[1].length;
                    
                    if (relPos >= valStart && relPos <= valEnd) {
                        const localRelPos = relPos - valStart;
                        const pairRegex = /(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/g;
                        let pMatch;
                        let newVal = pointsMatch[1];
                        
                        while ((pMatch = pairRegex.exec(pointsMatch[1])) !== null) {
                            if (localRelPos >= pMatch.index - 1 && localRelPos <= pMatch.index + pMatch[0].length + 1) {
                                const nx = parseFloat(pMatch[1]) + dx;
                                const ny = parseFloat(pMatch[2]) + dy;
                                const shiftedPair = `${nx},${ny}`;
                                newVal = newVal.substring(0, pMatch.index) + shiftedPair + newVal.substring(pMatch.index + pMatch[0].length);
                                pointMoved = true;
                                break;
                            }
                        }
                        if (pointMoved) {
                            tagStr = tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd);
                        }
                    }
                }
            }

            // B. Check inside d="..." for path commands
            if (!pointMoved && tagName === 'path') {
                const dMatch = tagStr.match(/\bd=["']([^"']+)["']/i);
                if (dMatch) {
                    const valStart = dMatch.index + dMatch[0].indexOf(dMatch[1]);
                    const valEnd = valStart + dMatch[1].length;
                    
                    if (relPos >= valStart && relPos <= valEnd) {
                        const localRelPos = relPos - valStart;
                        const cmdRegex = /([a-df-zA-DF-Z][^a-df-zA-DF-Z]*)/g;
                        let cMatch;
                        let newVal = dMatch[1];
                        
                        while ((cMatch = cmdRegex.exec(dMatch[1])) !== null) {
                            if (localRelPos >= cMatch.index - 1 && localRelPos <= cMatch.index + cMatch[0].length + 1) {
                                const chunk = cMatch[0];
                                const letter = chunk.trim()[0];
                                const upper = letter.toUpperCase();

                                if (upper === 'Q' || upper === 'C') {
                                    const pairRegex = /(-?\d+(?:\.\d+)?)[,\s]+(-?\d+(?:\.\d+)?)/g;
                                    let pMatch;
                                    let modifiedChunk = chunk;
                                    let pairMoved = false;

                                    while ((pMatch = pairRegex.exec(chunk)) !== null) {
                                        if (localRelPos >= cMatch.index + pMatch.index - 1 && localRelPos <= cMatch.index + pMatch.index + pMatch[0].length + 1) {
                                            const nx = parseFloat(pMatch[1]) + dx;
                                            const ny = parseFloat(pMatch[2]) + dy;
                                            const shiftedPair = `${nx},${ny}`;
                                            modifiedChunk = modifiedChunk.substring(0, pMatch.index) + shiftedPair + modifiedChunk.substring(pMatch.index + pMatch[0].length);
                                            pairMoved = true;
                                            break;
                                        }
                                    }

                                    if (pairMoved) {
                                        newVal = newVal.substring(0, cMatch.index) + modifiedChunk + newVal.substring(cMatch.index + cMatch[0].length);
                                        pointMoved = true;
                                        break;
                                    }
                                }

                                if (!pointMoved) {
                                    const shiftedCmd = shiftSinglePathCommand(cMatch[0], dx, dy);
                                    newVal = newVal.substring(0, cMatch.index) + shiftedCmd + newVal.substring(cMatch.index + cMatch[0].length);
                                    pointMoved = true;
                                    break;
                                }
                            }
                        }
                        if (pointMoved) {
                            tagStr = tagStr.substring(0, valStart) + newVal + tagStr.substring(valEnd);
                        }
                    }
                }
            }

            const checkAndAdjustNearAttr = (attrList, xDelta, yDelta, postFixFn = null) => {
                for (let attr of attrList) {
                    const match = tagStr.match(new RegExp(`\\b${attr}=["'][^"']*["']`, 'i'));
                    if (match && relPos >= match.index && relPos <= match.index + match[0].length) {
                        if (xDelta !== 0) tagStr = adjustAttr(tagStr, attrList[0], xDelta);
                        if (yDelta !== 0 && attrList.length > 1) tagStr = adjustAttr(tagStr, attrList[1], yDelta);
                        if (postFixFn) tagStr = postFixFn(tagStr);
                        return true;
                    }
                }
                return false;
            };

            // C. Check near x1/y1 vs x2/y2 for lines
            if (!pointMoved && tagName === 'line') {
                pointMoved = checkAndAdjustNearAttr(['x1', 'y1'], dx, dy) || checkAndAdjustNearAttr(['x2', 'y2'], dx, dy);
            }

            // D. Check near cx/cy or r for circles
            if (!pointMoved && tagName === 'circle') {
                pointMoved = checkAndAdjustNearAttr(['cx', 'cy'], dx, dy);
                if (!pointMoved) {
                    pointMoved = checkAndAdjustNearAttr(['r'], dx - dy, 0, (str) => {
                        return str.replace(/\br=["']([^"']+)["']/i, (m, v) => `r="${Math.max(0, parseFloat(v))}"`);
                    });
                }
            }

            // E. Check near width/height/x/y/rx/ry for rect
            if (!pointMoved && tagName === 'rect') {
                pointMoved = checkAndAdjustNearAttr(['x', 'y'], dx, dy);
                if (!pointMoved) {
                    pointMoved = checkAndAdjustNearAttr(['width'], dx - dy, 0, (str) => {
                        return str.replace(/\bwidth=["']([^"']+)["']/i, (m, v) => `width="${Math.max(0, parseFloat(v))}"`);
                    });
                }
                if (!pointMoved) {
                    pointMoved = checkAndAdjustNearAttr(['height'], dx - dy, 0, (str) => {
                        return str.replace(/\bheight=["']([^"']+)["']/i, (m, v) => `height="${Math.max(0, parseFloat(v))}"`);
                    });
                }
                if (!pointMoved) {
                    pointMoved = checkAndAdjustNearAttr(['rx'], dx - dy, 0, (str) => {
                        return str.replace(/\brx=["']([^"']+)["']/i, (m, v) => `rx="${Math.max(0, parseFloat(v))}"`);
                    });
                }
                if (!pointMoved) {
                    pointMoved = checkAndAdjustNearAttr(['ry'], dx - dy, 0, (str) => {
                        return str.replace(/\bry=["']([^"']+)["']/i, (m, v) => `ry="${Math.max(0, parseFloat(v))}"`);
                    });
                }
            }

            // F. Check near x/y for text
            if (!pointMoved && tagName === 'text') {
                pointMoved = checkAndAdjustNearAttr(['x', 'y'], dx, dy);
            }

            // G. Universal check for stroke-width
            if (!pointMoved) {
                // For stroke-width step 0.1, we bypass checkAndAdjustNearAttr's default logic by passing the calculated step inside xDelta
                pointMoved = checkAndAdjustNearAttr(['stroke-width'], (dx - dy) * 0.1, 0, (str) => {
                    return str.replace(/\bstroke-width=["']([^"']+)["']/i, (m, v) => {
                        let currentVal = parseFloat(v);
                        if (isNaN(currentVal)) currentVal = 1;
                        // Avoid float rounding errors
                        return `stroke-width="${Math.max(0, currentVal).toFixed(1).replace(/\.0$/, '')}"`;
                    });
                });
            }

            // --- 2. Element Move Logic (Fallback if cursor is not on a specific point) ---
            if (!pointMoved) {
                if (tagName === 'circle' || tagName === 'ellipse') {
                    tagStr = adjustAttr(tagStr, 'cx', dx);
                    tagStr = adjustAttr(tagStr, 'cy', dy);
                } else if (['rect', 'image', 'use', 'text'].includes(tagName)) {
                    tagStr = adjustAttr(tagStr, 'x', dx);
                    tagStr = adjustAttr(tagStr, 'y', dy);
                } else if (tagName === 'line') {
                    tagStr = adjustAttr(tagStr, 'x1', dx);
                    tagStr = adjustAttr(tagStr, 'x2', dx);
                    tagStr = adjustAttr(tagStr, 'y1', dy);
                    tagStr = adjustAttr(tagStr, 'y2', dy);
                } else if (tagName === 'polygon' || tagName === 'polyline') {
                    tagStr = adjustPoints(tagStr, dx, dy);
                } else if (tagName === 'path') {
                    tagStr = tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => `d="${shiftPathD(val, dx, dy)}"`);
                } else {
                    return; 
                }
            }

            const newCode = code.substring(0, activeTagInfo.start) + tagStr + code.substring(activeTagInfo.tagEnd);
            
            // Adjust cursor gracefully if element expanded/shrunk
            const offset = tagStr.length - (activeTagInfo.tagEnd - activeTagInfo.start);
            let newCursor = textarea.selectionStart;
            if (newCursor > activeTagInfo.start) {
                newCursor += offset;
            }

            updateCode(newCode, true);
            textarea.focus();
            textarea.setSelectionRange(newCursor, newCursor);
            
            // Re-trigger selection using RAF for smoothness
            if (selectionRafId) cancelAnimationFrame(selectionRafId);
            selectionRafId = requestAnimationFrame(updateSelection);
        }

        function rotateShape(angle) {
            if (!activeTagInfo) return;
            const code = textarea.value;
            const liveElements = Array.from(userSvgContainer.querySelectorAll('*')).filter(node => node.nodeType === 1);
            const activeNode = liveElements[activeTagInfo.domIndex];
            
            if (!activeNode) return;

            let bbox;
            try {
                bbox = activeNode.getBBox();
                if (bbox.width === 0 && bbox.height === 0 && bbox.x === 0 && bbox.y === 0) return;
            } catch (e) {
                return;
            }

            const cx = bbox.x + bbox.width / 2;
            const cy = bbox.y + bbox.height / 2;
            const f = n => parseFloat(n.toFixed(3));

            let tagStr = code.substring(activeTagInfo.start, activeTagInfo.tagEnd);
            const tagName = activeTagInfo.tagName.toLowerCase();

            const rotPoint = (px, py) => {
                if (angle === 90) return [cx - (py - cy), cy + (px - cx)];
                if (angle === -90) return [cx + (py - cy), cy - (px - cx)];
                if (angle === 180) return [cx - (px - cx), cy - (py - cy)];
                return [px, py];
            };

            function setOrReplace(str, attr, val) {
                const regex = new RegExp(`\\b${attr}=["'][^"']*["']`, 'i');
                if (regex.test(str)) {
                    return str.replace(regex, `${attr}="${val}"`);
                } else {
                    return str.replace(/(<[a-zA-Z0-9:-]+)/, `$1 ${attr}="${val}"`);
                }
            }

            let modified = false;

            if (tagName === 'line') {
                let x1 = parseFloat(activeNode.getAttribute('x1') || 0);
                let y1 = parseFloat(activeNode.getAttribute('y1') || 0);
                let x2 = parseFloat(activeNode.getAttribute('x2') || 0);
                let y2 = parseFloat(activeNode.getAttribute('y2') || 0);
                
                let [nx1, ny1] = rotPoint(x1, y1);
                let [nx2, ny2] = rotPoint(x2, y2);
                
                tagStr = setOrReplace(tagStr, 'x1', f(nx1));
                tagStr = setOrReplace(tagStr, 'y1', f(ny1));
                tagStr = setOrReplace(tagStr, 'x2', f(nx2));
                tagStr = setOrReplace(tagStr, 'y2', f(ny2));
                modified = true;
            } else if (tagName === 'rect') {
                let x = parseFloat(activeNode.getAttribute('x') || 0);
                let y = parseFloat(activeNode.getAttribute('y') || 0);
                let w = parseFloat(activeNode.getAttribute('width') || 0);
                let h = parseFloat(activeNode.getAttribute('height') || 0);

                if (Math.abs(angle) === 90) {
                    let nw = h, nh = w;
                    let nx = cx - nw / 2;
                    let ny = cy - nh / 2;
                    tagStr = setOrReplace(tagStr, 'x', f(nx));
                    tagStr = setOrReplace(tagStr, 'y', f(ny));
                    tagStr = setOrReplace(tagStr, 'width', f(nw));
                    tagStr = setOrReplace(tagStr, 'height', f(nh));
                }
                modified = true;
            } else if (tagName === 'ellipse' && Math.abs(angle) === 90) {
                let rxMatch = tagStr.match(/\brx=["']([^"']+)["']/i);
                let ryMatch = tagStr.match(/\bry=["']([^"']+)["']/i);
                if (rxMatch && ryMatch) {
                    let rx = rxMatch[1], ry = ryMatch[1];
                    tagStr = tagStr.replace(/\brx=["'][^"']+["']/i, `rx="${ry}"`);
                    tagStr = tagStr.replace(/\bry=["'][^"']+["']/i, `ry="${rx}"`);
                }
                modified = true;
            } else if (tagName === 'polygon' || tagName === 'polyline') {
                tagStr = tagStr.replace(/\bpoints=["']([^"']+)["']/i, (match, val) => {
                    const newVals = val.trim().split(/[\s,]+/).filter(n => n !== "").map(Number);
                    let out = [];
                    for (let i = 0; i < newVals.length; i += 2) {
                        if (!isNaN(newVals[i]) && !isNaN(newVals[i+1])) {
                            let [nx, ny] = rotPoint(newVals[i], newVals[i+1]);
                            out.push(`${f(nx)},${f(ny)}`);
                        }
                    }
                    return `points="${out.join(' ')}"`;
                });
                modified = true;
            } else if (tagName === 'path') {
                tagStr = tagStr.replace(/\bd=["']([^"']+)["']/i, (match, val) => {
                    const commands = val.match(/[a-df-zA-Z][^a-df-zA-Z]*/g);
                    if (!commands) return match;

                    let currX = 0, currY = 0;
                    let startX = 0, startY = 0;

                    const processCommand = (cmdChunk) => {
                        const letter = cmdChunk.trim()[0];
                        const nums = cmdChunk.substring(1).trim().split(/[\s,]+/).filter(n => n !== "").map(Number);
                        const upper = letter.toUpperCase();
                        const isRel = letter === letter.toLowerCase();

                        if (upper === 'Z') {
                            currX = startX;
                            currY = startY;
                            return 'Z';
                        }

                        let out = [];

                        if (upper === 'H') {
                            for (let n of nums) {
                                currX = isRel ? currX + n : n;
                                let [rx, ry] = rotPoint(currX, currY);
                                out.push(`L ${f(rx)},${f(ry)}`);
                            }
                        } else if (upper === 'V') {
                            for (let n of nums) {
                                currY = isRel ? currY + n : n;
                                let [rx, ry] = rotPoint(currX, currY);
                                out.push(`L ${f(rx)},${f(ry)}`);
                            }
                        } else if (upper === 'M' || upper === 'L' || upper === 'T') {
                            for (let i = 0; i < nums.length; i += 2) {
                                currX = isRel ? currX + nums[i] : nums[i];
                                currY = isRel ? currY + nums[i+1] : nums[i+1];
                                if (upper === 'M' && i === 0) {
                                    startX = currX;
                                    startY = currY;
                                }
                                let [rx, ry] = rotPoint(currX, currY);
                                out.push(`${(upper === 'M' && i === 0) ? 'M' : (upper === 'M' ? 'L' : upper)} ${f(rx)},${f(ry)}`);
                            }
                        } else if (upper === 'Q' || upper === 'S') {
                            for (let i = 0; i < nums.length; i += 4) {
                                let c1x = isRel ? currX + nums[i] : nums[i];
                                let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                let endX = isRel ? currX + nums[i+2] : nums[i+2];
                                let endY = isRel ? currY + nums[i+3] : nums[i+3];
                                
                                let [rc1x, rc1y] = rotPoint(c1x, c1y);
                                let [rendX, rendY] = rotPoint(endX, endY);
                                
                                out.push(`${upper} ${f(rc1x)},${f(rc1y)} ${f(rendX)},${f(rendY)}`);
                                currX = endX;
                                currY = endY;
                            }
                        } else if (upper === 'C') {
                            for (let i = 0; i < nums.length; i += 6) {
                                let c1x = isRel ? currX + nums[i] : nums[i];
                                let c1y = isRel ? currY + nums[i+1] : nums[i+1];
                                let c2x = isRel ? currX + nums[i+2] : nums[i+2];
                                let c2y = isRel ? currY + nums[i+3] : nums[i+3];
                                let endX = isRel ? currX + nums[i+4] : nums[i+4];
                                let endY = isRel ? currY + nums[i+5] : nums[i+5];
                                
                                let [rc1x, rc1y] = rotPoint(c1x, c1y);
                                let [rc2x, rc2y] = rotPoint(c2x, c2y);
                                let [rendX, rendY] = rotPoint(endX, endY);
                                
                                out.push(`C ${f(rc1x)},${f(rc1y)} ${f(rc2x)},${f(rc2y)} ${f(rendX)},${f(rendY)}`);
                                currX = endX;
                                currY = endY;
                            }
                        } else if (upper === 'A') {
                            for (let i = 0; i < nums.length; i += 7) {
                                let rx_val = nums[i];
                                let ry_val = nums[i+1];
                                let xRot = nums[i+2];
                                let largeArc = nums[i+3];
