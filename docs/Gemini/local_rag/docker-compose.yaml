version: '3.8'

services:
  # Vector Database: Optimized for CPU and strictly bounded in memory
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: qdrant
    ports:
      - "6333:6333" # HTTP REST API
    volumes:
      - ./qdrant_storage:/qdrant/storage 
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
    restart: unless-stopped

  # Local LLM and Embedding Service
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ~/.ollama:/root/.ollama 
    deploy:
      resources:
        limits:
          cpus: '4'
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c 'echo > /dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # One-time automated setup sidecar
  model-puller:
    image: curlimages/curl:latest
    container_name: model-puller
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "
      echo 'Pulling embedding model (all-minilm)...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"all-minilm\"}' &&
      echo 'Embedding model cached!';
      echo 'Pulling Small Language Model (qwen2.5:0.5b)...';
      curl -s -X POST http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:0.5b\"}' &&
      echo 'Pulling embedding model (paraphrase-multilingual)...';
      curl -s -X POST http://ollama:11434/api/pull -d '{"name": "paraphrase-multilingual"}' &&
      echo 'All models cached locally on disk!'
      "
    restart: "no"

  # Custom python RAG Application
  rag-app:
    build: ./app 
    container_name: rag-app
    depends_on:
      qdrant:
        condition: service_started
      model-puller:
        condition: service_completed_successfully # Waits for model downloads to finish
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data 
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      # Provide internal docker hostnames to the app
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=qdrant
      - QDRANT_PORT=6333
#      - ENABLE_HTTP_LOGS=true  # <--- Add this to see HTTP logs again        
    restart: unless-stopped
