<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <style>
        /* Minimal styling – no headers, no extra UI, just markdown content */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #111;
            padding: 2rem 1rem;
        }

        /* Markdown content container – clean, readable, no chrome */
        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Standard markdown styling (GitHub-like) */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 2rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25rem; }
        .markdown-body p, .markdown-body ul, .markdown-body ol {
            margin-bottom: 1rem;
        }
        .markdown-body code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #f6f8fa;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-size: 0.85em;
            color: #e36209;
        }
        .markdown-body pre {
            background: #f6f8fa;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            margin: 1rem 0;
            padding-left: 1rem;
            color: #6a737d;
        }
        .markdown-body a {
            color: #0366d6;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .markdown-body img {
            max-width: 100%;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #dfe2e5;
            padding: 0.5rem;
        }
        .markdown-body th {
            background: #f6f8fa;
        }

        /* Loading / error states – minimal, just text */
        .loader, .error {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 1rem;
        }
        .error {
            color: #d73a49;
            background: #ffeef0;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="content" class="markdown-body">
        <div class="loader">Loading markdown...</div>
    </div>

    <script>
        // ------------------------------------------------------------------
        // Hardcoded default markdown file (used if no URL parameter provided)
        // ------------------------------------------------------------------
        const DEFAULT_MARKDOWN_URL = 'Prompts_collection/favicon.ico_for_provided_code_prompt.md';
        
        // Marked.js library sources (CDN + local fallback)
        const CDN_URL = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
        const LOCAL_FALLBACK = 'marked.min.js';   // local file (must exist for fallback)

        // ------------------------------------------------------------------
        // Get markdown URL from query parameter
        // Supports: ?md=url, ?file=url, ?markdown=url
        // Also supports simple ?file.md (if the whole query string is a filename without '=')
        // but that's ambiguous; we'll handle common patterns.
        // ------------------------------------------------------------------
        function getMarkdownUrlFromParams() {
            const params = new URLSearchParams(window.location.search);
            // Standard parameter names
            let url = params.get('md') || params.get('file') || params.get('markdown') || params.get('src');
            if (url) return url;
            
            // Special case: if query string is exactly something like "?example.md" (no '=')
            // then the entire query string (without '?') is treated as the filename.
            // Example: ?README.md
            const rawQuery = window.location.search.slice(1); // remove leading '?'
            if (rawQuery && !rawQuery.includes('=') && rawQuery.trim().length > 0) {
                // assume it's a relative or absolute path
                return rawQuery;
            }
            
            return null;
        }

        // Determine final markdown URL: use parameter if provided, else default
        const MARKDOWN_URL = getMarkdownUrlFromParams() || DEFAULT_MARKDOWN_URL;

        // ------------------------------------------------------------------
        // Helper: load external script dynamically with timeout
        // ------------------------------------------------------------------
        function loadScript(src, timeout = 8000) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                let resolved = false;
                const timer = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        reject(new Error(`Timeout loading ${src}`));
                    }
                }, timeout);
                script.onload = () => {
                    if (resolved) return;
                    clearTimeout(timer);
                    resolved = true;
                    resolve();
                };
                script.onerror = () => {
                    if (resolved) return;
                    clearTimeout(timer);
                    resolved = true;
                    reject(new Error(`Failed to load ${src}`));
                };
                document.head.appendChild(script);
            });
        }

        // ------------------------------------------------------------------
        // Load marked.js with CDN → local fallback
        // ------------------------------------------------------------------
        async function loadMarked() {
            if (window.marked && typeof window.marked.parse === 'function') {
                return window.marked;
            }
            // Try CDN first
            try {
                await loadScript(CDN_URL);
                if (window.marked && typeof window.marked.parse === 'function') {
                    console.log('Marked loaded from CDN');
                    return window.marked;
                }
                throw new Error('Marked not available after CDN load');
            } catch (cdnErr) {
                console.warn('CDN failed, trying local fallback', cdnErr);
                try {
                    await loadScript(LOCAL_FALLBACK);
                    if (window.marked && typeof window.marked.parse === 'function') {
                        console.log('Marked loaded from local fallback');
                        return window.marked;
                    }
                    throw new Error('Marked not available after local fallback');
                } catch (localErr) {
                    throw new Error(`Failed to load marked.js: ${localErr.message}`);
                }
            }
        }

        // ------------------------------------------------------------------
        // Fetch markdown content from given URL
        // ------------------------------------------------------------------
        async function fetchMarkdown(url) {
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            return await response.text();
        }

        // ------------------------------------------------------------------
        // Render markdown string into container using marked
        // ------------------------------------------------------------------
        async function renderMarkdown(markdownText, markedLib, container) {
            // Configure for GitHub Flavored Markdown
            markedLib.setOptions({
                gfm: true,
                breaks: true,
                headerIds: true,
                mangle: false
            });
            const html = await markedLib.parse(markdownText);
            container.innerHTML = html;
        }

        // ------------------------------------------------------------------
        // Main application entry point
        // ------------------------------------------------------------------
        async function init() {
            const container = document.getElementById('content');
            try {
                // 1. Load marked library (with fallback)
                const markedLib = await loadMarked();
                
                // 2. Fetch markdown from the determined URL
                const markdownText = await fetchMarkdown(MARKDOWN_URL);
                
                // 3. Render to the page
                await renderMarkdown(markdownText, markedLib, container);
            } catch (error) {
                console.error('Rendering failed:', error);
                container.innerHTML = `<div class="error">❌ Error: ${escapeHtml(error.message)}</div>`;
            }
        }

        // Simple escape for error messages
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
