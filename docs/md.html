<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown/Code Viewer · KaTeX + marked‑katex‑extension (fixed)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fafafa; padding: 2rem 1rem; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        .markdown-body { max-width: 900px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .loader, .error { text-align: center; padding: 3rem 1rem; }
        .error { color: #d73a49; background: #ffeef0; border-radius: 6px; white-space: pre-wrap; }
        .warning-banner { background: #fff5b0; border-left: 4px solid #f5a623; padding: 0.6rem 1rem; margin-bottom: 1rem; border-radius: 6px; color: #5c3c00; font-size: 0.85rem; }
        .footer-version { margin-top: 2rem; text-align: center; font-size: 0.75rem; color: #6a737d; border-top: 1px solid #eaecef; padding-top: 1rem; }
        .math-status { display: inline-block; margin-left: 1rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        .math-status.ok { background: #d4edda; color: #155724; }
        .math-status.fail { background: #f8d7da; color: #721c24; }
        .raw-link-container { text-align: center; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #eaecef; }
        .raw-link-container a { color: #0969da; text-decoration: none; background: #f6f8fa; padding: 0.4rem 0.8rem; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; }
        .source-mode-note { background: #f1f8ff; border-left: 4px solid #0366d6; padding: 0.6rem 1rem; margin-bottom: 1.2rem; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
<div id="content" class="markdown-body"><div class="loader">Loading viewer…</div></div>

<script>
    // ---------- CONFIGURATION (local-first) ----------
    const DEFAULT_MARKDOWN_URL = 'https://mvbasov.github.io/MyNeuroSlop/DeepSeek/Markdown_visualizer/docs/markdown_example.md';
    const PAGE_VERSION = '3.2.0 (fixed extension integration)';

    // Marked.js
    const MARKED_LOCAL = 'fallback_js/marked.min.js';
    const MARKED_CDN = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';

    // marked-katex-extension (v5.1.10)
    const MKATEX_LOCAL = 'fallback_js/marked-katex-extension.min.js';
    const MKATEX_CDN = 'https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.10/lib/index.umd.js';

    // KaTeX (core + CSS)
    const KATEX_CSS_LOCAL = 'fallback_js/katex.min.css';
    const KATEX_CSS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css';
    const KATEX_JS_LOCAL = 'fallback_js/katex.min.js';
    const KATEX_JS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js';

    // GitHub Markdown CSS
    const MD_CSS_LOCAL = 'fallback_js/github-markdown.min.css';
    const MD_CSS_CDN = 'https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css';

    // Highlight.js (source mode)
    const HLJS_CSS_LOCAL = 'fallback_js/github-dark.min.css';
    const HLJS_CSS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    const HLJS_JS_LOCAL = 'fallback_js/highlight.min.js';
    const HLJS_JS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js';

    // Helper: load CSS
    function loadCSS(primary, fallback) {
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = primary;
            link.onload = () => resolve();
            link.onerror = () => {
                if (fallback && fallback !== primary) {
                    console.warn(`CSS local fail: ${primary}, trying ${fallback}`);
                    loadCSS(fallback).then(resolve).catch(reject);
                } else reject(new Error(`CSS failed: ${primary}`));
            };
            document.head.appendChild(link);
        });
    }

    // Helper: load script (returns promise when script is loaded and executed)
    function loadScript(primary, fallback) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = primary;
            script.async = true;
            script.onload = () => resolve();
            script.onerror = () => {
                if (fallback && fallback !== primary) {
                    console.warn(`Script local fail: ${primary}, trying ${fallback}`);
                    loadScript(fallback).then(resolve).catch(reject);
                } else reject(new Error(`Script failed: ${primary}`));
            };
            document.head.appendChild(script);
        });
    }

    // Load all dependencies in the correct order (like the minimal test)
    async function loadDependencies() {
        // 1. KaTeX CSS + JS (must be loaded before marked-katex-extension)
        await loadCSS(KATEX_CSS_LOCAL, KATEX_CSS_CDN);
        await loadScript(KATEX_JS_LOCAL, KATEX_JS_CDN);
        if (typeof katex === 'undefined') throw new Error('KaTeX core not loaded');

        // 2. Markdown CSS (optional)
        await loadCSS(MD_CSS_LOCAL, MD_CSS_CDN).catch(() => {});

        // 3. Marked.js
        await loadScript(MARKED_LOCAL, MARKED_CDN);
        if (!window.marked?.parse) throw new Error('Marked not loaded');

        // 4. marked-katex-extension (must come after both KaTeX and marked)
        await loadScript(MKATEX_LOCAL, MKATEX_CDN);
        if (typeof window.markedKatex !== 'function') throw new Error('marked-katex-extension not loaded');

        // Apply the extension globally to the marked instance
        window.marked.use(window.markedKatex({
            throwOnError: false,
            errorColor: '#cc0000',
            delimiters: [
                { left: '$$', right: '$$', display: true },
                { left: '$', right: '$', display: false },
                { left: '\\[', right: '\\]', display: true },
                { left: '\\(', right: '\\)', display: false }
            ]
        }));
        window.marked.setOptions({ gfm: true, breaks: true });

        return true;
    }

    async function loadHighlightJS() {
        if (typeof hljs !== 'undefined') return true;
        await loadCSS(HLJS_CSS_LOCAL, HLJS_CSS_CDN);
        await loadScript(HLJS_JS_LOCAL, HLJS_JS_CDN);
        return typeof hljs !== 'undefined';
    }

    // URL helpers
    function getMarkdownUrl() {
        const s = window.location.search;
        if (!s) return DEFAULT_MARKDOWN_URL;
        const params = new URLSearchParams(s);
        let url = params.get('md') || params.get('file') || params.get('src');
        if (url) return url;
        if (!s.includes('=')) return decodeURIComponent(s.slice(1));
        return DEFAULT_MARKDOWN_URL;
    }
    const rawUrl = getMarkdownUrl();
    const sourceMode = new URLSearchParams(location.search).has('source') || (() => {
        try {
            const ext = new URL(rawUrl, location.href).pathname.split('.').pop()?.toLowerCase();
            return ext && !['md','markdown','mdown','mkd'].includes(ext);
        } catch { return false; }
    })();

    async function fetchContent(url) {
        const resp = await fetch(new URL(url, location.href).href);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const txt = await resp.text();
        if (!txt.length) throw new Error('Empty file');
        return txt;
    }

    function renderSource(raw, container, ext) {
        const lines = raw.split(/\r?\n/).filter(l => l.trim());
        const code = lines.join('\n').replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
        const langMap = {js:'javascript',py:'python',sh:'bash',cpp:'cpp',java:'java',html:'html',css:'css',json:'json'};
        const lang = langMap[ext] || ext;
        container.innerHTML = `<pre><code class="language-${lang}">${code}</code></pre>`;
        if (typeof hljs !== 'undefined') hljs.highlightElement(container.querySelector('code'));
    }

    // ---------- MAIN ----------
    (async () => {
        const container = document.getElementById('content');
        let mathAvailable = false;
        try {
            container.innerHTML = '<div class="loader">Loading dependencies (local-first, sequential)...</div>';
            await loadDependencies();
            mathAvailable = true;
            console.log('✓ All dependencies loaded and marked-katex-extension applied');

            let hljsOk = false;
            if (sourceMode) {
                container.innerHTML = '<div class="loader">Loading syntax highlighter...</div>';
                hljsOk = await loadHighlightJS().catch(()=>false);
            }

            container.innerHTML = '<div class="loader">Fetching file...</div>';
            const raw = await fetchContent(rawUrl);

            if (sourceMode) {
                renderSource(raw, container, new URL(rawUrl, location.href).pathname.split('.').pop());
                if (!hljsOk) {
                    const warn = document.createElement('div');
                    warn.className = 'warning-banner';
                    warn.innerText = '⚠️ Syntax highlighting unavailable – highlight.js missing.';
                    container.prepend(warn);
                }
            } else {
                // Markdown rendering – the extension is already applied to window.marked
                const html = await window.marked.parse(raw);
                container.innerHTML = html;
                console.log('✓ Markdown + KaTeX rendered');
            }

            const footer = document.createElement('div');
            footer.className = 'footer-version';
            const mathStatus = mathAvailable ? '✅ Math: KaTeX + marked‑katex‑extension' : '❌ Math: not available';
            footer.innerHTML = `Version ${PAGE_VERSION} <span class="math-status ${mathAvailable ? 'ok' : 'fail'}">${mathStatus}</span>`;
            container.appendChild(footer);

            const rawLink = document.createElement('div');
            rawLink.className = 'raw-link-container';
            rawLink.innerHTML = `<a href="${escapeHtml(rawUrl)}" target="_blank">📄 Download raw file</a>`;
            container.appendChild(rawLink);

        } catch (err) {
            console.error(err);
            let msg = err.message;
            if (location.protocol === 'file:' && msg.includes('fetch')) {
                msg = 'Local file access blocked. Start a web server: `python3 -m http.server 8000`';
            }
            container.innerHTML = `<div class="error">❌ ${escapeHtml(msg)}<br><br><a href="${escapeHtml(rawUrl)}" target="_blank">📄 View raw file</a></div>`;
        }
    })();

    function escapeHtml(s) { return s.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
</script>
</body>
</html>
