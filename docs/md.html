<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer with KaTeX · Source mode + Raw link</title>
    <!-- Minimal custom styles – only layout & non‑markdown elements -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fafafa;
            padding: 2rem 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .loader, .error {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 1rem;
        }
        .error {
            color: #d73a49;
            background: #ffeef0;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        .footer-version {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6a737d;
            border-top: 1px solid #eaecef;
            padding-top: 1rem;
        }
        .raw-link-container {
            text-align: center;
            margin-top: 1rem;
            padding-top: 0.75rem;
            font-size: 0.8rem;
            border-top: 1px solid #eaecef;
        }
        .raw-link-container a {
            color: #0969da;
            text-decoration: none;
            background: #f6f8fa;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .raw-link-container a:hover {
            background: #eef2f5;
            text-decoration: underline;
        }
        /* source mode badge */
        .source-mode-note {
            background: #f1f8ff;
            border-left: 4px solid #0366d6;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            border-radius: 6px;
            color: #1f2d3d;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        .source-mode-note::before {
            content: "📄";
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<div id="content" class="markdown-body">
    <div class="loader">Loading markdown and math engine…</div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. CONFIGURATION & VERSION
    // --------------------------------------------------------------
    const DEFAULT_MARKDOWN_URL = 'https://mvbasov.github.io/MyNeuroSlop/DeepSeek/Markdown_visualizer/markdown_example.md';
    const PAGE_VERSION = '1.5.1';   // ✨ Added persistent raw file download link at page end

    // Marked.js (CDN + local fallback inside fallback_js/)
    const MARKED_CDN = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    const MARKED_LOCAL = 'fallback_js/marked.min.js';

    // GitHub Markdown CSS (CDN + local fallback)
    const MD_CSS_CDN = 'https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css';
    const MD_CSS_LOCAL = 'fallback_js/github-markdown.min.css';

    // KaTeX resources (CSS + core + auto-render) with local fallbacks
    const KATEX_CSS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css';
    const KATEX_CSS_LOCAL = 'fallback_js/katex.min.css';
    const KATEX_JS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js';
    const KATEX_JS_LOCAL = 'fallback_js/katex.min.js';
    const KATEX_AUTO_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js';
    const KATEX_AUTO_LOCAL = 'fallback_js/auto-render.min.js';

    // --------------------------------------------------------------
    // 2. Helper: load CSS (returns promise)
    // --------------------------------------------------------------
    function loadCSS(href, fallbackHref = null) {
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.onload = () => resolve();
            link.onerror = () => {
                if (fallbackHref && fallbackHref !== href) {
                    console.warn(`CSS failed: ${href}, trying fallback: ${fallbackHref}`);
                    loadCSS(fallbackHref).then(resolve).catch(reject);
                } else {
                    reject(new Error(`Failed to load CSS: ${href}`));
                }
            };
            document.head.appendChild(link);
        });
    }

    // Helper: load script (returns promise)
    function loadScript(src, fallbackSrc = null) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.onload = () => resolve();
            script.onerror = () => {
                if (fallbackSrc && fallbackSrc !== src) {
                    console.warn(`Script failed: ${src}, trying fallback: ${fallbackSrc}`);
                    loadScript(fallbackSrc).then(resolve).catch(reject);
                } else {
                    reject(new Error(`Failed to load script: ${src}`));
                }
            };
            document.head.appendChild(script);
        });
    }

    // --------------------------------------------------------------
    // 3. Load Markdown CSS (with fallback)
    // --------------------------------------------------------------
    async function loadMarkdownCSS() {
        try {
            await loadCSS(MD_CSS_CDN, MD_CSS_LOCAL);
            console.log('✓ Markdown CSS loaded');
        } catch (e) {
            console.warn('Markdown CSS failed, using fallback styles', e);
        }
    }

    // --------------------------------------------------------------
    // 4. Load KaTeX fully (CSS + core + auto-render)
    // --------------------------------------------------------------
    async function loadKaTeX() {
        try {
            await loadCSS(KATEX_CSS_CDN, KATEX_CSS_LOCAL);
            console.log('✓ KaTeX CSS loaded');
        } catch (e) {
            console.warn('KaTeX CSS failed, math may look ugly', e);
        }

        try {
            await loadScript(KATEX_JS_CDN, KATEX_JS_LOCAL);
            console.log('✓ KaTeX core loaded');
        } catch (e) {
            throw new Error(`KaTeX core load failed: ${e.message}`);
        }

        try {
            await loadScript(KATEX_AUTO_CDN, KATEX_AUTO_LOCAL);
            console.log('✓ KaTeX auto-render loaded');
        } catch (e) {
            throw new Error(`KaTeX auto-render failed: ${e.message}`);
        }

        if (typeof window.renderMathInElement !== 'function') {
            throw new Error('renderMathInElement not available after loading auto-render');
        }
        return true;
    }

    // Load marked.js with fallback
    async function loadMarked() {
        if (window.marked && typeof window.marked.parse === 'function') return window.marked;
        try {
            await loadScript(MARKED_CDN, MARKED_LOCAL);
            if (window.marked && typeof window.marked.parse === 'function') return window.marked;
            throw new Error('Marked not available after load');
        } catch (e) {
            throw new Error(`Marked load failed: ${e.message}`);
        }
    }

    // --------------------------------------------------------------
    // 5. URL helpers: get markdown file, detect source mode
    // --------------------------------------------------------------
    function getMarkdownUrlFromQuery() {
        const search = window.location.search;
        if (!search || search === '?') return null;

        const params = new URLSearchParams(search);
        let named = params.get('md') || params.get('file') || params.get('markdown') || params.get('src');
        if (named && named.trim() !== '') return named.trim();

        if (!search.includes('=')) {
            return decodeURIComponent(search.slice(1));
        }
        return null;
    }

    function isSourceModeActive() {
        const search = window.location.search;
        if (!search) return false;
        const params = new URLSearchParams(search);
        return params.has('source');
    }

    const rawMarkdownUrl = getMarkdownUrlFromQuery() || DEFAULT_MARKDOWN_URL;
    const sourceMode = isSourceModeActive();

    if (sourceMode) {
        console.log('🔧 Source mode active: raw content displayed as code block (wrapped in ```)');
    }

    // --------------------------------------------------------------
    // 6. Fetch markdown content (raw text)
    // --------------------------------------------------------------
    async function fetchMarkdown(url) {
        let absoluteUrl;
        try {
            absoluteUrl = new URL(url, window.location.href).href;
        } catch (e) {
            throw new Error(`Invalid URL: ${url}`);
        }
        const response = await fetch(absoluteUrl);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} - ${response.statusText}\nURL: ${absoluteUrl}`);
        }
        const text = await response.text();
        if (text.length === 0) throw new Error('Markdown file is empty');
        return text;
    }

    // --------------------------------------------------------------
    // 7. Render markdown and then apply KaTeX math
    // --------------------------------------------------------------
    async function renderMarkdownWithMath(markdownText, markedLib, container) {
        markedLib.setOptions({ gfm: true, breaks: true, headerIds: true });
        const html = await markedLib.parse(markdownText);
        container.innerHTML = html;

        if (window.renderMathInElement) {
            try {
                window.renderMathInElement(container, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false,
                    errorColor: '#cc0000',
                });
                console.log('✓ KaTeX math rendered (ignores code blocks automatically)');
            } catch (mathErr) {
                console.warn('Math rendering error:', mathErr);
            }
        } else {
            console.warn('renderMathInElement not found; math remains unrendered');
            const warning = document.createElement('div');
            warning.className = 'error';
            warning.style.margin = '1rem 0';
            warning.style.padding = '0.5rem';
            warning.style.fontSize = '0.85rem';
            warning.innerText = '⚠️ KaTeX auto-render not available. Math expressions are shown as raw LaTeX.';
            container.prepend(warning);
        }
    }

    // --------------------------------------------------------------
    // 8. Append persistent raw file download link at the bottom
    // --------------------------------------------------------------
    function appendRawFileLink(container, rawUrl) {
        // Create a wrapper div for the raw link (below version footer)
        const rawDiv = document.createElement('div');
        rawDiv.className = 'raw-link-container';
        const link = document.createElement('a');
        link.href = rawUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerHTML = '📄 Download raw markdown file';
        // optional: add a small hint
        link.title = 'Open or save the original markdown source';
        rawDiv.appendChild(link);
        container.appendChild(rawDiv);
    }

    // --------------------------------------------------------------
    // 9. Main: load deps, fetch, render, then add raw link + version
    // --------------------------------------------------------------
    async function init() {
        const container = document.getElementById('content');
        try {
            container.innerHTML = '<div class="loader">Loading dependencies (CSS, marked.js, KaTeX)...</div>';

            const [markedLib, katexLoaded] = await Promise.all([
                loadMarked(),
                loadKaTeX().catch(e => {
                    console.error('KaTeX loading failed but continuing without math:', e);
                    return false;
                }),
                loadMarkdownCSS().catch(e => console.warn('Markdown CSS optional:', e))
            ]);

            if (!katexLoaded) {
                console.warn('KaTeX not fully available, math will be raw');
            }

            container.innerHTML = '<div class="loader">Fetching markdown content...</div>';
            let markdownText = await fetchMarkdown(rawMarkdownUrl);

            // ----- SOURCE MODE: wrap raw content in triple backticks -----
            if (sourceMode) {
                markdownText = '```\n' + markdownText + '\n```';
                console.log('📦 Source mode active: raw content inside code fence');
            }

            container.innerHTML = '';   // clear loader
            await renderMarkdownWithMath(markdownText, markedLib, container);

            // ----- Add source mode indicator (if active) -----
            if (sourceMode) {
                const sourceNote = document.createElement('div');
                sourceNote.className = 'source-mode-note';
                sourceNote.innerHTML = `<strong>Source view active</strong> — The raw file content is displayed as a code block (wrapped in \`\`\`). Markdown, math and HTML are shown literally.`;
                container.prepend(sourceNote);
            }

            // ----- Version footer -----
            const footer = document.createElement('div');
            footer.className = 'footer-version';
            footer.innerText = `Version ${PAGE_VERSION}${sourceMode ? ' · 🔍 Source mode' : ''}`;
            container.appendChild(footer);

            // ----- FALLBACK RAW LINK: always present at the end of page -----
            appendRawFileLink(container, rawMarkdownUrl);

        } catch (err) {
            console.error(err);
            let errorMessage = err.message;
            if (window.location.protocol === 'file:' && errorMessage.includes('fetch')) {
                errorMessage = `Cannot load local file via file:// protocol.\n\n` +
                    `Your browser blocked the request for security reasons.\n\n` +
                    `👉 To fix this, start a simple local web server in the folder containing this HTML file:\n\n` +
                    `   python3 -m http.server 8000\n\n` +
                    `Then open: http://localhost:8000/` + window.location.pathname.split('/').pop() +
                    `?${window.location.search.slice(1)}\n\n` +
                    `Original error: ${err.message}`;
            }

            // Show error + still provide raw link (if possible)
            const rawLink = `<a href="${escapeHtml(rawMarkdownUrl)}" target="_blank" rel="noopener noreferrer" style="background:#f6f8fa; padding:6px 12px; border-radius:20px; text-decoration:none; color:#0969da;">📄 Download raw markdown file</a>`;
            let sourceNoteFallback = '';
            if (sourceMode) {
                sourceNoteFallback = `<div style="background:#f0f4f9; border-left:3px solid #0969da; padding:8px 12px; margin-top:12px; border-radius:6px; font-size:0.85rem;">ℹ️ <strong>Source mode requested</strong> — Content would be shown as code block, but an error occurred.</div>`;
            }
            container.innerHTML = `<div class="error">❌ ${escapeHtml(errorMessage)}<br><br>${rawLink}${sourceNoteFallback}</div>`;
            // Even in error case, we also add a manual wrapper to ensure the link is visible if the error div is shown,
            // but the error div already contains the raw link. To be thorough we also append a consistent fallback but it's fine.
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
</script>
</body>
</html>
