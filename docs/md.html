<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown/Code Viewer · Syntax Highlighting + KaTeX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fafafa;
            padding: 2rem 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .loader, .error {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 1rem;
        }
        .error {
            color: #d73a49;
            background: #ffeef0;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        .footer-version {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6a737d;
            border-top: 1px solid #eaecef;
            padding-top: 1rem;
        }
        .raw-link-container {
            text-align: center;
            margin-top: 1rem;
            padding-top: 0.75rem;
            font-size: 0.8rem;
            border-top: 1px solid #eaecef;
        }
        .raw-link-container a {
            color: #0969da;
            text-decoration: none;
            background: #f6f8fa;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .raw-link-container a:hover {
            background: #eef2f5;
            text-decoration: underline;
        }
        .source-mode-note {
            background: #f1f8ff;
            border-left: 4px solid #0366d6;
            padding: 0.6rem 1rem;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
            border-radius: 6px;
            color: #1f2d3d;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        .source-mode-note::before {
            content: "📄";
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<div id="content" class="markdown-body">
    <div class="loader">Loading viewer engine…</div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. CONFIGURATION
    // --------------------------------------------------------------
    const DEFAULT_MARKDOWN_URL = 'https://mvbasov.github.io/MyNeuroSlop/DeepSeek/Markdown_visualizer/markdown_example.md';
    const PAGE_VERSION = '1.7.0';   // syntax highlighting for source mode (offline fallback)

    // Marked.js (CDN + local fallback)
    const MARKED_CDN = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
    const MARKED_LOCAL = 'fallback_js/marked.min.js';

    // GitHub Markdown CSS (CDN + local fallback)
    const MD_CSS_CDN = 'https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.0/github-markdown.min.css';
    const MD_CSS_LOCAL = 'fallback_js/github-markdown.min.css';

    // KaTeX resources
    const KATEX_CSS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css';
    const KATEX_CSS_LOCAL = 'fallback_js/katex.min.css';
    const KATEX_JS_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js';
    const KATEX_JS_LOCAL = 'fallback_js/katex.min.js';
    const KATEX_AUTO_CDN = 'https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js';
    const KATEX_AUTO_LOCAL = 'fallback_js/auto-render.min.js';

    // Highlight.js (for syntax highlighting in source mode) – local first, then CDN
    const HLJS_CSS_LOCAL = 'fallback_js/github-dark.min.css';
    const HLJS_CSS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
    const HLJS_JS_LOCAL = 'fallback_js/highlight.min.js';
    const HLJS_JS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js';

    // --------------------------------------------------------------
    // 2. Helper: load CSS (returns promise)
    // --------------------------------------------------------------
    function loadCSS(href, fallbackHref = null) {
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = href;
            link.onload = () => resolve();
            link.onerror = () => {
                if (fallbackHref && fallbackHref !== href) {
                    console.warn(`CSS failed: ${href}, trying fallback: ${fallbackHref}`);
                    loadCSS(fallbackHref).then(resolve).catch(reject);
                } else {
                    reject(new Error(`Failed to load CSS: ${href}`));
                }
            };
            document.head.appendChild(link);
        });
    }

    function loadScript(src, fallbackSrc = null) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            script.src = src;
            script.async = true;
            script.onload = () => resolve();
            script.onerror = () => {
                if (fallbackSrc && fallbackSrc !== src) {
                    console.warn(`Script failed: ${src}, trying fallback: ${fallbackSrc}`);
                    loadScript(fallbackSrc).then(resolve).catch(reject);
                } else {
                    reject(new Error(`Failed to load script: ${src}`));
                }
            };
            document.head.appendChild(script);
        });
    }

    async function loadMarkdownCSS() {
        try {
            await loadCSS(MD_CSS_CDN, MD_CSS_LOCAL);
            console.log('✓ Markdown CSS loaded');
        } catch (e) {
            console.warn('Markdown CSS failed', e);
        }
    }

    async function loadKaTeX() {
        try {
            await loadCSS(KATEX_CSS_CDN, KATEX_CSS_LOCAL);
            console.log('✓ KaTeX CSS loaded');
        } catch (e) {
            console.warn('KaTeX CSS failed', e);
        }
        try {
            await loadScript(KATEX_JS_CDN, KATEX_JS_LOCAL);
            console.log('✓ KaTeX core loaded');
        } catch (e) {
            throw new Error(`KaTeX core failed: ${e.message}`);
        }
        try {
            await loadScript(KATEX_AUTO_CDN, KATEX_AUTO_LOCAL);
            console.log('✓ KaTeX auto-render loaded');
        } catch (e) {
            throw new Error(`KaTeX auto-render failed: ${e.message}`);
        }
        if (typeof window.renderMathInElement !== 'function') {
            throw new Error('renderMathInElement missing');
        }
        return true;
    }

    async function loadMarked() {
        if (window.marked?.parse) return window.marked;
        try {
            await loadScript(MARKED_CDN, MARKED_LOCAL);
            if (window.marked?.parse) return window.marked;
            throw new Error('Marked not available');
        } catch (e) {
            throw new Error(`Marked load failed: ${e.message}`);
        }
    }

    // Load Highlight.js only when needed (source mode)
    async function loadHighlightJS() {
        if (typeof hljs !== 'undefined' && hljs.highlightElement) return true;
        try {
            // Load CSS first
            await loadCSS(HLJS_CSS_LOCAL, HLJS_CSS_CDN);
            // Load script
            await loadScript(HLJS_JS_LOCAL, HLJS_JS_CDN);
            if (typeof hljs !== 'undefined' && hljs.highlightElement) {
                console.log('✓ Highlight.js loaded for syntax highlighting');
                return true;
            }
            throw new Error('Highlight.js not available after load');
        } catch (e) {
            console.warn('Highlight.js failed to load, source mode will be plain text', e);
            return false;
        }
    }

    // --------------------------------------------------------------
    // 3. URL helpers
    // --------------------------------------------------------------
    function getMarkdownUrlFromQuery() {
        const search = window.location.search;
        if (!search || search === '?') return null;
        const params = new URLSearchParams(search);
        let named = params.get('md') || params.get('file') || params.get('markdown') || params.get('src');
        if (named?.trim()) return named.trim();
        if (!search.includes('=')) return decodeURIComponent(search.slice(1));
        return null;
    }

    function isExplicitSourceMode() {
        const params = new URLSearchParams(window.location.search);
        return params.has('source');
    }

    function shouldAutoSourceMode(url) {
        if (!url) return false;
        try {
            const path = new URL(url, window.location.href).pathname;
            const ext = path.split('.').pop()?.toLowerCase();
            if (!ext) return false;
            const sourceExtensions = new Set([
                'js', 'mjs', 'cjs', 'ts', 'jsx', 'tsx',
                'sh', 'bash', 'zsh', 'fish',
                'py', 'rb', 'pl', 'pm', 'lua', 'go', 'rs', 'swift',
                'c', 'cpp', 'cc', 'cxx', 'h', 'hpp', 'java', 'kt', 'kts',
                'css', 'scss', 'sass', 'less',
                'html', 'htm', 'xml', 'svg', 'xhtml',
                'json', 'yaml', 'yml', 'toml', 'ini', 'cfg',
                'txt', 'log', 'csv', 'sql',
                'php', 'asp', 'aspx', 'jsp',
                'vue', 'svelte', 'FCMacro'  
            ]);
            const markdownExtensions = new Set(['md', 'markdown', 'mdown', 'mkd', 'mkdown']);
            if (markdownExtensions.has(ext)) return false;
            return sourceExtensions.has(ext);
        } catch {
            return false;
        }
    }

    const rawMarkdownUrl = getMarkdownUrlFromQuery() || DEFAULT_MARKDOWN_URL;
    const explicitSource = isExplicitSourceMode();
    const autoSource = shouldAutoSourceMode(rawMarkdownUrl);
    const sourceMode = explicitSource || autoSource;

    // Get file extension for syntax hint
    function getFileExtension(url) {
        try {
            const path = new URL(url, window.location.href).pathname;
            const ext = path.split('.').pop()?.toLowerCase();
            return ext || '';
        } catch { return ''; }
    }
    const fileExtension = getFileExtension(rawMarkdownUrl);

    // --------------------------------------------------------------
    // 4. Fetch content
    // --------------------------------------------------------------
    async function fetchContent(url) {
        let absoluteUrl;
        try {
            absoluteUrl = new URL(url, window.location.href).href;
        } catch (e) {
            throw new Error(`Invalid URL: ${url}`);
        }
        const response = await fetch(absoluteUrl);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status} - ${response.statusText}\nURL: ${absoluteUrl}`);
        }
        const text = await response.text();
        if (text.length === 0) throw new Error('File is empty');
        return text;
    }

    // --------------------------------------------------------------
    // 5. Processing: delete empty lines, escape HTML
    // --------------------------------------------------------------
    function processSourceText(rawText) {
        const lines = rawText.split(/\r?\n/);
        const nonEmptyLines = lines.filter(line => line.trim() !== '');
        const trimmedContent = nonEmptyLines.join('\n');
        return trimmedContent.replace(/[&<>]/g, (m) => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --------------------------------------------------------------
    // 6. Renderers
    // --------------------------------------------------------------
    async function renderWithMath(htmlContent, container) {
        container.innerHTML = htmlContent;
        if (window.renderMathInElement) {
            try {
                window.renderMathInElement(container, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false,
                    errorColor: '#cc0000',
                });
                console.log('✓ KaTeX math rendered');
            } catch (e) { console.warn('Math error:', e); }
        } else {
            const warn = document.createElement('div');
            warn.className = 'error';
            warn.innerText = '⚠️ KaTeX auto-render not available. Math shown as raw LaTeX.';
            container.prepend(warn);
        }
    }

    async function renderMarkdown(markdownText, markedLib, container) {
        markedLib.setOptions({ gfm: true, breaks: true, headerIds: true });
        const html = await markedLib.parse(markdownText);
        await renderWithMath(html, container);
    }

    async function renderAsSourceCode(rawText, container, extension) {
        const processed = processSourceText(rawText);
        // Map common extensions to highlight.js language aliases
        let langClass = '';
        if (extension) {
            const langMap = {
                'js': 'javascript', 'mjs': 'javascript', 'cjs': 'javascript',
                'ts': 'typescript', 'jsx': 'jsx', 'tsx': 'tsx',
                'sh': 'bash', 'bash': 'bash', 'zsh': 'bash',
                'py': 'python', 'rb': 'ruby', 'go': 'go', 'rs': 'rust',
                'c': 'c', 'cpp': 'cpp', 'h': 'c', 'hpp': 'cpp', 'java': 'java',
                'css': 'css', 'scss': 'scss', 'html': 'html', 'xml': 'xml',
                'json': 'json', 'yaml': 'yaml', 'yml': 'yaml',
                'sql': 'sql', 'php': 'php', 'pl': 'perl'
            };
            const hljsLang = langMap[extension] || extension;
            langClass = `language-${hljsLang}`;
        }
        const codeHtml = `<pre><code class="${langClass}">${processed}</code></pre>`;
        container.innerHTML = '';
        container.insertAdjacentHTML('beforeend', codeHtml);

        // Apply syntax highlighting if available
        if (typeof hljs !== 'undefined' && hljs.highlightElement) {
            const codeBlock = container.querySelector('code');
            if (codeBlock) {
                hljs.highlightElement(codeBlock);
                console.log('✓ Syntax highlighting applied');
            }
        } else {
            console.log('Highlight.js not loaded, showing plain text');
        }
    }

    // Append raw file link (clean, without any query params)
    function appendRawFileLink(container, rawUrl) {
        const rawDiv = document.createElement('div');
        rawDiv.className = 'raw-link-container';
        const link = document.createElement('a');
        link.href = rawUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.innerHTML = '📄 Download raw file';
        link.title = 'Open or save the original source file';
        rawDiv.appendChild(link);
        container.appendChild(rawDiv);
    }

    // --------------------------------------------------------------
    // 7. Main init
    // --------------------------------------------------------------
    async function init() {
        const container = document.getElementById('content');
        try {
            container.innerHTML = '<div class="loader">Loading dependencies (CSS, marked, KaTeX)...</div>';

            // Load core dependencies in parallel
            const [markedLib, katexLoaded] = await Promise.all([
                loadMarked(),
                loadKaTeX().catch(e => {
                    console.error('KaTeX load failed, math disabled:', e);
                    return false;
                }),
                loadMarkdownCSS().catch(e => console.warn('CSS optional:', e))
            ]);

            // If source mode, also load Highlight.js
            let highlightLoaded = false;
            if (sourceMode) {
                container.innerHTML = '<div class="loader">Loading syntax highlighter for source mode...</div>';
                highlightLoaded = await loadHighlightJS();
            }

            container.innerHTML = '<div class="loader">Fetching file content...</div>';
            const rawContent = await fetchContent(rawMarkdownUrl);

            if (sourceMode) {
                await renderAsSourceCode(rawContent, container, fileExtension);
                // Add info badge about source mode & highlighting
                const note = document.createElement('div');
                note.className = 'source-mode-note';
                if (explicitSource) {
                    note.innerHTML = `<strong>Source mode (explicit &source)</strong> — Empty lines removed, HTML escaped${highlightLoaded ? ', syntax highlighting active.' : '. Highlight.js not loaded.'}`;
                } else if (autoSource) {
                    note.innerHTML = `<strong>Auto source mode</strong> — Detected code file (${fileExtension || 'unknown'}). Empty lines removed, <code>&lt;</code> and <code>&gt;</code> escaped${highlightLoaded ? ', syntax highlighting on.' : '.'}`;
                } else {
                    note.innerHTML = `<strong>Source mode</strong> — Raw content${highlightLoaded ? ' with syntax highlighting' : ''}.`;
                }
                container.prepend(note);
            } else {
                await renderMarkdown(rawContent, markedLib, container);
            }

            // Version footer
            const footer = document.createElement('div');
            footer.className = 'footer-version';
            let modeStr = '';
            if (sourceMode) modeStr = explicitSource ? ' · 🔍 Explicit source + syntax highlight' : (autoSource ? ' · 🤖 Auto source + syntax highlight' : ' · 🔍 Source mode');
            footer.innerText = `Version ${PAGE_VERSION}${modeStr}`;
            container.appendChild(footer);

            // Always show raw file download link
            appendRawFileLink(container, rawMarkdownUrl);

        } catch (err) {
            console.error(err);
            let errorMessage = err.message;
            if (window.location.protocol === 'file:' && errorMessage.includes('fetch')) {
                errorMessage = `Cannot load local file via file:// protocol.\n\n` +
                    `👉 Start a local web server:\n   python3 -m http.server 8000\n` +
                    `Then open: http://localhost:8000/${window.location.pathname.split('/').pop()}${window.location.search}\n\n` +
                    `Original error: ${err.message}`;
            }
            const rawLink = `<a href="${escapeHtml(rawMarkdownUrl)}" target="_blank" rel="noopener noreferrer" style="background:#f6f8fa; padding:6px 12px; border-radius:20px; text-decoration:none; color:#0969da;">📄 Download raw file</a>`;
            container.innerHTML = `<div class="error">❌ ${escapeHtml(errorMessage)}<br><br>${rawLink}</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
</script>
</body>
</html>
