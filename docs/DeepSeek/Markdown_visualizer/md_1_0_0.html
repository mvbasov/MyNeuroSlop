<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #111;
            padding: 2rem 1rem;
        }

        .markdown-body {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* GitHub‑style markdown */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 2rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25rem; }
        .markdown-body p, .markdown-body ul, .markdown-body ol { margin-bottom: 1rem; }
        .markdown-body code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #f6f8fa;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-size: 0.85em;
            color: #e36209;
        }
        .markdown-body pre {
            background: #f6f8fa;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .markdown-body blockquote {
            border-left: 4px solid #dfe2e5;
            margin: 1rem 0;
            padding-left: 1rem;
            color: #6a737d;
        }
        .markdown-body a { color: #0366d6; text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body img { max-width: 100%; }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
        }
        .markdown-body th, .markdown-body td {
            border: 1px solid #dfe2e5;
            padding: 0.5rem;
        }
        .markdown-body th { background: #f6f8fa; }

        .loader, .error {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 1rem;
        }
        .error {
            color: #d73a49;
            background: #ffeef0;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div id="content" class="markdown-body">
        <div class="loader">Loading markdown…</div>
    </div>

    <script>
        // ------------------------------------------------------------------
        // Hardcoded default markdown (used if no valid URL parameter is given)
        // ------------------------------------------------------------------
        const DEFAULT_MARKDOWN_URL = 'https://mvbasov.github.io/MyNeuroSlop/Gemini/voronoi_step_by_step_visualizer/';

        // Marked.js library – CDN + local fallback
        const CDN_URL = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
        const LOCAL_FALLBACK = 'marked.min.js';

        // ------------------------------------------------------------------
        // Extract markdown URL from window.location.search
        // Supports:
        //   ?file.md               → "file.md" (relative path)
        //   ?path/to/doc.md       → "path/to/doc.md"
        //   ?md=example.md        → "example.md"
        //   ?file=README.md       → "README.md"
        //   ?markdown=notes.md    → "notes.md"
        // ------------------------------------------------------------------
        function getMarkdownUrlFromQuery() {
            const search = window.location.search;
            if (!search || search === '?') return null;

            // Remove leading '?'
            const query = search.slice(1);

            // Case 1: named parameters (md=, file=, markdown=)
            const params = new URLSearchParams(search);
            let named = params.get('md') || params.get('file') || params.get('markdown') || params.get('src');
            if (named && named.trim() !== '') {
                return named.trim();
            }

            // Case 2: no '=' at all → treat the whole query as a relative/absolute path
            // Example: "README.md", "docs/guide.md", "/assets/page.md"
            if (!query.includes('=')) {
                // decodeURIComponent in case of %20 etc.
                return decodeURIComponent(query);
            }

            // Fallback: nothing found
            return null;
        }

        // Final markdown URL: from query parameter, or default if none
        const markdownUrl = getMarkdownUrlFromQuery() || DEFAULT_MARKDOWN_URL;

        // Optional: log the resolved URL to console for debugging (no visible UI)
        console.log('[Markdown Viewer] Loading from:', markdownUrl);

        // ------------------------------------------------------------------
        // Dynamic script loader with timeout
        // ------------------------------------------------------------------
        function loadScript(src, timeout = 8000) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                let resolved = false;
                const timer = setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        reject(new Error(`Timeout: ${src}`));
                    }
                }, timeout);
                script.onload = () => {
                    if (resolved) return;
                    clearTimeout(timer);
                    resolved = true;
                    resolve();
                };
                script.onerror = () => {
                    if (resolved) return;
                    clearTimeout(timer);
                    resolved = true;
                    reject(new Error(`Failed to load: ${src}`));
                };
                document.head.appendChild(script);
            });
        }

        // ------------------------------------------------------------------
        // Load marked.js with CDN → local fallback
        // ------------------------------------------------------------------
        async function loadMarked() {
            if (window.marked && typeof window.marked.parse === 'function') {
                return window.marked;
            }
            // Try CDN first
            try {
                await loadScript(CDN_URL);
                if (window.marked && typeof window.marked.parse === 'function') {
                    console.log('✓ marked loaded from CDN');
                    return window.marked;
                }
                throw new Error('Marked not available after CDN load');
            } catch (cdnErr) {
                console.warn('CDN failed, trying local fallback', cdnErr);
                try {
                    await loadScript(LOCAL_FALLBACK);
                    if (window.marked && typeof window.marked.parse === 'function') {
                        console.log('✓ marked loaded from local fallback');
                        return window.marked;
                    }
                    throw new Error('Marked not available after local fallback');
                } catch (localErr) {
                    throw new Error(`Cannot load marked.js: ${localErr.message}`);
                }
            }
        }

        // ------------------------------------------------------------------
        // Fetch markdown content from given URL (supports relative paths)
        // ------------------------------------------------------------------
        async function fetchMarkdown(url) {
            // Resolve relative URL to absolute (just for clarity; fetch handles it)
            const resolvedUrl = new URL(url, window.location.href).href;
            console.log('Fetching:', resolvedUrl);
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status} ${response.statusText} — ${resolvedUrl}`);
            }
            return await response.text();
        }

        // ------------------------------------------------------------------
        // Render markdown to container using marked
        // ------------------------------------------------------------------
        async function renderMarkdown(markdownText, markedLib, container) {
            markedLib.setOptions({
                gfm: true,
                breaks: true,
                headerIds: true,
                mangle: false
            });
            const html = await markedLib.parse(markdownText);
            container.innerHTML = html;
        }

        // ------------------------------------------------------------------
        // Main entry point
        // ------------------------------------------------------------------
        async function init() {
            const container = document.getElementById('content');
            try {
                const markedLib = await loadMarked();
                const markdownText = await fetchMarkdown(markdownUrl);
                await renderMarkdown(markdownText, markedLib, container);
            } catch (err) {
                console.error('Rendering failed:', err);
                container.innerHTML = `<div class="error">❌ ${escapeHtml(err.message)}</div>`;
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
