    <div class="app-header">
        <h1>🔍 Markup Validator</h1>
        <div class="subhead">HTML tag balance / well‑formed XML & SVG · live validation</div>
        <div class="toolbar">
            <div class="toolbar-left">
                <button id="loadBtn" class="icon-btn" aria-label="Load file">📂</button>
                <button id="pasteBtn" class="icon-btn" aria-label="Paste from clipboard">📋</button>
                <button id="saveBtn" class="icon-btn" aria-label="Save to file">💾</button>
                <button id="copyBtn" class="icon-btn" aria-label="Copy editor content">📄</button>
                <button id="clearBtn" class="icon-btn" aria-label="Clear all">🗑</button>
                <button id="themeToggleBtn" class="theme-toggle" aria-label="Switch theme">🌓</button>
            </div>
            <div class="toolbar-right">
                <select id="modeSelect" class="mode-select" aria-label="Validation mode">
                    <option value="auto">🔄 Auto</option>
                    <option value="html">🌐 HTML</option>
                    <option value="xml">📄 XML / SVG</option>
                </select>
                <span id="fileStatusBadge" class="file-status">📄 no file loaded</span>
            </div>
        </div>

    <div class="editor-area">
        <div id="summaryLabel" class="validation-summary">⚙️ Ready</div>
        <div class="editor-wrapper">
            <div class="backdrop" id="backdrop">
                <div class="highlights" id="highlights"></div>
            </div>
            <textarea id="codeEditor" placeholder="Paste HTML, XML or SVG markup...&#10;&#10;Example:&#10;&lt;html&gt;&#10;  &lt;body&gt;&lt;h1&gt;Hello world&lt;/h1&gt;&lt;/body&gt;&#10;&lt;/html&gt;"></textarea>
        </div>
        <div id="resultContainer"></div>
    </div>

        <span>✔ XML/SVG: DOMParser (strict) · HTML: tag matching + quote balance</span>
        <span class="version">version 1.17.0</span>
    </footer>
</div>

<script>
    (function(){
        // ----- THEME TOGGLE (cycle: auto, light, dark) -----
        const appContainer = document.getElementById('markup-validator-app');
        const bodyEl = document.body;
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        let currentMode = 'auto';
        let systemListenerActive = false;
        let mediaQueryListener = null;
        
        const themeIcons = { auto: '🌓', light: '☀️', dark: '🌙' };
        const themeOrder = ['auto', 'light', 'dark'];
        
        function applyTheme(themeMode) {
            if (themeMode === 'dark') {
                bodyEl.classList.add('theme-dark');
                appContainer.classList.add('theme-dark');
            } else {
                bodyEl.classList.remove('theme-dark');
                appContainer.classList.remove('theme-dark');
            }
        }
        
        function getSystemPreference() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        function updateThemeFromMode(mode) {
            if (mode === 'auto') {
                applyTheme(getSystemPreference());
                activateSystemListener();
            } else if (mode === 'dark') {
                deactivateSystemListener();
                applyTheme('dark');
            } else if (mode === 'light') {
                deactivateSystemListener();
                applyTheme('light');
            }
            if (themeToggleBtn) themeToggleBtn.textContent = themeIcons[mode] || '🌓';
        }
        
        function activateSystemListener() {
            if (systemListenerActive) return;
            const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const handler = (e) => {
                if (currentMode === 'auto') applyTheme(e.matches ? 'dark' : 'light');
            };
            if (darkModeMedia.addEventListener) darkModeMedia.addEventListener('change', handler);
            else if (darkModeMedia.addListener) darkModeMedia.addListener(handler);
            mediaQueryListener = { media: darkModeMedia, handler };
            systemListenerActive = true;
        }
        
        function deactivateSystemListener() {
            if (!systemListenerActive || !mediaQueryListener) return;
            const { media, handler } = mediaQueryListener;
            if (media.removeEventListener) media.removeEventListener('change', handler);
            else if (media.removeListener) media.removeListener(handler);
            systemListenerActive = false;
            mediaQueryListener = null;
        }
        
        function setThemeMode(mode) {
            currentMode = mode;
            updateThemeFromMode(mode);
            try { localStorage.setItem('markup_validator_theme', mode); } catch(e) {}
        }
        
        function cycleTheme() {
            let idx = themeOrder.indexOf(currentMode);
            let next = themeOrder[(idx + 1) % themeOrder.length];
            setThemeMode(next);
        }
        
        let savedMode = 'auto';
        try { const stored = localStorage.getItem('markup_validator_theme'); if (stored === 'light' || stored === 'dark' || stored === 'auto') savedMode = stored; } catch(e) {}
        setThemeMode(savedMode);
        if (themeToggleBtn) themeToggleBtn.addEventListener('click', cycleTheme);
        
        // ----- VALIDATOR CORE with persistent highlight (clears on editor focus/input) -----
        const editor = document.getElementById('codeEditor');
        const loadBtn = document.getElementById('loadBtn');
        const pasteBtn = document.getElementById('pasteBtn');
        const saveBtn = document.getElementById('saveBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultContainer = document.getElementById('resultContainer');
        const fileStatusBadge = document.getElementById('fileStatusBadge');
        const summaryLabel = document.getElementById('summaryLabel');
        const modeSelect = document.getElementById('modeSelect');
        
        // Overlay elements
        const backdrop = document.getElementById('backdrop');
        const highlightsDiv = document.getElementById('highlights');
        
        let currentErrors = [];
        let loadedFileName = null;
        let validationTimeout = null;
        let currentHighlightedLine = null;
        
        function syncScroll() {
            if (backdrop && editor) {
                backdrop.scrollTop = editor.scrollTop;
                backdrop.scrollLeft = editor.scrollLeft;
            }
        }
        
        function updateOverlay() {
            const text = editor.value;
            const lines = text.split('\n');
            let html = '';
            for (let i = 0; i < lines.length; i++) {
                const lineNumber = i + 1;
                const lineContent = escapeHtml(lines[i]) || ' ';
                if (currentHighlightedLine === lineNumber) {
                    html += `<mark>${lineContent}</mark>\n`;
                } else {
                    html += `${lineContent}\n`;
                }
            }
            highlightsDiv.innerHTML = html;
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function clearHighlight() {
            if (currentHighlightedLine !== null) {
                currentHighlightedLine = null;
                updateOverlay();
            }
        }
        
        function updateSummary() {
            if (currentErrors.length === 0) {
                summaryLabel.innerHTML = '✅ Valid markup';
                summaryLabel.style.background = "var(--app-success-bg)";
                summaryLabel.style.color = "#0e6b3e";
            } else {
                summaryLabel.innerHTML = `⚠️ ${currentErrors.length} error(s) found`;
                summaryLabel.style.background = "var(--app-error-header-bg)";
                summaryLabel.style.color = "#b45309";
            }
        }
        
        function renderFullErrorPanel() {
            if (!currentErrors.length) {
                resultContainer.innerHTML = '';
                return;
            }
            const panel = document.createElement('div');
            panel.className = 'error-panel';
            panel.innerHTML = `<div class="error-panel-header"><span>⚠️ Detailed errors</span><span class="line-hint">↳ click any error to highlight line</span></div><div class="error-list" id="errorList"></div>`;
            resultContainer.innerHTML = '';
            resultContainer.appendChild(panel);
            const listContainer = panel.querySelector('#errorList');
            for (const err of currentErrors) {
                const row = document.createElement('div');
                row.className = 'error-line';
                row.setAttribute('data-line', err.line);
                row.innerHTML = `<span class="line-badge">line ${err.line}</span><span class="error-message">${escapeHtml(err.message)}</span>`;
                row.addEventListener('click', () => {
                    highlightLineInTextarea(err.line);
                });
                listContainer.appendChild(row);
            }
        }
        
        function highlightLineInTextarea(lineNum) {
            const lines = editor.value.split('\n');
            if (lineNum < 1 || lineNum > lines.length) return;
            
            // Set the highlighted line (replaces any previous highlight)
            currentHighlightedLine = lineNum;
            updateOverlay();
            
            // Scroll to the line
            const lineHeight = parseInt(getComputedStyle(editor).lineHeight);
            const approxY = (lineNum - 1) * lineHeight;
            editor.scrollTop = Math.max(0, approxY - editor.clientHeight / 3);
            syncScroll();
            
            // No automatic timeout – highlight stays until user interacts with editor
        }
        
        function validateXmlSvg(content) {
            const errors = [];
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, "text/xml");
            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                const rawErrorMsg = parseError.textContent || '';
                let lineMatch = rawErrorMsg.match(/line\s+(\d+)/i);
                let line = lineMatch ? parseInt(lineMatch[1], 10) : 1;
                if (isNaN(line)) line = 1;
                let cleanedMsg = rawErrorMsg.replace(/\s+/g, ' ').trim();
                if (cleanedMsg.length > 160) cleanedMsg = cleanedMsg.slice(0, 150) + '…';
                errors.push({ line: line, message: `XML/SVG parse: ${cleanedMsg}` });
            }
            return errors;
        }
        
        function validateHtmlRobust(content) {
            const errors = [];
            const lines = content.split('\n');
            const tagStack = [];
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                let inDoubleQuote = false, inSingleQuote = false;
                for (let idx = 0; idx < line.length; idx++) {
                    const ch = line[idx];
                    if (ch === '"' && !inSingleQuote) inDoubleQuote = !inDoubleQuote;
                    else if (ch === "'" && !inDoubleQuote) inSingleQuote = !inSingleQuote;
                }
                if (inDoubleQuote) errors.push({ line: i+1, message: `Unclosed double quote (") in line — attribute value likely unterminated.` });
                if (inSingleQuote) errors.push({ line: i+1, message: `Unclosed single quote (') in line — attribute value likely unterminated.` });
                
                let processedLine = line.replace(/="[^"]*"/g, '=""').replace(/='[^']*'/g, "=''");
                const openAngles = (processedLine.match(/</g) || []).length;
                const closeAngles = (processedLine.match(/>/g) || []).length;
                if (openAngles !== closeAngles) {
                    errors.push({ line: i+1, message: `Mismatched angle brackets: ${openAngles} opening '<' vs ${closeAngles} closing '>'` });
                }
                
                const tagRegex = /<(\/?)([\w:-]+)(\s+[^>]*?)?(\/)?>/g;
                let match;
                while ((match = tagRegex.exec(line)) !== null) {
                    const full = match[0];
                    const isClosing = match[1] === '/';
                    let tagName = match[2] ? match[2].toLowerCase() : '';
                    const selfClosingSlash = match[4] === '/';
                    const isSelfClosing = selfClosingSlash || full.endsWith('/>');
                    const voidTags = ['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr'];
                    const isVoid = voidTags.includes(tagName);
                    
                    if (!isClosing && !isSelfClosing && !isVoid) {
                        tagStack.push({ tagName, line: i+1 });
                    } else if (isClosing) {
                        if (tagStack.length === 0) {
                            errors.push({ line: i+1, message: `Unexpected closing tag </${tagName}> — no matching open tag.` });
                        } else {
                            const last = tagStack.pop();
                            if (last.tagName !== tagName) {
                                errors.push({ line: i+1, message: `Mismatched closing: expected </${last.tagName}>, got </${tagName}>.` });
                                tagStack.push(last);
                            }
                        }
                    }
                }
            }
            for (const leftover of tagStack) {
                errors.push({ line: leftover.line, message: `Unclosed tag <${leftover.tagName}> — missing corresponding closing tag.` });
            }
            const unique = new Map();
            for (const e of errors) {
                const key = `${e.line}|${e.message.substring(0,70)}`;
                if (!unique.has(key)) unique.set(key, e);
            }
            return Array.from(unique.values());
        }
        
        function runValidation() {
            const rawCode = editor.value;
            if (rawCode.trim() === '') {
                currentErrors = [];
                updateSummary();
                renderFullErrorPanel();
                return;
            }
            let mode = modeSelect.value;
            if (mode === 'auto') {
                const trimmed = rawCode.trim();
                if (trimmed.startsWith('<?xml') || /^\s*<svg\b/i.test(trimmed) || /^\s*<\?xml/.test(trimmed) || (trimmed.includes('xmlns') && !/<html\b/i.test(trimmed))) {
                    mode = 'xml';
                } else {
                    mode = 'html';
                }
            }
            let errors = [];
            if (mode === 'xml') errors = validateXmlSvg(rawCode);
            else errors = validateHtmlRobust(rawCode);
            const totalLines = rawCode.split('\n').length;
            errors = errors.filter(e => e.line >= 1 && e.line <= totalLines);
            currentErrors = errors;
            updateSummary();
            renderFullErrorPanel();
            // Do not clear highlight automatically – keep existing highlight
        }
        
        function scheduleValidation() {
            if (validationTimeout) clearTimeout(validationTimeout);
            validationTimeout = setTimeout(runValidation, 300);
        }
        
        // Clear highlight when editor gets focus or user types (interaction)
        editor.addEventListener('focus', clearHighlight);
        editor.addEventListener('input', function() {
            clearHighlight();
            scheduleValidation();
            updateOverlay();
        });
        editor.addEventListener('scroll', syncScroll);
        
        // When mode changes, re-validate but keep highlight? Better clear highlight to avoid confusion
        modeSelect.addEventListener('change', function() {
            clearHighlight();
            scheduleValidation();
        });
        
        function initialOverlaySync() {
            updateOverlay();
            syncScroll();
        }
        
        // File & clipboard handlers
        function loadFile() {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = '.html,.htm,.xml,.svg,.txt,.xhtml,.xslt';
            inp.onchange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                let fullName = file.name;
                let baseName = fullName.replace(/\.[^/.]+$/, "");
                loadedFileName = baseName || "document";
                updateFileStatus();
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        editor.value = e.target.result;
                        resultContainer.innerHTML = '';
                        clearHighlight();
                        updateOverlay();
                        scheduleValidation();
                    } catch (err) {
                        alert("Failed to process file content.");
                        loadedFileName = null;
                        updateFileStatus();
                    }
                };
                reader.onerror = () => { alert("Unable to read file."); loadedFileName = null; updateFileStatus(); };
                reader.readAsText(file, "UTF-8");
            };
            inp.click();
        }
        
        async function pasteFromClip() {
            try {
                const text = await navigator.clipboard.readText();
                editor.value = text;
                loadedFileName = null;
                updateFileStatus();
                resultContainer.innerHTML = '';
                clearHighlight();
                updateOverlay();
                scheduleValidation();
            } catch (err) {
                alert("Clipboard read failed. Grant permission or paste manually.");
            }
        }
        
        function saveToFile() {
            const content = editor.value;
            if (!content) return alert('No content to save.');
            const modeRad = modeSelect.value;
            let ext = '.txt';
            if (modeRad === 'html') ext = '.html';
            else if (modeRad === 'xml') ext = '.xml';
            else {
                if (/<html/i.test(content)) ext = '.html';
                else if (/<svg/i.test(content)) ext = '.svg';
                else ext = '.xml';
            }
            let finalBase = loadedFileName ? `${loadedFileName}_validated` : 'validated_markup';
            let filename = finalBase + ext;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        async function copyEditorText() {
            await navigator.clipboard.writeText(editor.value);
            const orig = copyBtn.textContent;
            copyBtn.textContent = '✓';
            setTimeout(() => copyBtn.textContent = '📄', 1000);
        }
        
        function clearAll() {
            editor.value = '';
            loadedFileName = null;
            updateFileStatus();
            resultContainer.innerHTML = '';
            clearHighlight();
            updateOverlay();
            scheduleValidation();
        }
        
        function updateFileStatus() {
            if (loadedFileName) {
                fileStatusBadge.innerHTML = `📄 ${loadedFileName}`;
                fileStatusBadge.style.background = "var(--app-file-status-active)";
            } else {
                fileStatusBadge.innerHTML = `📄 no file loaded`;
                fileStatusBadge.style.background = "var(--app-file-status-bg)";
            }
        }
        
        loadBtn.addEventListener('click', loadFile);
        pasteBtn.addEventListener('click', pasteFromClip);
        saveBtn.addEventListener('click', saveToFile);
        copyBtn.addEventListener('click', copyEditorText);
        clearBtn.addEventListener('click', clearAll);
        
        // Initial demo content
        editor.value = `<div>
  <h1>Title missing closing tag
  <p>Unclosed paragraph
  <img src="photo.jpg" alt="demo">
  <span class="test">Text</span>
</div>`;
        loadedFileName = null;
        updateFileStatus();
        initialOverlaySync();
        scheduleValidation();
        
        // Resize observer to keep overlay dimensions in sync
        const resizeObserver = new ResizeObserver(() => {
            if (backdrop && editor) {
                backdrop.style.height = editor.clientHeight + 'px';
                syncScroll();
            }
        });
        resizeObserver.observe(editor);
    })();
</script>
</body>
</html>
