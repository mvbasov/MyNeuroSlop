<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PRESERVE_BINARY_START -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%20%20%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2220%22%20fill%3D%22%231E3A8A%22%20%2F%3E%20%20%3Ccircle%20cx%3D%2250%22%20cy%3D%2248%22%20r%3D%2234%22%20fill%3D%22none%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%225%22%20%2F%3E%20%20%3Cline%20x1%3D%2276%22%20y1%3D%2274%22%20x2%3D%2290%22%20y2%3D%2288%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%226%22%20stroke-linecap%3D%22round%22%20%2F%3E%20%20%3Ctext%20x%3D%2250%22%20y%3D%2257%22%20font-family%3D%22monospace%22%20font-size%3D%2230%22%20font-weight%3D%22bold%22%20fill%3D%22%23FFFFFF%22%20text-anchor%3D%22middle%22%3E%26lt%3B%2F%26gt%3B%3C%2Ftext%3E%3C%2Fsvg%3E" />
    <!-- PRESERVE_BINARY_END -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Markup Linter · Perfect sync · Highlight works in all modes</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, 'Segoe UI', 'Roboto', monospace;
            line-height: 1.4;
            transition: background-color 0.3s ease, color 0.2s ease;
        }
        body:not(.theme-dark) { background: #f4f6fa; }
        body.theme-dark { background: #121826; }
    </style>
</head>
<body>
<div id="markup-validator-app">
    <style>
        #markup-validator-app {
            --app-bg: #ffffff;
            --app-border: #e9edf2;
            --app-text-primary: #1a2634;
            --app-text-secondary: #4a5b72;
            --app-header-border: #eff3f8;
            --app-btn-bg: #f0f2f5;
            --app-btn-border: #dce3ec;
            --app-btn-hover: #e6ebf2;
            --app-btn-primary-bg: #0f2b3d;
            --app-btn-primary-hover: #1f3e55;
            --app-textarea-bg: #fefefe;
            --app-textarea-border: #dee4ec;
            --app-error-panel-bg: #fffaf5;
            --app-error-panel-border: #ffe7d6;
            --app-error-header-bg: #fff5eb;
            --app-error-header-border: #ffe0ca;
            --app-error-line-hover: #fff2e8;
            --app-line-badge-bg: #ffe1cf;
            --app-success-bg: #e0f2e9;
            --app-footer-border: #eef2f8;
            --app-footer-color: #6c7e97;
            --app-file-status-bg: #f0f2f5;
            --app-file-status-active: #e6f0ff;
            --app-summary-bg: #f8f9fc;
            --app-summary-text: #1f3a5f;
            --app-select-bg: #f0f2f5;
            --app-select-border: #dce3ec;
            --app-highlight-bg: #fff3cd;
            --app-line-number-bg: #f8f9fc;
            --app-line-number-color: #8b9ab0;

            max-width: 1400px;
            margin: 0 auto;
            background: var(--app-bg);
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--app-border);
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', monospace;
            transition: background-color 0.3s ease, border-color 0.2s ease;
        }
        #markup-validator-app.theme-dark {
            --app-bg: #1e2432;
            --app-border: #2d3548;
            --app-text-primary: #eef2ff;
            --app-text-secondary: #9aa9c1;
            --app-header-border: #2a3242;
            --app-btn-bg: #2a3245;
            --app-btn-border: #3a4358;
            --app-btn-hover: #353f55;
            --app-btn-primary-bg: #2563eb;
            --app-btn-primary-hover: #3b82f6;
            --app-textarea-bg: #0f121c;
            --app-textarea-border: #2d3548;
            --app-error-panel-bg: #251f1a;
            --app-error-panel-border: #3e2e22;
            --app-error-header-bg: #2a241e;
            --app-error-header-border: #4a3828;
            --app-error-line-hover: #2f281f;
            --app-line-badge-bg: #5c3a2a;
            --app-success-bg: #1a3a2a;
            --app-footer-border: #2a3242;
            --app-footer-color: #8b9ab0;
            --app-file-status-bg: #2a3245;
            --app-file-status-active: #1e3a5f;
            --app-summary-bg: #151e2c;
            --app-summary-text: #b9d0ff;
            --app-select-bg: #2a3245;
            --app-select-border: #3a4358;
            --app-highlight-bg: #3a2e1a;
            --app-line-number-bg: #151e2c;
            --app-line-number-color: #6c7e97;
        }
        #markup-validator-app, #markup-validator-app * {
            color: var(--app-text-primary);
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        .app-header { padding: 1.2rem 2rem; border-bottom: 2px solid var(--app-header-border); }
        h1 { font-weight: 600; font-size: 1.6rem; margin: 0 0 0.2rem; display: flex; align-items: center; gap: 8px; }
        .subhead { font-size: 0.85rem; color: var(--app-text-secondary); padding-left: 0.25rem; border-left: 3px solid #2563eb; margin-top: 6px; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 12px; margin: 1.2rem 0 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--app-header-border); }
        .toolbar-left, .toolbar-right { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .icon-btn, .theme-toggle {
            background: var(--app-btn-bg);
            border: 1px solid var(--app-btn-border);
            padding: 0.4rem;
            border-radius: 2rem;
            font-size: 1rem;
            width: 2rem;
            height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.08s linear;
            font-family: inherit;
        }
        .icon-btn:hover, .theme-toggle:hover { background: var(--app-btn-hover); transform: translateY(-1px); }
        .mode-select {
            background: var(--app-select-bg);
            border: 1px solid var(--select-border);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
        }
        .file-status { font-size: 0.7rem; background: var(--app-file-status-bg); padding: 0.2rem 0.8rem; border-radius: 20px; color: var(--app-text-secondary); }
        .editor-area { padding: 0 2rem 2rem 2rem; }
        .validation-summary {
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            background: var(--app-summary-bg);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            border: 1px solid var(--app-btn-border);
        }
        .editor-with-lines { display: flex; border: 1px solid var(--app-textarea-border); border-radius: 1.5rem; background: var(--app-textarea-bg); overflow: hidden; }
        
        .line-numbers {
            background: var(--app-textarea-bg);
            padding-top: 1rem;
            padding-bottom: 1rem; /* Locked to match editor padding precisely */
            padding-left: 1rem;
            padding-right: 0.5rem;
            margin: 0;
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Consolas, Menlo, Monaco, monospace;
            font-size: 13px;
            line-height: 20px; /* Explicit matching line-height */
            text-align: right;
            color: var(--app-line-number-color);
            user-select: none;
            white-space: pre;
            overflow-y: hidden;
            border-right: 1px solid var(--app-textarea-border);
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .editor-wrapper { position: relative; flex: 1; }
        .backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--app-textarea-bg);
            pointer-events: none;
            z-index: 1;
            box-sizing: border-box;
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Consolas, Menlo, Monaco, monospace;
            font-size: 13px;
            line-height: 20px;
            padding: 1rem;
        }
        .highlights { 
            white-space: pre; 
            word-wrap: normal; 
            color: transparent !important; 
            -webkit-text-fill-color: transparent !important;
            background-color: transparent; 
        }
        .highlights mark { 
            color: transparent !important; 
            -webkit-text-fill-color: transparent !important;
            background-color: var(--app-highlight-bg); 
            display: inline; 
        }
        textarea {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 380px;
            margin: 0;
            font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Roboto Mono', Consolas, Menlo, Monaco, monospace;
            font-size: 13px;
            line-height: 20px; /* Locked explicit layout height */
            background: transparent;
            border: none;
            padding: 1rem;
            resize: vertical;
            tab-size: 2;
            color: var(--app-text-primary);
            caret-color: var(--app-text-primary);
            overflow: auto;
            outline: none;
            box-sizing: border-box;
            white-space: pre;
            word-wrap: normal;
            word-break: normal;
            overflow-wrap: normal;
        }
        textarea:focus { outline: none; }
        .highlights, textarea {
            white-space: pre !important;
            word-wrap: normal !important;
            word-break: normal !important;
            overflow-wrap: normal !important;
        }
        #markup-validator-app.wrap-enabled .highlights, 
        #markup-validator-app.wrap-enabled textarea {
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
            word-break: normal !important;
            overflow-wrap: break-word !important;
        }
        .backdrop, textarea { scrollbar-width: thin; }
        .error-panel { margin-top: 1.5rem; border-radius: 1.25rem; background: var(--app-error-panel-bg); border: 1px solid var(--app-error-panel-border); }
        .error-panel-header { padding: 0.8rem 1.5rem; background: var(--app-error-header-bg); border-bottom: 1px solid var(--app-error-header-border); font-weight: 600; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .error-list { max-height: 260px; overflow-y: auto; }
        .error-line { padding: 0.6rem 1.5rem; border-bottom: 1px solid var(--app-error-panel-border); display: flex; gap: 14px; font-family: monospace; font-size: 0.8rem; cursor: pointer; }
        .error-line:hover { background: var(--app-error-line-hover); }
        .line-badge { background: var(--app-line-badge-bg); border-radius: 30px; padding: 0.1rem 0.7rem; font-weight: 700; color: #b45309; min-width: 65px; text-align: center; }
        .error-message { color: #a44100; word-break: break-word; flex: 1; }
        .line-hint { font-size: 0.7rem; background: var(--app-btn-bg); padding: 0.2rem 0.7rem; border-radius: 30px; }
        footer { text-align: center; font-size: 0.7rem; border-top: 1px solid var(--app-footer-border); padding: 1rem; color: var(--app-footer-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .version { font-family: monospace; background: var(--app-btn-bg); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }
        @media (max-width: 680px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .toolbar-left, .toolbar-right { justify-content: center; }
            footer { flex-direction: column; gap: 8px; }
        }
        .app-toast {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--app-btn-primary-bg);
            color: #ffffff;
            border: 1px solid var(--app-btn-border);
            padding: 0.8rem 1.6rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 10000;
            font-size: 0.9rem;
            font-weight: 500;
            align-items: center;
            gap: 0.5rem;
            animation: toastSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: calc(100vw - 4rem);
        }
        @keyframes toastSlideIn {
            from { transform: translateY(1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

    <div class="app-header">
        <h1>🔍 Markup Validator</h1>
        <div class="subhead">HTML/XML/SVG · perfect sync · highlight works in strict mode</div>
        <div class="toolbar">
            <div class="toolbar-left">
                <button id="loadBtn" class="icon-btn" title="Load file">📂</button>
                <button id="pasteBtn" class="icon-btn" title="Paste from clipboard">📋</button>
                <button id="saveBtn" class="icon-btn" title="Save to file">💾</button>
                <button id="copyBtn" class="icon-btn" title="Copy editor content">📄</button>
                <button id="clearBtn" class="icon-btn" title="Clear all">🗑</button>
                <button id="themeToggleBtn" class="theme-toggle" title="Switch theme">🌓</button>
                <button id="toggleLineNumbersBtn" class="icon-btn" title="Toggle Line Numbers">🔢</button>
                <button id="toggleWrapBtn" class="icon-btn" title="Toggle Line Wrap">🔁</button>
                <button id="jumpToInnerBtn" class="icon-btn" title="Jump to innermost error">🎯</button>
            </div>
            <div class="toolbar-right">
                <select id="modeSelect" class="mode-select">
                    <option value="auto">🔄 Auto</option>
                    <option value="html">🌐 HTML</option>
                    <option value="xml">📄 XML / SVG (strict)</option>
                </select>
                <span id="fileStatusBadge" class="file-status">📄 no file loaded</span>
            </div>
        </div>
    </div>
    <div class="editor-area" id="editorAreaRoot">
        <div id="summaryLabel" class="validation-summary">⚙️ Ready</div>
        <div id="editorContainer"></div>
        <div id="resultContainer"></div>
    </div>
    <footer>
        <span>✔ Strict XML: correct error line, full highlighting, no overlay artifacts</span>
        <span class="version">v1.31.0 · built-in unit tests</span>
    </footer>
</div>

<script>
    (function(){
        // ----- THEME TOGGLE -----
        const appContainer = document.getElementById('markup-validator-app');
        const bodyEl = document.body;
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        let currentThemeMode = 'auto';
        let systemListenerActive = false;
        let mediaQueryListener = null;
        const themeIcons = { auto: '🌓', light: '☀️', dark: '🌙' };
        const themeOrder = ['auto', 'light', 'dark'];
        
        function applyTheme(themeMode) {
            if (themeMode === 'dark') { bodyEl.classList.add('theme-dark'); appContainer.classList.add('theme-dark'); }
            else { bodyEl.classList.remove('theme-dark'); appContainer.classList.remove('theme-dark'); }
        }
        function getSystemPreference() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
        function updateThemeFromMode(mode) {
            if (mode === 'auto') { applyTheme(getSystemPreference()); activateSystemListener(); }
            else if (mode === 'dark') { deactivateSystemListener(); applyTheme('dark'); }
            else { deactivateSystemListener(); applyTheme('light'); }
            if (themeToggleBtn) themeToggleBtn.textContent = themeIcons[mode] || '🌓';
        }
        function activateSystemListener() {
            if (systemListenerActive) return;
            const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            const handler = (e) => { if (currentThemeMode === 'auto') applyTheme(e.matches ? 'dark' : 'light'); };
            if (darkModeMedia.addEventListener) darkModeMedia.addEventListener('change', handler);
            else if (darkModeMedia.addListener) darkModeMedia.addListener(handler);
            mediaQueryListener = { media: darkModeMedia, handler };
            systemListenerActive = true;
        }
        function deactivateSystemListener() {
            if (!systemListenerActive || !mediaQueryListener) return;
            const { media, handler } = mediaQueryListener;
            if (media.removeEventListener) media.removeEventListener('change', handler);
            else if (media.removeListener) media.removeListener(handler);
            systemListenerActive = false;
            mediaQueryListener = null;
        }
        function setThemeMode(mode) { currentThemeMode = mode; updateThemeFromMode(mode); try { localStorage.setItem('markup_validator_theme', mode); } catch(e) {} }
        function cycleTheme() { let idx = themeOrder.indexOf(currentThemeMode); let next = themeOrder[(idx + 1) % themeOrder.length]; setThemeMode(next); }
        let savedMode = 'auto';
        try { const stored = localStorage.getItem('markup_validator_theme'); if (stored === 'light' || stored === 'dark' || stored === 'auto') savedMode = stored; } catch(e) {}
        setThemeMode(savedMode);
        if (themeToggleBtn) themeToggleBtn.addEventListener('click', cycleTheme);
        
        // ----- Global state -----
        let currentErrors = [];
        let loadedFileName = null;
        let validationTimeout = null;
        let currentHighlightedLine = null;
        let showLineNumbers = true;
        let lineWrapEnabled = false;
        
        try {
            const storedLineNumbers = localStorage.getItem('markup_validator_show_line_numbers');
            if (storedLineNumbers === 'false') {
                showLineNumbers = false;
            }
            const storedLineWrap = localStorage.getItem('markup_validator_line_wrap');
            if (storedLineWrap === 'true') {
                lineWrapEnabled = true;
            }
        } catch(e) {}
        
        let editor = null;
        let lineNumbersDiv = null;
        let backdrop = null;
        let highlightsDiv = null;
        let resultContainer = document.getElementById('resultContainer');
        let summaryLabel = document.getElementById('summaryLabel');
        let modeSelect = document.getElementById('modeSelect');
        let fileStatusBadge = document.getElementById('fileStatusBadge');
        let editorContainer = document.getElementById('editorContainer');
        
        // Helper functions
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

        let toastTimeout = null;
        let toastInterval = null;
        function showToast(message, duration = 3000, enforceLock = false) {
            let toast = document.getElementById('appToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'appToast';
                toast.className = 'app-toast';
                appContainer.appendChild(toast);
            }
            toast.innerHTML = message;
            toast.style.display = 'flex';
            
            if (toastTimeout) clearTimeout(toastTimeout);
            if (toastInterval) clearInterval(toastInterval);

            if (enforceLock) {
                const startTime = Date.now();
                toastInterval = setInterval(() => {
                    toast.innerHTML = message;
                    if (Date.now() - startTime > duration) {
                        clearInterval(toastInterval);
                        toast.style.display = 'none';
                    }
                }, 100);
            } else {
                toastTimeout = setTimeout(() => {
                    toast.style.display = 'none';
                }, duration);
            }
        }
        
        function updateLineNumbers() {
            if (!editor || !lineNumbersDiv) return;
            const lines = editor.value.split('\n');
            let numbersHtml = '';
            for (let i = 1; i <= lines.length; i++) numbersHtml += i + '.\n';
            lineNumbersDiv.innerText = numbersHtml;
        }
        
        function updateOverlay() {
            if (!editor || !highlightsDiv) return;
            const lines = editor.value.split('\n');
            let html = '';
            for (let i = 0; i < lines.length; i++) {
                const lineNum = i + 1;
                const lineContent = escapeHtml(lines[i]) || ' ';
                if (currentHighlightedLine === lineNum) {
                    html += `<mark>${lineContent}</mark>\n`;
                } else {
                    html += `${lineContent}\n`;
                }
            }
            highlightsDiv.innerHTML = html;
        }
        
        function syncScroll() {
            if (backdrop && editor) {
                backdrop.scrollTop = editor.scrollTop;
                backdrop.scrollLeft = editor.scrollLeft;
            }
            if (lineNumbersDiv && editor) {
                lineNumbersDiv.scrollTop = editor.scrollTop;
            }
        }
        
        // Match dimensions dynamically to keep backdrop alignment 100% correct
        function fullSync() {
            if (!backdrop || !editor) return;
            backdrop.style.width = editor.clientWidth + 'px';
            backdrop.style.height = editor.clientHeight + 'px';
            if (lineNumbersDiv) {
                lineNumbersDiv.style.height = editor.clientHeight + 'px';
            }
            updateOverlay();
            syncScroll();
            updateLineNumbers();
        }
        
        function applyLineNumbersAndWrapVisibility() {
            const app = document.getElementById('markup-validator-app');
            if (lineWrapEnabled) {
                app.classList.add('wrap-enabled');
            } else {
                app.classList.remove('wrap-enabled');
            }

            const toggleWrapBtn = document.getElementById('toggleWrapBtn');
            if (toggleWrapBtn) {
                toggleWrapBtn.style.opacity = lineWrapEnabled ? '1' : '0.5';
                toggleWrapBtn.style.borderColor = lineWrapEnabled ? 'var(--app-btn-border)' : 'var(--app-textarea-border)';
            }

            const effectiveShowLineNumbers = showLineNumbers && !lineWrapEnabled;
            if (lineNumbersDiv) {
                lineNumbersDiv.style.display = effectiveShowLineNumbers ? 'block' : 'none';
            }

            const toggleLineNumbersBtn = document.getElementById('toggleLineNumbersBtn');
            if (toggleLineNumbersBtn) {
                if (lineWrapEnabled) {
                    toggleLineNumbersBtn.style.opacity = '0.25';
                    toggleLineNumbersBtn.style.cursor = 'not-allowed';
                    toggleLineNumbersBtn.title = 'Line numbers disabled when wrap is enabled';
                } else {
                    toggleLineNumbersBtn.style.opacity = showLineNumbers ? '1' : '0.5';
                    toggleLineNumbersBtn.style.cursor = 'pointer';
                    toggleLineNumbersBtn.title = 'Toggle Line Numbers';
                }
                toggleLineNumbersBtn.style.borderColor = effectiveShowLineNumbers ? 'var(--app-btn-border)' : 'var(--app-textarea-border)';
            }
        }

        function toggleLineNumbers() {
            if (lineWrapEnabled) return;
            showLineNumbers = !showLineNumbers;
            applyLineNumbersAndWrapVisibility();
            try {
                localStorage.setItem('markup_validator_show_line_numbers', showLineNumbers ? 'true' : 'false');
            } catch(e) {}
            fullSync();
        }

        function toggleWrap() {
            lineWrapEnabled = !lineWrapEnabled;
            applyLineNumbersAndWrapVisibility();
            try {
                localStorage.setItem('markup_validator_line_wrap', lineWrapEnabled ? 'true' : 'false');
            } catch(e) {}
            fullSync();
        }
        
        function clearHighlight() { if (currentHighlightedLine !== null) { currentHighlightedLine = null; updateOverlay(); } }
        
        function updateSummary() {
            if (currentErrors.length === 0) {
                summaryLabel.innerHTML = '✅ Valid markup';
                summaryLabel.style.background = "var(--app-success-bg)";
                summaryLabel.style.color = "#0e6b3e";
            } else {
                summaryLabel.innerHTML = `⚠️ ${currentErrors.length} error(s) found`;
                summaryLabel.style.background = "var(--app-error-header-bg)";
                summaryLabel.style.color = "#b45309";
            }
        }
        
        function renderFullErrorPanel() {
            if (!currentErrors.length) { resultContainer.innerHTML = ''; return; }
            const panel = document.createElement('div');
            panel.className = 'error-panel';
            panel.innerHTML = `<div class="error-panel-header"><span>⚠️ Detailed errors</span><span class="line-hint">↳ click any error to jump to line</span></div><div class="error-list" id="errorList"></div>`;
            resultContainer.innerHTML = '';
            resultContainer.appendChild(panel);
            const listContainer = panel.querySelector('#errorList');
            for (const err of currentErrors) {
                const row = document.createElement('div');
                row.className = 'error-line';
                row.setAttribute('data-line', err.line);
                row.title = `error line ${err.line}`;
                row.innerHTML = `<span class="line-badge">line ${err.line}</span><span class="error-message">${escapeHtml(err.message)}</span>`;
                row.addEventListener('click', () => jumpToLine(err.line));
                listContainer.appendChild(row);
            }
        }
        
        function jumpToLine(lineNum) {
            if (!editor) return;
            const lines = editor.value.split('\n');
            if (lineNum < 1 || lineNum > lines.length) return;
            currentHighlightedLine = lineNum;
            updateOverlay();
            const lineHeight = 20; // Exact explicit pixel calculation
            const approxY = (lineNum - 1) * lineHeight;
            editor.scrollTop = Math.max(0, approxY - editor.clientHeight / 3);
            syncScroll();
        }
        
        // ----- Validators -----
        function validateXmlSvg(content) {
            const errors = [];
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, "text/xml");
            const parseError = doc.querySelector('parsererror');
            if (parseError) {
                const rawErrorMsg = parseError.textContent || '';
                const mismatchMatch = rawErrorMsg.match(/Opening and ending tag mismatch:\s*(\w+)\s+line\s+(\d+)\s+and\s+(\w+)/i);
                if (mismatchMatch) {
                    let line = parseInt(mismatchMatch[2], 10);
                    let openingTag = mismatchMatch[1];
                    let closingTag = mismatchMatch[3];
                    errors.push({ line: line, message: `Mismatched tags: <${openingTag}> opened at line ${line} but got </${closingTag}> later.`, depth: 1 });
                    return errors;
                }
                let lineMatch = rawErrorMsg.match(/line\s+(\d+)/i);
                let line = lineMatch ? parseInt(lineMatch[1], 10) : 1;
                if (isNaN(line)) line = 1;
                let cleanedMsg = rawErrorMsg.replace(/\s+/g, ' ').trim();
                if (cleanedMsg.length > 160) cleanedMsg = cleanedMsg.slice(0, 150) + '…';
                errors.push({ line: line, message: `XML/SVG parse: ${cleanedMsg}`, depth: 1 });
            }
            return errors;
        }
        
        function validateHtmlRobust(content) {
            const errors = [];
            const lines = content.split('\n');
            const tagStack = [];
            let currentDepth = 0;
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                let inDoubleQuote = false, inSingleQuote = false;
                for (let ch of line) {
                    if (ch === '"' && !inSingleQuote) inDoubleQuote = !inDoubleQuote;
                    else if (ch === "'" && !inDoubleQuote) inSingleQuote = !inDoubleQuote;
                }
                if (inDoubleQuote) errors.push({ line: i+1, message: `Unclosed double quote (") in line`, depth: currentDepth });
                if (inSingleQuote) errors.push({ line: i+1, message: `Unclosed single quote (') in line`, depth: currentDepth });
                
                let processedLine = line.replace(/="[^"]*"/g, '=""').replace(/='[^']*'/g, "=''");
                const openAngles = (processedLine.match(/</g) || []).length;
                const closeAngles = (processedLine.match(/>/g) || []).length;
                if (openAngles !== closeAngles) errors.push({ line: i+1, message: `Mismatched angle brackets: ${openAngles} opening '<' vs ${closeAngles} closing '>'`, depth: currentDepth });
                
                const tagRegex = /<(\/?)([\w:-]+)(\s+[^>]*?)?(\/)?>/g;
                let match;
                while ((match = tagRegex.exec(line)) !== null) {
                    const full = match[0];
                    const isClosing = match[1] === '/';
                    let tagName = match[2] ? match[2].toLowerCase() : '';
                    const selfClosingSlash = match[4] === '/';
                    const isSelfClosing = selfClosingSlash || full.endsWith('/>');
                    const voidTags = ['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr'];
                    const isVoid = voidTags.includes(tagName);
                    if (!isClosing && !isSelfClosing && !isVoid) {
                        currentDepth++;
                        tagStack.push({ tagName, line: i+1, depth: currentDepth });
                    } else if (isClosing) {
                        if (tagStack.length === 0) errors.push({ line: i+1, message: `Unexpected closing tag </${tagName}> — no matching open tag.`, depth: currentDepth });
                        else {
                            const last = tagStack.pop();
                            if (last.tagName !== tagName) {
                                errors.push({ line: i+1, message: `Mismatched closing: expected </${last.tagName}>, got </${tagName}>.`, depth: last.depth });
                                tagStack.push(last);
                            } else { currentDepth--; }
                        }
                    }
                }
            }
            for (const leftover of tagStack) errors.push({ line: leftover.line, message: `Unclosed tag <${leftover.tagName}> — missing closing tag.`, depth: leftover.depth });
            const unique = new Map();
            for (const e of errors) { const key = `${e.line}|${e.message.substring(0,70)}`; if (!unique.has(key)) unique.set(key, e); }
            return Array.from(unique.values());
        }
        
        function getInnermostError(errors) {
            if (!errors.length) return null;
            return errors.reduce((best, curr) => {
                const currDepth = curr.depth ?? 0;
                const bestDepth = best.depth ?? 0;
                if (currDepth > bestDepth) return curr;
                if (currDepth === bestDepth && curr.line < best.line) return curr;
                return best;
            }, errors[0]);
        }
        
        // Ensure accurate line-numbers counting representation on input change
        function runValidation() {
            if (!editor) return;
            const rawCode = editor.value;
            if (rawCode.trim() === '') {
                currentErrors = [];
                updateSummary();
                renderFullErrorPanel();
                clearHighlight();
                fullSync();
                return;
            }
            let mode = modeSelect.value;
            if (mode === 'auto') {
                const trimmed = rawCode.trim();
                if (trimmed.startsWith('<?xml') || /^\s*<svg\b/i.test(trimmed) || /^\s*<\?xml/.test(trimmed) || (trimmed.includes('xmlns') && !/<html\b/i.test(trimmed))) mode = 'xml';
                else mode = 'html';
            }
            let errors = (mode === 'xml') ? validateXmlSvg(rawCode) : validateHtmlRobust(rawCode);
            const totalLines = rawCode.split('\n').length;
            errors = errors.filter(e => e.line >= 1 && e.line <= totalLines);
            currentErrors = errors;
            updateSummary();
            renderFullErrorPanel();
            const innermost = getInnermostError(currentErrors);
            if (innermost) jumpToLine(innermost.line);
            else clearHighlight();
            fullSync();
        }
        
        function scheduleValidation() { if (validationTimeout) clearTimeout(validationTimeout); validationTimeout = setTimeout(runValidation, 300); }
        
        // ----- Build editor DOM with perfect sync setup -----
        function buildEditorDOM() {
            const wrapper = document.createElement('div');
            wrapper.className = 'editor-with-lines';
            wrapper.innerHTML = `
                <div class="line-numbers" id="lineNumbers"></div>
                <div class="editor-wrapper">
                    <div class="backdrop" id="backdrop">
                        <div class="highlights" id="highlights"></div>
                    </div>
                    <textarea id="codeEditor" placeholder="Paste HTML, XML or SVG markup..."></textarea>
                </div>
            `;
            return wrapper;
        }
        
        function initEditor(content = '') {
            editorContainer.innerHTML = '';
            const newEditorDOM = buildEditorDOM();
            editorContainer.appendChild(newEditorDOM);
            
            editor = document.getElementById('codeEditor');
            lineNumbersDiv = document.getElementById('lineNumbers');
            backdrop = document.getElementById('backdrop');
            highlightsDiv = document.getElementById('highlights');
            
            if (!editor) return;
            editor.value = content;
            
            // Event listeners
            editor.addEventListener('input', function() { scheduleValidation(); updateOverlay(); updateLineNumbers(); });
            editor.addEventListener('scroll', syncScroll);
            
            // Apply line numbers and wrap setting
            applyLineNumbersAndWrapVisibility();
            
            // Initial sync
            fullSync();
            
            // Use ResizeObserver to catch any layout changes
            const resizeObserver = new ResizeObserver(() => { fullSync(); });
            resizeObserver.observe(editor);
            
            const editorAreaRoot = document.getElementById('editorAreaRoot');
            if (editorAreaRoot) resizeObserver.observe(editorAreaRoot);
            
            // Run validation after DOM is ready
            setTimeout(() => { runValidation(); }, 10);
        }
        
        // ----- File handlers (modern + fallback) -----
        async function loadFileModern() {
            try {
                if (!window.showOpenFilePicker) throw new Error('File System Access API not supported');
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{ description: 'Markup files', accept: { 'text/html': ['.html','.htm'], 'application/xml': ['.xml','.svg','.xhtml'] } }]
                });
                const file = await fileHandle.getFile();
                const contents = await file.text();
                const baseName = file.name.replace(/\.[^/.]+$/, '') || 'document';
                loadedFileName = baseName;
                updateFileStatus();
                if (editor) editor.value = contents;
                resultContainer.innerHTML = '';
                clearHighlight();
                fullSync();
                scheduleValidation();
            } catch (err) {
                if (err.name !== 'AbortError') legacyFileInput();
            }
        }
        
        function legacyFileInput() {
            const inp = document.createElement('input');
            inp.type = 'file';
            inp.accept = '.html,.htm,.xml,.svg,.txt,.xhtml,.xslt';
            inp.onchange = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const baseName = file.name.replace(/\.[^/.]+$/, '') || 'document';
                loadedFileName = baseName;
                updateFileStatus();
                const reader = new FileReader();
                reader.onload = (e) => {
                    if (editor) editor.value = e.target.result;
                    resultContainer.innerHTML = '';
                    clearHighlight();
                    fullSync();
                    scheduleValidation();
                };
                reader.onerror = () => { alert("Unable to read file."); loadedFileName = null; updateFileStatus(); };
                reader.readAsText(file, "UTF-8");
            };
            inp.click();
        }
        
        async function pasteFromClip() {
            try {
                const text = await navigator.clipboard.readText();
                if (editor) editor.value = text;
                loadedFileName = null;
                updateFileStatus();
                resultContainer.innerHTML = '';
                clearHighlight();
                fullSync();
                scheduleValidation();
            } catch (err) { alert("Clipboard read failed."); }
        }
        
        function saveToFile() {
            if (!editor) return;
            const content = editor.value;
            if (!content) return alert('No content to save.');
            let ext = '.txt';
            const mode = modeSelect.value;
            if (mode === 'html') ext = '.html';
            else if (mode === 'xml') ext = '.xml';
            else {
                if (/<html/i.test(content)) ext = '.html';
                else if (/<svg/i.test(content)) ext = '.svg';
                else ext = '.xml';
            }
            const finalBase = loadedFileName ? `${loadedFileName}_validated` : 'validated_markup';
            const filename = finalBase + ext;
            const blob = new Blob([content], {type: 'text/plain'});
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        async function copyEditorText() { 
            if (!editor) return;
            await navigator.clipboard.writeText(editor.value); 
            const copyBtn = document.getElementById('copyBtn');
            if (copyBtn) { const orig = copyBtn.textContent; copyBtn.textContent = '✓'; setTimeout(() => copyBtn.textContent = orig, 1000); }
        }
        
        function clearAll() { 
            if (editor) editor.value = ''; 
            loadedFileName = null; 
            updateFileStatus(); 
            resultContainer.innerHTML = ''; 
            clearHighlight(); 
            fullSync(); 
            scheduleValidation(); 
        }
        
        function updateFileStatus() {
            if (loadedFileName) { fileStatusBadge.innerHTML = `📄 ${loadedFileName}`; fileStatusBadge.style.background = "var(--app-file-status-active)"; }
            else { fileStatusBadge.innerHTML = `📄 no file loaded`; fileStatusBadge.style.background = "var(--app-file-status-bg)"; }
        }
        
        // ----- Mode change -----
        function onModeChange() {
            const currentContent = editor ? editor.value : `<div>
  <h1>Title missing closing tag</h1>
  <p>Unclosed paragraph</p>
  <img src="photo.jpg" alt="demo" > 
  <span class="test">Text
    <b>Bold deep inside</b>
  </span>
</div>`;
            resultContainer.innerHTML = '';
            currentErrors = [];
            currentHighlightedLine = null;
            updateSummary();
            // Rebuild editor completely (kills any lingering artifacts)
            initEditor(currentContent);
        }
        
        function bindGlobalButtons() {
            const loadBtn = document.getElementById('loadBtn');
            const pasteBtn = document.getElementById('pasteBtn');
            const saveBtn = document.getElementById('saveBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const jumpBtn = document.getElementById('jumpToInnerBtn');
            const toggleLineNumbersBtn = document.getElementById('toggleLineNumbersBtn');
            const toggleWrapBtn = document.getElementById('toggleWrapBtn');
            if (loadBtn) loadBtn.addEventListener('click', loadFileModern);
            if (pasteBtn) pasteBtn.addEventListener('click', pasteFromClip);
            if (saveBtn) saveBtn.addEventListener('click', saveToFile);
            if (copyBtn) copyBtn.addEventListener('click', copyEditorText);
            if (clearBtn) clearBtn.addEventListener('click', clearAll);
            if (toggleLineNumbersBtn) toggleLineNumbersBtn.addEventListener('click', toggleLineNumbers);
            if (toggleWrapBtn) toggleWrapBtn.addEventListener('click', toggleWrap);
            modeSelect.addEventListener('change', onModeChange);
        }
        
        const initialContent = `<div>
  <h1>Title missing closing tag</h1>
  <p>Unclosed paragraph</p>
  <img src="photo.jpg" alt="demo" > 
  <span class="test">Text
    <b>Bold deep inside</b>
  </span>
</div>`;
        initEditor(initialContent);
        bindGlobalButtons();

        // ----- Test Bridge exposure -----
        if (/[?&]test=/.test(window.location.search)) {
            window.__TEST_API__ = {
                getEditor: () => editor,
                getLineNumbersDiv: () => lineNumbersDiv,
                getBackdrop: () => backdrop,
                getHighlightsDiv: () => highlightsDiv,
                getResultContainer: () => resultContainer,
                getSummaryLabel: () => summaryLabel,
                getModeSelect: () => modeSelect,
                getCurrentErrors: () => currentErrors,
                getCurrentHighlightedLine: () => currentHighlightedLine,
                getShowLineNumbers: () => showLineNumbers,
                getLineWrapEnabled: () => lineWrapEnabled,
                validateXmlSvg: validateXmlSvg,
                validateHtmlRobust: validateHtmlRobust,
                runValidation: runValidation,
                toggleLineNumbers: toggleLineNumbers,
                toggleWrap: toggleWrap,
                clearAll: clearAll,
                jumpToLine: jumpToLine,
                showToast: showToast,
                initContent: (txt) => { if (editor) { editor.value = txt; runValidation(); } }
            };

            // Inject companion test file
            const script = document.createElement('script');
            script.src = 'MarkupLinter_v1_31_0_tests.js';
            script.onload = () => {
                if (/[?&]test=run/.test(window.location.search)) {
                    setTimeout(() => {
                        if (typeof window.__runTests === 'function') {
                            window.__runTests();
                        }
                    }, 500);
                }
            };
            document.head.appendChild(script);
        }
    })();
</script>
