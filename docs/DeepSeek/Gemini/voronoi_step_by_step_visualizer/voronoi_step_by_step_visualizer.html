<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voronoi Generation Step-by-Step</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #f0f2f5; }
        .svg-container {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            background: #ffffff;
            /* Ensures SVG scales nicely while keeping the 100x100 aspect ratio */
            width: 100%;
            max-width: 500px; 
            aspect-ratio: 1 / 1;
        }
        svg { width: 100%; height: 100%; }
        /* Custom scrollbar for math panel */
        .math-panel::-webkit-scrollbar { width: 8px; }
        .math-panel::-webkit-scrollbar-track { background: #1f2937; }
        .math-panel::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen text-gray-800 p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-6xl w-full">
        <header class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Voronoi Step-by-Step</h1>
                <p class="text-sm text-gray-600 mt-1">Grid size: 100x100. Watch how half-plane intersections are calculated.</p>
            </div>
            <button onclick="generateNew()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md transition">
                Generate New Points
            </button>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Left Side: SVG Visualization -->
            <div class="flex-1 flex flex-col items-center">
                <div class="svg-container rounded-lg overflow-hidden relative border border-gray-300" id="svg-wrapper">
                    <!-- SVG gets injected here -->
                </div>

                <!-- Playback Controls -->
                <div class="w-full max-w-[500px] mt-6 bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                    <div class="flex items-center gap-4 mb-4">
                        <button onclick="stepPrev()" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-700 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="play-btn" onclick="togglePlay()" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition">
                            Play
                        </button>
                        <button onclick="stepNext()" class="p-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-700 transition">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                    <div class="flex items-center gap-4">
                        <span id="step-counter" class="text-sm font-medium w-16 text-right">0 / 0</span>
                        <input type="range" id="step-slider" min="0" max="0" value="0" class="flex-1 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" oninput="goToStep(this.value)">
                    </div>
                    <!-- Legend -->
                    <div class="mt-4 flex flex-wrap gap-3 text-xs justify-center text-gray-600">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-500"></span> Target (pA)</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500"></span> Compare (pB)</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-400"></span> Curr Point</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Next Point</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-500"></span> Intersect</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-orange-500 flex items-center justify-center text-[8px] text-white font-bold">n</span> Normal Vector</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Explanation and Math Panel -->
            <div class="flex-1 flex flex-col gap-4">
                <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 flex-1">
                    <h2 class="text-xl font-bold mb-2 text-gray-800" id="step-title">Initialization</h2>
                    <p class="text-gray-600 mb-4" id="step-desc">Generating random points and creating the base 100x100 bounding box.</p>
                    
                    <!-- Math Live View -->
                    <div class="bg-gray-900 rounded-lg p-4 overflow-hidden flex flex-col" style="min-height: 280px;">
                        <h3 class="text-xs uppercase tracking-wider text-gray-400 mb-2 font-semibold">Live Math Calculations</h3>
                        <div id="math-details" class="font-mono text-sm text-green-400 whitespace-pre-wrap flex-1 math-panel overflow-y-auto">
                            <!-- Math injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    // --- CORE LOGIC & RECORDER ---
    class Vector {
        constructor(x, y) { this.x = x; this.y = y; }
    }
    const copyPoly = (poly) => poly.map(p => new Vector(p.x, p.y));

    let recordedSteps = [];
    let currentStepIdx = 0;
    let playInterval = null;
    let isPlaying = false;

    // Simulate the exact algorithm, but record the state into `recordedSteps` at every crucial point
    function runAndRecordVoronoi(points, width, height) {
        recordedSteps = [];
        const baseBox = [
            new Vector(0, 0), new Vector(width, 0),
            new Vector(width, height), new Vector(0, height)
        ];
        const completedCells = [];

        recordedSteps.push({
            type: 'START', title: 'Initialization',
            desc: `Created canvas of ${width}x${height} and placed ${points.length} random points. Each cell starts assuming it owns the entire canvas (the base bounding box).`,
            points, completedCells: [], cellPoly: copyPoly(baseBox)
        });

        for (let i = 0; i < points.length; i++) {
            let cellPoly = [...baseBox];
            const pA = points[i];

            recordedSteps.push({
                type: 'SELECT_PA', title: `Processing Point ${i+1}`,
                desc: `Selected target point pA (${pA.x.toFixed(1)}, ${pA.y.toFixed(1)}). We will now compare it against every other point to slice its bounding box.`,
                points, completedCells: copyPolyList(completedCells), pA, cellPoly: copyPoly(cellPoly)
            });

            for (let j = 0; j < points.length; j++) {
                if (i === j) continue;
                const pB = points[j];
                const mid = new Vector((pA.x + pB.x) / 2, (pA.y + pB.y) / 2);
                const normal = new Vector(pB.x - pA.x, pB.y - pA.y);

                recordedSteps.push({
                    type: 'COMPARE_PB', title: `Bisector Calculation`,
                    desc: `Comparing pA with pB (${pB.x.toFixed(1)}, ${pB.y.toFixed(1)}).\nCalculated their midpoint and the perpendicular bisector. The normal vector (n) points towards pB.`,
                    points, completedCells: copyPolyList(completedCells), pA, pB, mid, normal, cellPoly: copyPoly(cellPoly)
                });

                // --- CLIP POLYGON LOGIC ---
                const clipped = [];
                if (cellPoly.length > 0) {
                    for (let k = 0; k < cellPoly.length; k++) {
                        const current = cellPoly[k];
                        const next = cellPoly[(k + 1) % cellPoly.length];
                        
                        const currDist = (current.x - mid.x) * normal.x + (current.y - mid.y) * normal.y;
                        const nextDist = (next.x - mid.x) * normal.x + (next.y - mid.y) * normal.y;

                        recordedSteps.push({
                            type: 'CHECK_EDGE', title: `Checking Edge ${k+1}`,
                            desc: `Testing the polygon edge from 'Current' to 'Next'. We calculate the dot product distance of both points to the bisector line using the normal vector.`,
                            points, completedCells: copyPolyList(completedCells), pA, pB, mid, normal, 
                            cellPoly: copyPoly(cellPoly), clippedPoly: copyPoly(clipped),
                            current, next, currDist, nextDist
                        });

                        if (currDist <= 0) {
                            clipped.push(current);
                            recordedSteps.push({
                                type: 'KEEP_CURRENT', title: `Vertex Inside Region`,
                                desc: `currDist <= 0. The 'Current' vertex is "behind" the normal vector (on pA's side). It is kept in the new polygon.`,
                                points, completedCells: copyPolyList(completedCells), pA, pB, mid, normal, 
                                cellPoly: copyPoly(cellPoly), clippedPoly: copyPoly(clipped),
                                current, next, currDist, nextDist
                            });
                        }

                        if ((currDist > 0 && nextDist <= 0) || (currDist <= 0 && nextDist > 0)) {
                            const t = currDist / (currDist - nextDist);
                            const intersectX = current.x + t * (next.x - current.x);
                            const intersectY = current.y + t * (next.y - current.y);
                            const intersect = new Vector(intersectX, intersectY);
                            clipped.push(intersect);

                            recordedSteps.push({
                                type: 'INTERSECTION', title: `Edge Intersection Found`,
                                desc: `The edge crosses the bisector (distances have opposite signs). We calculate the exact intersection point and add it to the new polygon.`,
                                points, completedCells: copyPolyList(completedCells), pA, pB, mid, normal, 
                                cellPoly: copyPoly(cellPoly), clippedPoly: copyPoly(clipped),
                                current, next, currDist, nextDist, t, intersect
                            });
                        }
                    }
                }
                
                cellPoly = clipped;
                recordedSteps.push({
                    type: 'AFTER_CLIP', title: `Clip Complete for pB`,
                    desc: `Finished slicing the polygon against pB. The remaining area represents space closer to pA than pB.`,
                    points, completedCells: copyPolyList(completedCells), pA, pB, mid, normal, cellPoly: copyPoly(cellPoly)
                });
            }
            
            completedCells.push({ point: pA, poly: cellPoly, colorIndex: i });
            recordedSteps.push({
                type: 'CELL_COMPLETE', title: `Voronoi Cell Finalized`,
                desc: `pA has been compared against all other points. Its final Voronoi cell is complete!`,
                points, completedCells: copyPolyList(completedCells), pA, cellPoly: copyPoly(cellPoly)
            });
        }

        recordedSteps.push({
            type: 'DONE', title: `Diagram Complete`,
            desc: `All points processed successfully. Here is the final Voronoi Diagram.`,
            points, completedCells: copyPolyList(completedCells)
        });
    }

    // Helper to deep copy completed cells array
    function copyPolyList(list) {
        return list.map(c => ({ point: new Vector(c.point.x, c.point.y), poly: copyPoly(c.poly), colorIndex: c.colorIndex }));
    }

    // --- RENDERING LOGIC ---
    function renderStep(idx) {
        if (idx < 0 || idx >= recordedSteps.length) return;
        const step = recordedSteps[idx];
        
        // Update UI Text
        document.getElementById('step-title').innerText = step.title;
        document.getElementById('step-desc').innerText = step.desc;
        document.getElementById('step-counter').innerText = `${idx} / ${recordedSteps.length - 1}`;
        document.getElementById('step-slider').value = idx;

        // Build SVG with defs for the arrow marker
        let svg = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">`;
        svg += `
            <defs>
                <marker id="normal-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                    <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316" />
                </marker>
            </defs>
        `;
        
        // 1. Draw Grid
        svg += `<g stroke="#e5e7eb" stroke-width="0.5">`;
        for(let i=0; i<=100; i+=10) {
            svg += `<line x1="${i}" y1="0" x2="${i}" y2="100"/>`;
            svg += `<line x1="0" y1="${i}" x2="100" y2="${i}"/>`;
            if (i > 0 && i < 100) {
                // Axis labels with high contrast explicitly overriding the stroke
                svg += `<text x="${i}" y="3" font-size="2.5" font-weight="bold" fill="#1f2937" stroke="none" text-anchor="middle">${i}</text>`;
                svg += `<text x="1" y="${i}" font-size="2.5" font-weight="bold" fill="#1f2937" stroke="none" alignment-baseline="middle">${i}</text>`;
            }
        }
        svg += `</g>`;

        // 2. Draw Completed Cells
        step.completedCells.forEach(cell => {
            if(cell.poly.length < 3) return;
            const pointsStr = cell.poly.map(p => `${p.x},${p.y}`).join(' ');
            const hue = (cell.colorIndex * 37) % 360;
            svg += `<polygon points="${pointsStr}" fill="hsl(${hue}, 60%, 85%)" stroke="#4a5568" stroke-width="0.5"/>`;
        });

        // 3. Draw Current Target Cell (being clipped)
        if (step.cellPoly && step.cellPoly.length > 0) {
            const pointsStr = step.cellPoly.map(p => `${p.x},${p.y}`).join(' ');
            svg += `<polygon points="${pointsStr}" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2,1"/>`;
        }

        // 4. Draw Accumulating Clipped Poly (during edge check)
        if (step.clippedPoly && step.clippedPoly.length > 0) {
            const pointsStr = step.clippedPoly.map(p => `${p.x},${p.y}`).join(' ');
            svg += `<polyline points="${pointsStr}" fill="none" stroke="#22c55e" stroke-width="0.8"/>`;
            step.clippedPoly.forEach(p => {
                svg += `<circle cx="${p.x}" cy="${p.y}" r="0.8" fill="#22c55e"/>`;
            });
        }

        // 5. Draw Bisector Line and Normal Vector
        if (step.mid && step.normal) {
            let dirX = -step.normal.y;
            let dirY = step.normal.x;
            const len = Math.sqrt(dirX*dirX + dirY*dirY);
            if(len > 0) { dirX /= len; dirY /= len; }
            
            const p1x = step.mid.x - dirX * 200;
            const p1y = step.mid.y - dirY * 200;
            const p2x = step.mid.x + dirX * 200;
            const p2y = step.mid.y + dirY * 200;
            
            // The dividing line
            svg += `<line x1="${p1x}" y1="${p1y}" x2="${p2x}" y2="${p2y}" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="1,1"/>`;
            svg += `<circle cx="${step.mid.x}" cy="${step.mid.y}" r="1" fill="#ef4444"/>`;

            // Draw Normal Vector (n)
            let nX = step.normal.x;
            let nY = step.normal.y;
            const nLen = Math.sqrt(nX*nX + nY*nY);
            if (nLen > 0) {
                nX /= nLen;
                nY /= nLen;
                const arrowLen = 12; // Visual length of the vector
                const ex = step.mid.x + nX * arrowLen;
                const ey = step.mid.y + nY * arrowLen;

                // The Orange Arrow
                svg += `<line x1="${step.mid.x}" y1="${step.mid.y}" x2="${ex}" y2="${ey}" stroke="#f97316" stroke-width="0.8" marker-end="url(#normal-arrow)"/>`;
                
                // Label 'n'
                const lx = step.mid.x + nX * (arrowLen + 4);
                const ly = step.mid.y + nY * (arrowLen + 4);
                svg += `<text x="${lx}" y="${ly}" font-size="4" fill="#f97316" font-family="monospace" font-weight="bold" text-anchor="middle" alignment-baseline="middle" stroke="none">n</text>`;
            }
        }

        // 6. Draw Edge Being Checked
        if (step.current && step.next) {
            svg += `<line x1="${step.current.x}" y1="${step.current.y}" x2="${step.next.x}" y2="${step.next.y}" stroke="#eab308" stroke-width="0.8"/>`;
            svg += `<circle cx="${step.current.x}" cy="${step.current.y}" r="1.5" fill="#eab308"/>`; // Current
            svg += `<circle cx="${step.next.x}" cy="${step.next.y}" r="1.5" fill="#a855f7"/>`; // Next
        }

        // 7. Draw Intersection
        if (step.intersect) {
            svg += `<circle cx="${step.intersect.x}" cy="${step.intersect.y}" r="1.5" fill="#22c55e" stroke="#fff" stroke-width="0.5"/>`;
        }

        // 8. Draw All Seed Points
        step.points.forEach(p => {
            svg += `<circle cx="${p.x}" cy="${p.y}" r="1.2" fill="#6b7280"/>`;
        });

        // Highlight Active Points
        if (step.pA) svg += `<circle cx="${step.pA.x}" cy="${step.pA.y}" r="2" fill="#3b82f6" stroke="#fff" stroke-width="0.5"/>`;
        if (step.pB) svg += `<circle cx="${step.pB.x}" cy="${step.pB.y}" r="2" fill="#ef4444" stroke="#fff" stroke-width="0.5"/>`;

        svg += `</svg>`;
        document.getElementById('svg-wrapper').innerHTML = svg;

        // Update Math Details Panel
        updateMathPanel(step);
    }

    function updateMathPanel(step) {
        const p = document.getElementById('math-details');
        if (!['CHECK_EDGE', 'KEEP_CURRENT', 'INTERSECTION'].includes(step.type)) {
            p.innerHTML = `<span class="text-gray-500 italic">// Math calculations are only active during edge clipping.</span>`;
            return;
        }

        const m = step.mid, n = step.normal, c = step.current, nxt = step.next;
        let t = `// Line defined by point 'mid' and vector 'normal'\n`;
        t += `mid = (${m.x.toFixed(2)}, ${m.y.toFixed(2)})\n`;
        t += `normal (n) = (${n.x.toFixed(2)}, ${n.y.toFixed(2)})\n\n`;

        t += `// Dot Product Distances (dist <= 0 is kept)\n`;
        t += `currDist = (curr.x - mid.x)*n.x + (curr.y - mid.y)*n.y\n`;
        t += `         = (${c.x.toFixed(1)} - ${m.x.toFixed(1)})*${n.x.toFixed(1)} + (${c.y.toFixed(1)} - ${m.y.toFixed(1)})*${n.y.toFixed(1)}\n`;
        t += `         = <span class="text-white font-bold">${step.currDist.toFixed(2)}</span>\n\n`;

        t += `nextDist = (next.x - mid.x)*n.x + (next.y - mid.y)*n.y\n`;
        t += `         = (${nxt.x.toFixed(1)} - ${m.x.toFixed(1)})*${n.x.toFixed(1)} + (${nxt.y.toFixed(1)} - ${m.y.toFixed(1)})*${n.y.toFixed(1)}\n`;
        t += `         = <span class="text-white font-bold">${step.nextDist.toFixed(2)}</span>\n\n`;

        if (step.type === 'KEEP_CURRENT') {
            t += `<span class="text-blue-300">// Action: currDist <= 0, keeping current vertex.</span>`;
        }

        if (step.type === 'INTERSECTION') {
            t += `// Signs differ! Calculating exact intersection 't' ratio:\n`;
            t += `t = currDist / (currDist - nextDist)\n`;
            t += `  = ${step.currDist.toFixed(2)} / (${step.currDist.toFixed(2)} - ${step.nextDist.toFixed(2)})\n`;
            t += `  = <span class="text-yellow-400 font-bold">${step.t.toFixed(3)}</span>\n\n`;

            t += `intX = curr.x + t * (next.x - curr.x)\n`;
            t += `     = ${c.x.toFixed(1)} + ${step.t.toFixed(3)} * (${nxt.x.toFixed(1)} - ${c.x.toFixed(1)})\n`;
            t += `     = <span class="text-white font-bold">${step.intersect.x.toFixed(1)}</span>\n\n`;

            t += `intY = curr.y + t * (next.y - curr.y)\n`;
            t += `     = ${c.y.toFixed(1)} + ${step.t.toFixed(3)} * (${nxt.y.toFixed(1)} - ${c.y.toFixed(1)})\n`;
            t += `     = <span class="text-white font-bold">${step.intersect.y.toFixed(1)}</span>\n`;
            
            t += `\n<span class="text-blue-300">// Action: Added new intersection vertex.</span>`;
        }

        p.innerHTML = t;
    }

    // --- CONTROLS ---
    function generateNew() {
        if(isPlaying) togglePlay();
        // Generate 3 random points within a 10-90 bound to keep them nicely visible on the 100x100 canvas
        const pointsCount = 3;
        const pts = Array.from({ length: pointsCount }, () => new Vector(
            10 + Math.random() * 80,
            10 + Math.random() * 80
        ));
        
        runAndRecordVoronoi(pts, 100, 100);
        
        document.getElementById('step-slider').max = recordedSteps.length - 1;
        currentStepIdx = 0;
        renderStep(currentStepIdx);
    }

    function stepNext() {
        if (currentStepIdx < recordedSteps.length - 1) {
            currentStepIdx++;
            renderStep(currentStepIdx);
        } else if (isPlaying) {
            togglePlay(); // auto stop at end
        }
    }

    function stepPrev() {
        if (currentStepIdx > 0) {
            currentStepIdx--;
            renderStep(currentStepIdx);
        }
    }

    function goToStep(val) {
        currentStepIdx = parseInt(val);
        renderStep(currentStepIdx);
    }

    function togglePlay() {
        const btn = document.getElementById('play-btn');
        isPlaying = !isPlaying;
        if (isPlaying) {
            if(currentStepIdx >= recordedSteps.length - 1) currentStepIdx = 0; // restart if at end
            btn.innerText = 'Pause';
            btn.classList.remove('bg-green-500', 'hover:bg-green-600');
            btn.classList.add('bg-yellow-500', 'hover:bg-yellow-600');
            playInterval = setInterval(stepNext, 800); // 800ms per step
        } else {
            btn.innerText = 'Play';
            btn.classList.remove('bg-yellow-500', 'hover:bg-yellow-600');
            btn.classList.add('bg-green-500', 'hover:bg-green-600');
            clearInterval(playInterval);
        }
    }

    // Init on load
    window.onload = () => {
        generateNew();
    };
</script>
</body>
</html>
