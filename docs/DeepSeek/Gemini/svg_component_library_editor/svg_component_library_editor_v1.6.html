<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Component Library Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Exact layout matching for the text editor and its highlight backdrop */
        .code-layer {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 1rem;
            margin: 0;
            border: none;
            box-sizing: border-box;
            white-space: pre-wrap;
            word-wrap: break-word;
            tab-size: 2;
            text-align: left;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Hide the backdrop's scrollbar so it perfectly aligns with the textarea */
        #editor-backdrop::-webkit-scrollbar { width: 8px; }
        #editor-backdrop::-webkit-scrollbar-track { background: transparent; }
        #editor-backdrop::-webkit-scrollbar-thumb { background: transparent; }

        /* Custom scrollbar for the code editor */
        #svg-editor::-webkit-scrollbar { width: 8px; }
        #svg-editor::-webkit-scrollbar-track { background: transparent; }
        #svg-editor::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        #svg-editor::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        #editor-backdrop mark {
            background-color: #bfdbfe; /* tailwind blue-200 */
            color: transparent;
            border-radius: 2px;
        }

        /* Ensures the SVG preview fits nicely inside the bounds */
        #preview-container svg {
            max-width: 100%;
            max-height: 100%;
            drop-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* * Highlighting Styles 
         */
        .svg-highlight, .svg-highlight * {
            stroke: #3b82f6 !important; /* Tailwind blue-500 */
            stroke-width: var(--highlight-width, 2) !important;
            transition: all 0.1s ease-in-out;
        }
        
        /* Group containers are never filled implicitly */
        g.svg-highlight, symbol.svg-highlight, svg.svg-highlight {
            fill: none !important;
        }
        
        /* Default highlight (applies a light blue fill) */
        #preview-container .svg-highlight:not(g):not(symbol):not(svg), 
        #preview-container .svg-highlight *:not(g):not(symbol):not(svg) {
            fill: rgba(59, 130, 246, 0.25) !important;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans text-slate-800 overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M17.5 19.2c-2.05-.03-5.32-.97-6.5-1.92-1.18.95-4.45 1.89-6.5 1.92A2 2 0 0 1 2.5 17.2V6.8a2 2 0 0 1 2-2h15a2 2 0 0 1 2 2v10.4a2 2 0 0 1-2 2z"></path><path d="m7.5 9.8 4 3.2 4-3.2"></path></svg>
            <h1 class="text-lg font-semibold text-slate-700 hidden sm:flex items-center">
                SVG Component Editor
                <span class="ml-2 px-1.5 py-0.5 rounded bg-slate-100 border border-slate-200 text-[10px] text-slate-500 font-mono tracking-wider">v1.6</span>
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <span id="error-badge" class="hidden px-2 py-1 bg-red-100 text-red-600 text-xs font-semibold rounded mr-2">Syntax Error</span>
            <button id="toggle-grid-btn" class="px-3 py-1.5 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded transition-colors border border-slate-200" title="Toggle scalable background grid">
                Toggle Grid
            </button>
            <button id="download-btn" class="px-3 py-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded transition-colors shadow-sm">
                Save Fragment
            </button>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-1 flex flex-col lg:flex-row min-h-0">
        
        <!-- Preview Panel -->
        <section class="flex-1 lg:w-1/2 flex flex-col border-b lg:border-b-0 lg:border-r border-slate-200 relative min-h-[40vh] lg:min-h-0 bg-white">
            <div class="px-4 py-2 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
                <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider">Visual Preview</h2>
                <span id="grid-size-label" class="text-xs text-slate-500 bg-slate-200 px-2 py-0.5 rounded-full font-mono">Grid: 10</span>
            </div>
            
            <!-- Dynamic SVG Container -->
            <div class="flex-1 relative overflow-auto p-4 sm:p-8 flex items-center justify-center bg-[#f8fafc]">
                <div id="preview-container" class="w-full h-full min-h-[250px] flex items-center justify-center overflow-hidden">
                    <!-- Dynamic SVG Wrapper will be injected here -->
                </div>
            </div>
        </section>

        <!-- Editor Panel -->
        <section class="flex-1 lg:w-1/2 flex flex-col min-h-[40vh] lg:min-h-0 bg-white">
            <div class="px-4 py-2 border-b border-slate-100 bg-slate-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 shrink-0">
                <h2 class="text-sm font-medium text-slate-500 uppercase tracking-wider">Source Code</h2>
                
                <!-- Editor Options Toolbar -->
                <div class="flex flex-wrap items-center gap-3">
                    <label class="flex items-center gap-1 text-xs text-slate-600 cursor-pointer hover:text-blue-600 transition-colors border-r border-slate-200 pr-3">
                        <input type="checkbox" id="opt-highlight" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-3.5 h-3.5 cursor-pointer">
                        Highlight
                    </label>

                    <!-- History Group -->
                    <div class="flex items-center gap-1 border-r border-slate-200 pr-3">
                        <button id="btn-undo" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" title="Undo (Ctrl+Z)">⟲</button>
                        <button id="btn-redo" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" title="Redo (Ctrl+Y)">⟳</button>
                    </div>

                    <!-- Insert Group -->
                    <div class="flex items-center gap-1 border-r border-slate-200 pr-3">
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mr-1">Insert:</span>
                        <button id="ins-circle" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors" title="Insert Circle">◯</button>
                        <button id="ins-line" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors" title="Insert Line">╱</button>
                        <button id="ins-path" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors" title="Insert Path">〰</button>
                        <button id="ins-poly" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors" title="Insert Polygon">△</button>
                    </div>

                    <!-- Move Group -->
                    <div class="flex items-center gap-1 border-r border-slate-200 pr-3">
                        <span class="text-[10px] text-slate-400 uppercase tracking-wider font-semibold mr-1">Move:</span>
                        <button id="move-up" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors">▲</button>
                        <button id="move-down" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors">▼</button>
                        <button id="move-left" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors">◀</button>
                        <button id="move-right" class="px-1.5 py-0.5 text-[10px] bg-white border border-slate-300 rounded hover:bg-slate-50 text-slate-600 transition-colors">▶</button>
                    </div>

                    <!-- Delete Group -->
                    <div class="flex items-center gap-1">
                        <button id="btn-delete" class="px-1.5 py-0.5 text-[10px] bg-red-50 border border-red-200 rounded hover:bg-red-100 text-red-600 transition-colors font-medium" title="Delete Element">⌫ Del</button>
                    </div>

                    <button id="copy-btn" class="text-[10px] text-blue-600 hover:text-blue-800 font-medium transition-colors ml-auto sm:ml-0 border border-blue-200 hover:bg-blue-50 px-2 py-1 rounded">
                        Copy
                    </button>
                </div>
            </div>
            
            <!-- Editor Container (Overlaid text logic) -->
            <div class="relative flex-1 w-full bg-slate-50 overflow-hidden isolate focus-within:bg-white transition-colors">
                <div id="editor-backdrop" class="code-layer absolute inset-0 text-transparent z-0 pointer-events-none" aria-hidden="true"></div>
                <textarea id="svg-editor" class="code-layer absolute inset-0 text-slate-800 bg-transparent focus:outline-none resize-none z-10 w-full h-full" spellcheck="false" placeholder="Paste your <symbol> or SVG fragment here..."></textarea>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        Action successful
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('svg-editor');
            const backdrop = document.getElementById('editor-backdrop');
            const previewContainer = document.getElementById('preview-container');
            const toggleGridBtn = document.getElementById('toggle-grid-btn');
            const downloadBtn = document.getElementById('download-btn');
            const copyBtn = document.getElementById('copy-btn');
            const errorBadge = document.getElementById('error-badge');
            const gridSizeLabel = document.getElementById('grid-size-label');
            const toast = document.getElementById('toast');

            const optHighlight = document.getElementById('opt-highlight');
            const btnUndo = document.getElementById('btn-undo');
            const btnRedo = document.getElementById('btn-redo');

            let showGrid = true;
            let isHighlightEnabled = false;
            let currentHighlightId = -1;

            // History State Management
            let editHistory = [];
            let historyPos = -1;
            let isUndoRedoAction = false;
            let typingTimer;

            // Default NPN Transistor Fragment
            const defaultSVG = `<!-- NPN Transistor -->
<symbol id="npn" viewBox="0 0 100 100">
  <g stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="50" cy="50" r="42" stroke-width="2" />
    <line x1="0" y1="50" x2="35" y2="50" />
    <line x1="35" y1="28" x2="35" y2="72" stroke-width="4.5" />
    <path d="M 35 40 L 60 20 L 60 0" />
    <path d="M 35 60 L 60 80 L 60 100" />
    <polygon points="58,78 46,76 54,67" fill="currentColor" stroke-width="1.5" stroke-linejoin="miter"/>
  </g>
</symbol>`;

            // Initialize
            editor.value = defaultSVG;
            pushHistory();
            updatePreview();

            // Toggle Checkboxes Logic
            optHighlight.addEventListener('change', (e) => {
                isHighlightEnabled = e.target.checked;
                handleCursorMove();
            });

            // Prevent focus stealing for editor buttons
            const preventFocus = (e) => e.preventDefault();

            // Scroll Syncing for Code Highlight Backdrop
            editor.addEventListener('scroll', () => {
                backdrop.scrollTop = editor.scrollTop;
                backdrop.scrollLeft = editor.scrollLeft;
            });

            // HTML Escaper for Backdrop Injection
            function escapeHtml(str) {
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // History Functions
            function pushHistory() {
                const state = { val: editor.value, sel: editor.selectionStart };
                if (historyPos >= 0 && editHistory[historyPos].val === state.val) return;
                editHistory = editHistory.slice(0, historyPos + 1);
                editHistory.push(state);
                if (editHistory.length > 100) editHistory.shift();
                else historyPos++;
                updateHistoryBtns();
            }

            function updateHistoryBtns() {
                btnUndo.disabled = historyPos <= 0;
                btnRedo.disabled = historyPos >= editHistory.length - 1;
            }

            function applyHistory(index) {
                isUndoRedoAction = true;
                historyPos = index;
                const state = editHistory[historyPos];
                editor.value = state.val;
                editor.setSelectionRange(state.sel, state.sel);
                updatePreview();
                handleCursorMove();
                updateHistoryBtns();
                setTimeout(() => { isUndoRedoAction = false; }, 10);
            }

            function undo() { if (historyPos > 0) applyHistory(historyPos - 1); }
            function redo() { if (historyPos < editHistory.length - 1) applyHistory(historyPos + 1); }

            btnUndo.addEventListener('click', (e) => { preventFocus(e); undo(); });
            btnRedo.addEventListener('click', (e) => { preventFocus(e); redo(); });

            // Keyboard Shortcuts for Undo/Redo
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    if (e.shiftKey) redo(); else undo();
                } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    redo();
                }
            });
            
            // Tool Bindings
            document.getElementById('ins-circle').addEventListener('mousedown', (e) => { preventFocus(e); insertElement('\n    <circle cx="50" cy="50" r="10" />'); });
            document.getElementById('ins-line').addEventListener('mousedown', (e) => { preventFocus(e); insertElement('\n    <line x1="30" y1="50" x2="70" y2="50" />'); });
            document.getElementById('ins-path').addEventListener('mousedown', (e) => { preventFocus(e); insertElement('\n    <path d="M 30 50 L 70 50" />'); });
            document.getElementById('ins-poly').addEventListener('mousedown', (e) => { preventFocus(e); insertElement('\n    <polygon points="50,30 70,70 30,70" />'); });

            document.getElementById('move-up').addEventListener('mousedown', (e) => { preventFocus(e); moveElement(0, -1); });
            document.getElementById('move-down').addEventListener('mousedown', (e) => { preventFocus(e); moveElement(0, 1); });
            document.getElementById('move-left').addEventListener('mousedown', (e) => { preventFocus(e); moveElement(-1, 0); });
            document.getElementById('move-right').addEventListener('mousedown', (e) => { preventFocus(e); moveElement(1, 0); });

            document.getElementById('btn-delete').addEventListener('mousedown', (e) => { preventFocus(e); deleteElement(); });

            // Event Listeners for Editor
            editor.addEventListener('input', () => {
                updatePreview();
                handleCursorMove();
                
                if (!isUndoRedoAction) {
                    clearTimeout(typingTimer);
                    typingTimer = setTimeout(pushHistory, 500);
                }
            });
            
            // Re-evaluate highlight on any cursor movement
            editor.addEventListener('keyup', handleCursorMove);
            editor.addEventListener('click', handleCursorMove);
            editor.addEventListener('focus', handleCursorMove);

            // Toggle Grid
            toggleGridBtn.addEventListener('click', () => {
                showGrid = !showGrid;
                toggleGridBtn.classList.toggle('bg-slate-300', !showGrid);
                updatePreview();
            });

            function updatePreview() {
                const userCode = editor.value.trim();
                if (!userCode) {
                    previewContainer.innerHTML = '<div class="text-slate-400 font-medium">Empty Fragment</div>';
                    errorBadge.classList.add('hidden');
                    return;
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(`<svg xmlns="http://www.w3.org/2000/svg">${userCode}</svg>`, "image/svg+xml");
                
                const parseError = doc.querySelector('parsererror');
                if (parseError) {
                    errorBadge.classList.remove('hidden');
                    return; 
                } else {
                    errorBadge.classList.add('hidden');
                }

                const firstEl = doc.documentElement.firstElementChild;
                if (!firstEl) return;

                // Instrument all user nodes with a sequential ID that maps to the text string tags
                const nodes = doc.querySelectorAll('*');
                for (let i = 1; i < nodes.length; i++) {
                    nodes[i].setAttribute('data-editor-id', i - 1);
                }

                // Extract Metadata
                let viewBox = '0 0 100 100';
                let symbolId = 'custom-component';
                let isSymbol = firstEl.tagName.toLowerCase() === 'symbol';

                if (isSymbol || firstEl.tagName.toLowerCase() === 'svg') {
                    viewBox = firstEl.getAttribute('viewBox') || viewBox;
                    if (isSymbol) symbolId = firstEl.getAttribute('id') || symbolId;
                }

                // Grid Mathematics Setup based on viewBox
                const vbParts = viewBox.split(/[\s,]+/).map(Number);
                let vbX = 0, vbY = 0, vbW = 100, vbH = 100;
                if (vbParts.length === 4 && !vbParts.some(isNaN)) {
                    vbX = vbParts[0]; vbY = vbParts[1]; vbW = vbParts[2]; vbH = vbParts[3];
                }

                // Prevent infinite loop if viewbox dimensions are 0 or negative during editing
                if (vbW <= 0) vbW = 100;
                if (vbH <= 0) vbH = 100;

                const gridStep = vbW / 10;
                gridSizeLabel.textContent = `Grid: ${gridStep}`;
                
                const gridStrokeWidth = vbW * 0.002; 
                const highlightWidth = vbW * 0.02;
                previewContainer.style.setProperty('--highlight-width', highlightWidth);

                let defsContent = doc.documentElement.innerHTML;
                
                if (!isSymbol) {
                    defsContent = `<symbol id="${symbolId}" viewBox="${viewBox}">${defsContent}</symbol>`;
                }

                // Generate Labels and Expanded Viewbox when Grid is visible
                let previewViewBox = viewBox;
                let gridLabels = '';
                
                if (showGrid) {
                    // Add padding to the wrapper viewbox to prevent labels from clipping
                    let paddingX = vbW * 0.15;
                    let paddingY = vbH * 0.15;
                    previewViewBox = `${vbX - paddingX} ${vbY - paddingY} ${vbW + paddingX * 1.5} ${vbH + paddingY * 1.5}`;
                    
                    let fontSize = gridStep * 0.35;
                    gridLabels += `<g font-family="monospace" font-size="${fontSize}" fill="#64748b" text-anchor="middle" dominant-baseline="central">`;
                    
                    // X-axis labels (Top)
                    let xLabels = new Set([vbX, vbX + vbW]);
                    for (let i = 2; i * gridStep < vbW; i += 2) {
                        xLabels.add(vbX + i * gridStep);
                    }
                    xLabels.forEach(x => {
                        let val = parseFloat(x.toFixed(2));
                        gridLabels += `<text x="${x}" y="${vbY - fontSize * 1.5}">${val}</text>`;
                    });
                    
                    // Y-axis labels (Left)
                    let yLabels = new Set([vbY, vbY + vbH]);
                    for (let i = 2; i * gridStep < vbH; i += 2) {
                        yLabels.add(vbY + i * gridStep);
                    }
                    yLabels.forEach(y => {
                        let val = parseFloat(y.toFixed(2));
                        gridLabels += `<text x="${vbX - fontSize * 1.5}" y="${y}" text-anchor="end">${val}</text>`;
                    });
                    gridLabels += `</g>`;
                    
                    // Outer grid border to separate grid area from labels
                    gridLabels += `<rect x="${vbX}" y="${vbY}" width="${vbW}" height="${vbH}" fill="none" stroke="#94a3b8" stroke-width="${gridStrokeWidth * 2}" />`;
                }

                const previewSVG = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="${previewViewBox}" width="100%" height="100%" style="color: #0f172a; background-color: #ffffff; border-radius: 4px; border: 1px solid #e2e8f0;">
                        <defs>
                            <pattern id="editor-grid" width="${gridStep}" height="${gridStep}" patternUnits="userSpaceOnUse" x="${vbX}" y="${vbY}">
                                <path d="M ${gridStep} 0 L 0 0 L 0 ${gridStep}" fill="none" stroke="#cbd5e1" stroke-width="${gridStrokeWidth}"/>
                            </pattern>
                            ${defsContent}
                        </defs>
                        <!-- Grid Background -->
                        ${showGrid ? `<rect x="${vbX}" y="${vbY}" width="${vbW}" height="${vbH}" fill="url(#editor-grid)" />` : ''}
                        ${showGrid ? gridLabels : ''}
                        <!-- Component Instance -->
                        <use href="#${symbolId}" x="${vbX}" y="${vbY}" width="${vbW}" height="${vbH}" />
                    </svg>
                `;

                previewContainer.innerHTML = previewSVG;
                
                // Restore cursor highlight state mapping
                currentHighlightId = -1; 
                handleCursorMove();
            }

            // --- CURSOR TRACKING & HIGHLIGHTING LOGIC ---

            function updateBackdrop(text, targetNode) {
                if (!isHighlightEnabled || !targetNode) {
                    backdrop.innerHTML = escapeHtml(text) + '\n '; // trailing space protects scroll bounds
                    backdrop.scrollTop = editor.scrollTop;
                    return;
                }

                const before = text.slice(0, targetNode.start);
                const hlText = text.slice(targetNode.start, targetNode.end);
                const after = text.slice(targetNode.end);

                backdrop.innerHTML = escapeHtml(before) + 
                                     '<mark>' + escapeHtml(hlText) + '</mark>' + 
                                     escapeHtml(after) + '\n ';

                // Ensure the backdrop's scroll stays perfectly locked to the editor
                backdrop.scrollTop = editor.scrollTop;
            }

            function handleCursorMove() {
                const text = editor.value;
                const cursorPos = editor.selectionStart;
                const targetNode = getCursorElementBounds(text, cursorPos);
                
                // Always sync the text backdrop to reflect typing or highlights
                updateBackdrop(text, targetNode);

                if (!isHighlightEnabled) {
                    if (currentHighlightId !== -1) {
                        const oldEls = previewContainer.querySelectorAll('.svg-highlight');
                        oldEls.forEach(el => el.classList.remove('svg-highlight'));
                        currentHighlightId = -1;
                    }
                    return;
                }

                const elementIndex = targetNode ? targetNode.index : -1;

                if (elementIndex === currentHighlightId) return;

                // Remove previous SVG visual highlight
                if (currentHighlightId !== -1) {
                    const oldEls = previewContainer.querySelectorAll('.svg-highlight');
                    oldEls.forEach(el => el.classList.remove('svg-highlight'));
                }

                currentHighlightId = elementIndex;

                // Apply new SVG visual highlight
                if (elementIndex !== -1) {
                    const target = previewContainer.querySelector(`[data-editor-id="${elementIndex}"]`);
                    if (target) {
                        target.classList.add('svg-highlight');
                    }
                }
            }

            // Advanced SVG Element bounds scanner for cursor operations
            function getCursorElementBounds(text, cursorPos) {
                const regex = /(<!--[\s\S]*?-->)|(<\/?[a-zA-Z](?:[^>"']|"[^"]*"|'[^']*')*>)/g;
                let match;
                let elementCounter = -1;
                let stack = [];
                let elements = [];

                while ((match = regex.exec(text)) !== null) {
                    const tagStr = match[0];
                    const start = match.index;
                    const end = regex.lastIndex;

                    if (tagStr.startsWith('<!--')) continue;

                    if (tagStr.startsWith('</')) {
                        if (cursorPos >= start && cursorPos <= end) {
                            return stack.length > 0 ? stack[stack.length - 1] : null;
                        }
                        if (stack.length > 0) stack.pop();
                    } else {
                        elementCounter++;
                        const node = {
                            index: elementCounter,
                            start: start,
                            end: end,
                            str: tagStr,
                            isSelfClosing: /\/\s*>$/.test(tagStr)
                        };
                        elements.push(node);
                        
                        if (cursorPos >= start && cursorPos <= end) {
                            return node;
                        }

                        if (!node.isSelfClosing) {
                            stack.push(node);
                        }
                    }
                }
                
                // Fallback: if not strictly inside a tag, check if cursor is on a line with exactly one tag
                let lineStart = text.lastIndexOf('\n', cursorPos - 1) + 1;
                let lineEnd = text.indexOf('\n', cursorPos);
                if (lineEnd === -1) lineEnd = text.length;
                
                let tagsOnLine = elements.filter(el => el.start >= lineStart && el.end <= lineEnd);
                if (tagsOnLine.length === 1) {
                    return tagsOnLine[0];
                }

                return null;
            }

            function insertElement(svgTemplate) {
                const text = editor.value;
                const cursorPos = editor.selectionStart;
                const targetNode = getCursorElementBounds(text, cursorPos);
                
                if (historyPos >= 0 && editHistory[historyPos].val !== text) pushHistory();

                let insertPos;
                if (targetNode) {
                    insertPos = targetNode.end;
                } else {
                    insertPos = cursorPos;
                }

                const newText = text.slice(0, insertPos) + svgTemplate + text.slice(insertPos);
                editor.value = newText;
                
                // Set the cursor selection BEFORE updating the preview
                const newCursorPos = insertPos + svgTemplate.length;
                editor.setSelectionRange(newCursorPos, newCursorPos);
                
                updatePreview();
                pushHistory();
            }

            function deleteElement() {
                const text = editor.value;
                const cursorPos = editor.selectionStart;
                const targetNode = getCursorElementBounds(text, cursorPos);
                
                if (!targetNode) {
                    showToast("Place cursor on an element to delete it.");
                    return;
                }

                if (historyPos >= 0 && editHistory[historyPos].val !== text) pushHistory();

                let start = targetNode.start;
                let end = targetNode.end;

                // Smart whitespace cleanup (removes empty leading spaces if the element was alone on the line)
                let i = start - 1;
                while (i >= 0 && text[i] === ' ') i--;
                if (i < 0 || text[i] === '\n') {
                    start = i + 1; // Include leading spaces in the cut
                    if (text[end] === '\n') {
                        end += 1; // Include the trailing newline
                    } else if (text[end] === '\r' && text[end+1] === '\n') {
                        end += 2;
                    }
                }

                const newText = text.slice(0, start) + text.slice(end);
                editor.value = newText;
                
                editor.setSelectionRange(start, start);
                updatePreview();
                pushHistory();
            }

            function moveElement(dx, dy) {
                const text = editor.value;
                const cursorPos = editor.selectionStart;
                const targetNode = getCursorElementBounds(text, cursorPos);
                
                if (!targetNode) {
                    showToast("Place cursor on an element to move it.");
                    return;
                }

                if (historyPos >= 0 && editHistory[historyPos].val !== text) pushHistory();

                let str = targetNode.str;
                
                // Directly recalculate native attributes instead of transform="translate(x,y)"
                
                // 1. Simple coordinate attributes (circle, line, rect, text)
                const xAttrs = ['cx', 'x', 'x1', 'x2'];
                const yAttrs = ['cy', 'y', 'y1', 'y2'];

                xAttrs.forEach(attr => {
                    const regex = new RegExp(`\\b${attr}\\s*=\\s*(["'])(-?\\d*\\.?\\d+)\\1`, 'gi');
                    str = str.replace(regex, (match, quote, val) => {
                        return `${attr}=${quote}${parseFloat(val) + dx}${quote}`;
                    });
                });

                yAttrs.forEach(attr => {
                    const regex = new RegExp(`\\b${attr}\\s*=\\s*(["'])(-?\\d*\\.?\\d+)\\1`, 'gi');
                    str = str.replace(regex, (match, quote, val) => {
                        return `${attr}=${quote}${parseFloat(val) + dy}${quote}`;
                    });
                });

                // 2. Polygon and Polyline 'points' attribute
                str = str.replace(/\bpoints\s*=\s*(["'])([^"']+)\1/gi, (match, quote, ptsStr) => {
                    const parts = ptsStr.trim().split(/[\s,]+/);
                    let newPts = [];
                    for (let i = 0; i < parts.length; i += 2) {
                        if (parts[i] !== undefined && parts[i+1] !== undefined) {
                            let nx = parseFloat(parts[i]) + dx;
                            let ny = parseFloat(parts[i+1]) + dy;
                            newPts.push(`${nx},${ny}`);
                        } else if (parts[i] !== undefined) {
                            newPts.push(parts[i]); // Keep malformed tails if any
                        }
                    }
                    return `points=${quote}${newPts.join(' ')}${quote}`;
                });

                // 3. Path 'd' attribute
                str = str.replace(/\bd\s*=\s*(["'])([^"']+)\1/gi, (match, quote, dStr) => {
                    const tokens = dStr.match(/[A-Za-z]|[-+]?(?:\d*\.\d+|\d+)(?:[eE][-+]?\d+)?/g) || [];
                    let out = [];
                    let i = 0;
                    let currentCmd = '';
                    while (i < tokens.length) {
                        let token = tokens[i];
                        if (/[A-Za-z]/.test(token)) {
                            currentCmd = token;
                            out.push(token);
                            i++;
                        } else {
                            // Apply translations based on absolute command rules
                            if (['M', 'L', 'T'].includes(currentCmd)) {
                                out.push(parseFloat(tokens[i]) + dx, parseFloat(tokens[i+1] || 0) + dy);
                                i += 2;
                            } else if (['m', 'l', 't'].includes(currentCmd)) {
                                // For relative movements, ONLY the first point of an 'm' is absolute
                                if (currentCmd === 'm' && i === 1) { 
                                    out.push(parseFloat(tokens[i]) + dx, parseFloat(tokens[i+1] || 0) + dy);
                                } else {
                                    out.push(tokens[i], tokens[i+1] || 0);
                                }
                                i += 2;
                            } else if (['H'].includes(currentCmd)) {
                                out.push(parseFloat(tokens[i]) + dx); i++;
                            } else if (['h'].includes(currentCmd)) {
                                out.push(tokens[i]); i++;
                            } else if (['V'].includes(currentCmd)) {
                                out.push(parseFloat(tokens[i]) + dy); i++;
                            } else if (['v'].includes(currentCmd)) {
                                out.push(tokens[i]); i++;
                            } else if (['C'].includes(currentCmd)) {
                                out.push(parseFloat(tokens[i]) + dx, parseFloat(tokens[i+1]||0) + dy,
                                         parseFloat(tokens[i+2]||0) + dx, parseFloat(tokens[i+3]||0) + dy,
                                         parseFloat(tokens[i+4]||0) + dx, parseFloat(tokens[i+5]||0) + dy);
                                i += 6;
                            } else if (['c'].includes(currentCmd)) {
                                out.push(tokens[i], tokens[i+1], tokens[i+2], tokens[i+3], tokens[i+4], tokens[i+5]); i+=6;
                            } else if (['S', 'Q'].includes(currentCmd)) {
                                out.push(parseFloat(tokens[i]) + dx, parseFloat(tokens[i+1]||0) + dy,
                                         parseFloat(tokens[i+2]||0) + dx, parseFloat(tokens[i+3]||0) + dy);
                                i += 4;
                            } else if (['s', 'q'].includes(currentCmd)) {
                                out.push(tokens[i], tokens[i+1], tokens[i+2], tokens[i+3]); i+=4;
                            } else if (['A'].includes(currentCmd)) {
                                out.push(tokens[i], tokens[i+1], tokens[i+2], tokens[i+3], tokens[i+4],
                                         parseFloat(tokens[i+5]||0) + dx, parseFloat(tokens[i+6]||0) + dy);
                                i += 7;
                            } else if (['a'].includes(currentCmd)) {
                                out.push(tokens[i], tokens[i+1], tokens[i+2], tokens[i+3], tokens[i+4], tokens[i+5], tokens[i+6]); i+=7;
                            } else {
                                out.push(tokens[i]); i++;
                            }
                        }
                    }
                    
                    let newD = '';
                    for(let j=0; j<out.length; j++) {
                        if (/[A-Za-z]/.test(out[j])) {
                            newD += (j>0?' ':'') + out[j] + ' ';
                        } else {
                            newD += out[j] + ' ';
                        }
                    }
                    return `d=${quote}${newD.trim().replace(/\s+/g, ' ')}${quote}`;
                });

                const newText = text.slice(0, targetNode.start) + str + text.slice(targetNode.end);
                editor.value = newText;
                
                // Set the cursor selection BEFORE updating the preview so it highlights the correct element
                let cursorOffset = str.length - targetNode.str.length;
                let newCursorPos = cursorPos;
                if (cursorPos > targetNode.start) {
                    newCursorPos += cursorOffset;
                }
                editor.setSelectionRange(newCursorPos, newCursorPos);
                
                updatePreview();
                pushHistory();
            }

            // --- UTILITY ACTIONS ---

            copyBtn.addEventListener('click', () => {
                editor.select();
                document.execCommand('copy');
                showToast('Fragment copied to clipboard!');
                window.getSelection().removeAllRanges();
            });

            downloadBtn.addEventListener('click', () => {
                const textContent = editor.value;
                if (!textContent.trim()) {
                    showToast('Nothing to save!');
                    return;
                }

                const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                
                let filename = 'component.svg';
                const idMatch = textContent.match(/id=["']([^"']+)["']/);
                if (idMatch && idMatch[1]) filename = `${idMatch[1]}.svg`;

                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast(`Saved as ${filename}`);
            });

            let toastTimeout;
            function showToast(message) {
                toast.textContent = message;
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                }, 2500);
            }
        });
    </script>
</body>
</html>
